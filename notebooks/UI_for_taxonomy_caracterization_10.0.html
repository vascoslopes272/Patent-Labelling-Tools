        '<div style="margin-top:10px;"><button type="button" class="btn pri" id="btn-copy-morphology">⟲ Copy M1–M3 (+G1) from ' + escHtml(S.duplicateId.trim()) + '</button>'
        + '<div style="font-size:11px; color:var(--text3); margin-top:6px;">Only works if that patent was already reviewed &amp; exported earlier in this batch session — pulls its structural/aero/propulsion labels into this patent, since it’s the same aircraft.</div></div>'
      ) : '')
      + '</div>'
    ) : '')
    + '<div class="m3-sub">Read-only schema fields pulled directly from spreadsheet tracking lines.</div>'
    + '<div class="m3-grid">'
      + '<div class="m3-field"><div class="m3-label">Patent ID</div><div class="m3-readonly">' + escHtml(T1_META.recordNumber) + '</div></div>'
      + '<div class="m3-field"><div class="m3-label">Assignee Entity</div><div class="m3-readonly">' + escHtml(T1_META.assignee)
        + (function(){
            // Applicant-grouping hint: tells the reviewer whether this assignee
            // is a one-off in this batch (count=1 — naming the aircraft is rarely
            // useful) or a repeat player (Beta, Honda, Airbus, ... — worth a
            // consistent aircraft/prototype name across its patents).
            var grp = lookupAssigneeGroup(T1_META.assignee);
            if (!grp) return '';
            var style = grp.isRepeat
              ? 'margin-left:8px; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; background:#fff3cd; color:#7a5d00;'
              : 'margin-left:8px; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; background:var(--bg2); color:var(--text3);';
            var label = grp.isRepeat
              ? '↻ ' + grp.count + ' patents in batch'
              : '1 patent in batch (unique)';
            var title = grp.isRepeat
              ? 'Also filed: ' + grp.otherIds.slice(0,8).join(', ') + (grp.otherIds.length>8 ? ', …' : '')
              : 'No other patent in this batch shares this assignee.';
            return '<span style="'+style+'" title="'+escHtml(title)+'">'+escHtml(label)+'</span>';
          })()
        + '</div></div>'
      + '<div class="m3-field"><div class="m3-label">Publication / Filing</div><div class="m3-readonly">' + escHtml(T1_META.pubYear) + ' / ' + escHtml(T1_META.appYear) + '</div></div>'
      // Audit G-04: Display Family ID
      + '<div class="m3-field"><div class="m3-label">Family ID / Priority</div><div class="m3-readonly" style="font-size:11px;">' + escHtml(T1_META.familyId) + ' / ' + escHtml(T1_META.priorityDate) + '</div></div>'
      + '<div class="m3-field" style="grid-column:1/-1"><div class="m3-label">Title</div><div class="m3-readonly">' + escHtml(T1_META.title) + '</div></div>'
      // Aircraft / prototype name — tokenized input. Typing offers existing
      // session names (datalist) + a "no-name" option. Picking a known name
      // copies that aircraft's M1/M2/M3 (see the aircraft-name change handler).
      + '<div class="m3-field" style="grid-column:1/-1;"><div class="m3-label">Aircraft / Prototype Name '
        + '<span style="font-weight:400;color:var(--text3);font-size:11px;">— same name ⇒ shared M1/M2/M3</span></div>'
        + '<input type="text" list="aircraft-name-options" id="t1-aircraft-name" class="m3-num" autocomplete="off" '
        + 'placeholder="Type a name, pick an existing one, or choose No-name…" '
        + 'value="' + escHtml(T1_META.aircraftName||'') + '" style="width:100%;">'
        + '<datalist id="aircraft-name-options">'
        + ['<option value="'+escHtml(NO_NAME_AIRCRAFT)+'"></option>']
            .concat(Object.keys(AIRCRAFT_REGISTRY).map(function(k){ return '<option value="'+escHtml(AIRCRAFT_REGISTRY[k].display)+'"></option>'; }))
            .join('')
        + '</datalist>'
        + (T1_META.aircraftName && lookupAircraft(T1_META.aircraftName) && lookupAircraft(T1_META.aircraftName).snapshot
            ? '<div class="flag info" style="margin-top:8px;"><span class="f-lbl">↺ Known aircraft</span>M1/M2/M3 copied from a previous patent named "'+escHtml(lookupAircraft(T1_META.aircraftName).display)+'". Edit as needed — clicking Next on T2 jumps to the summary.</div>'
            : '')
        + '</div>'
      + '<div class="m3-field" style="grid-column:1/-1;"><details class="m3-readonly"><summary>Backward Citations (' + (T1_META.backwardCites ? T1_META.backwardCites.length : 0) + ')</summary><div class="cite-list">' + renderCitationsWithLinks(T1_META.backwardCites) + '</div></details></div>'
      + '<div class="m3-field" style="grid-column:1/-1;"><details class="m3-readonly"><summary>Forward Citations (' + (T1_META.forwardCites ? T1_META.forwardCites.length : 0) + ')</summary><div class="cite-list">' + renderCitationsWithLinks(T1_META.forwardCites) + '</div></details></div>'
    + '</div></div>'; 

  h += '<div class="m3-card" style="margin-top:12px;">'
    + '<div class="m3-head">Analytical Bounds Matrix</div>'
    + '<div class="m3-grid">'
      // Distinct-architectures count moved to T2 (it's derived from how the
      // reviewer assigns figures to architectures — see pageT2's arch panel).
      + '<div class="m3-field" style="grid-column:1/-1"><div class="m3-label">Innovation Scope Assignment</div>'
      + '<div class="g1-subgrid">' + t1ScopeOptions().map(function(o){ return '<button type="button" class="t1-scopebtn' + (S.t1Scope === o.id ? ' sel' : '') + '" data-field="t1Scope" data-val="' + encodeURIComponent(o.id) + '"><div class="g1-subid">Scope Token</div><div class="g1-subname">' + o.n + '</div></button>'; }).join('') + '</div></div>'
      + '<div class="m3-field"><div class="m3-label">Technological Field</div><select class="m3-num" data-field="t1Field"><option value="">Select parameter field</option>' + t1FieldOptions().map(function(o){ return '<option value="' + o.id + '"' + (S.t1Field==o.id ? ' selected' : '') + '>' + o.n + '</option>'; }).join('') + '</select></div>'
      + '<div class="m3-field"><div class="m3-label">Core Innovation Objective</div><select class="m3-num" data-field="t1Target"><option value="">Select target objective</option>' + T1_TGT.map(function(o){ return '<option value="' + o.id + '"' + (S.t1Target==o.id ? ' selected' : '') + '>' + o.n + '</option>'; }).join('') + '</select></div>'
    + '</div></div>';

  // Patent-level edge-case toggle tags — clickable chips shown ABOVE the shared
  // Comments & Edge-Case Log, on T1 only. Selected ids live in S.t1EdgeTags.
  h += '<div class="comments-wrap" style="margin-bottom:0;">' + sec('Comments & Edge-Case Log')
    + '<div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;">'
    + T1_EDGE_TAGS.map(function(o){
        var on = (S.t1EdgeTags || []).indexOf(o.id) > -1;
        return '<span class="crumb' + (on ? ' hi' : '') + '" style="cursor:pointer;" data-t1-edge-tag="' + o.id + '">' + escHtml(o.n) + '</span>';
      }).join('')
    + '</div>'
    + '<textarea class="comments" data-field="comments" placeholder="Log design tracking ambiguities or structural exceptions here...">' + escHtml(S.comments) + '</textarea></div>';

  return h;
}

function pageT2(){
  var fNum = (S.t2figNum||'1').trim();
  var isMain = (fNum !== '' && !!figGet(fNum, 'isMain', false));
  var status = figGet(fNum, 'status', null);
  var arch = figGet(fNum, 'arch', '1');

  // Audit R-02: initialise rotation from the AI-suggested value on first
  // load of this figure only — once t2_rotation exists (even at 0), the
  // human's choice (or explicit 0) must never be overwritten on re-render.
  var _fd = S.figData[fNum];
  if (!_fd || _fd.t2_rotation == null) {
    figSet(fNum, 't2_rotation', figGet(fNum, 'rotation_deg_suggested', 0));
  }
  var rotation = figGet(fNum, 't2_rotation', 0);
  var rotSuggested = figGet(fNum, 'rotation_deg_suggested', 0);

  // Architecture count is auto-derived from the figure assignments (the highest
  // architecture number assigned to any figure), but the reviewer can still bump
  // it up manually to declare an architecture not yet tied to a specific figure.
  var nArch = getArchCount();
  var archOptions = '';
  for(var i=1; i<=nArch; i++) { archOptions += '<option value="'+i+'" '+(arch==String(i)?'selected':'')+'>Architecture '+i+'</option>'; }

  var h='<div class="p-module">Module T2 &middot; Image Characteristics &amp; Drawing-Level Analysis</div><div class="p-q">Visual Token Attributes &amp; Document Extraction Labels</div>'

  h += '<div class="t2-grid4">';

  // COL 1 (Context) — the ACTIVE figure image, large.
  var mapped = figIsMapped(fNum);
  var warnHtml = !mapped ? '<div class="flag warn" style="margin-top:0;"><span class="f-lbl">⚠ Unmapped Crop — _Fu Figure</span>This image crop has no corresponding FIG. description in the patent text. Label from visual content only.</div>' : '';
  // Real crop image (file:// URL built from this batch's Image_Path column) when
  // available, falling back to a placeholder only if no Image_Path was loaded.
  var previewPlaceholder = 'https://placehold.co/600x400/E8E7E0/5A5955?text=Mock+Crop:+FIG.+' + escHtml(fNum);
  var imgPath = realFigImage(fNum) || previewPlaceholder;

  var srcUrl = figGet(fNum, "sourceUrl", null);

  h += '<div class="t2-col t2-col-img">'
    + '<div style="margin-bottom:12px; display:flex; align-items:center; gap:8px;">'
    + '<span class="m3-label" style="margin-bottom:0;">Active: FIG.</span>'
    + '<input type="text" class="m3-num" style="width:64px; padding:6px 8px; min-height:0;" data-field="t2figNum" value="'+escHtml(fNum)+'">'
    + '</div>'
    + warnHtml
    + '<div style="margin-bottom:8px;"><img id="t2-img-preview" src="' + imgPath + '" onerror="this.onerror=null;this.src=\'' + previewPlaceholder + '\';" style="width:100%;border-radius:6px;border:1px solid var(--border);background:var(--bg2);transform:rotate(' + rotation + 'deg);transition:transform .15s ease;"></div>'
    + (srcUrl
        ? '<div style="margin-top:4px;font-size:11px;">'
          + '<a href="' + escHtml(srcUrl) + '" target="_blank" rel="noopener"'
          + ' style="color:var(--accent);text-decoration:none;">↗ View source</a></div>'
        : '')
    // Per-figure Brief-Description-of-Drawings text, shown directly under the
    // big image. Mapped figures show their own description line; unlabeled (_Fu)
    // / unmapped crops explicitly show that it's missing from the brief drawings.
    + (function(){
        var desc = figDescriptionLine(fNum);
        if (desc) {
          return '<div style="margin-top:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:12px;line-height:1.5;color:var(--text2);">'
               + '<span style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;">Brief Description of Drawings</span><br>'
               + escHtml(desc) + '</div>';
        }
        return '<div style="margin-top:8px;padding:8px 10px;background:var(--bg2);border:1px dashed var(--border2);border-radius:6px;font-size:12px;color:var(--text3);font-style:italic;">'
             + 'No matching FIG. entry in the Brief Description of the Drawings for this crop.</div>';
      })()
    + '<div style="display:flex; align-items:center; gap:8px; margin-bottom:12px; margin-top:8px;">'
      + '<button type="button" class="btn" data-t2-rotate="true" style="padding:6px 12px; font-size:12px;">↻ Rotate 90°</button>'
      + (rotation !== 0 ? '<span class="crumb" style="font-family:var(--mono);">Current: ' + rotation + '°</span>' : '')
      + (rotSuggested !== 0 && rotation === rotSuggested ? '<span style="font-size:11px; color:var(--text3);">(AI suggestion)</span>' : '')
    + '</div>'
    + '</div>';

  // COL 2 — figure thumbnail list.
  h += '<div class="t2-col t2-col-thumbs">' + figGrid() + '</div>';

  if (fNum) {
    // COL 3 — tag group 1: Duplicate cross-reference + A. Projection + B. Rendering.
    h += '<div class="t2-col t2-col-tags">';
    h += (function(){
      var dupOfPatent = figGet(fNum, 'dupOfPatent', '');
      var dupOfFig    = figGet(fNum, 'dupOfFig', '');
      var prefillPatent = dupOfPatent || (S.isDuplicate && S.duplicateType === '1' ? (S.duplicateId||'') : '');
      return '<div class="m3-card" style="margin-bottom:8px; padding:12px;">'
        + '<div class="m3-head" style="display:flex; justify-content:space-between; align-items:center;">Duplicate Image Cross-Reference'
        + (dupOfPatent ? '<button type="button" class="btn" id="btn-fig-dup-clear" style="padding:4px 10px; font-size:11px;">Clear</button>' : '')
        + '</div>'
        + '<div class="m3-sub">Flag when this exact drawing is the same image used in another patent (e.g. continuations/same-aircraft filings reusing the same main figure).</div>'
        + (dupOfPatent
          ? '<div class="flag warn" style="margin-top:8px;"><span class="f-lbl">🔁 Flagged Duplicate</span>Same image as <b>' + escHtml(dupOfPatent) + '</b>' + (dupOfFig ? (' FIG. ' + escHtml(dupOfFig)) : '') + '.</div>'
            // On-demand re-copy: pull the original figure's labels onto THIS figure
            // now. Useful when the original was labeled AFTER this one was flagged
            // (the flag-time copy would otherwise be stale). Only shown when a
            // specific source FIG. is known.
            + (dupOfFig
              ? '<button type="button" class="btn pri" id="btn-fig-dup-sync" style="margin-top:8px; padding:6px 12px; font-size:12px;" title="Copy all image labels from FIG. ' + escHtml(dupOfFig) + ' onto this figure">⟲ Copy labels from FIG. ' + escHtml(dupOfFig) + '</button>'
              : '')
          : '<div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:8px;">'
            + '<input type="text" class="m3-num" id="t2-dup-patent-input" style="width:200px;" placeholder="Original Patent ID" value="' + escHtml(prefillPatent) + '">'
            + '<input type="text" class="m3-num" id="t2-dup-fig-input" style="width:90px;" placeholder="FIG. #" value="' + escHtml(dupOfFig) + '">'
            + '<button type="button" class="btn" id="btn-fig-dup-set">Flag as Duplicate Image</button>'
            + '</div>')
        + '</div>';
    })();

    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;"><div class="m3-head">A. Projection Coordinates</div>'
       + sec('Perspective / Camera Angle') + grid('n',T2_PER.map(function(p){return ocFig('per',p,p);}))
       + '</div>';

    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;"><div class="m3-head">B. Image Rendering Style</div>'
       + sec('Aircraft Rendering') + grid('n',T2_AC_STY.map(function(s){return ocFig('acSty',s,s);})) + grid('n',T2_AC_COL.map(function(c){return ocFig('acCol',c,c);}))
       + sec('Background Rendering') + grid('n',T2_BG_STY.map(function(s){return ocFig('bgSty',s,s);})) + grid('n',T2_BG_COL.map(function(c){return ocFig('bgCol',c,c);}))
       + '</div>';
    h += '</div>';  // close COL 3

    // COL 4 — tag group 2: architecture assignment + C + D + Figure Notes.
    h += '<div class="t2-col t2-col-tags">';
    // Figure Validation & Assignment (Set Main / Assign-To architecture dropdown /
    // + Add architecture / Distinct-Architectures banner) — relocated here from
    // col 3; markup, ids and data-attributes unchanged.
    h += '<div class="m3-card" style="margin-bottom:8px; border-color:var(--accent);">'
      + '<div class="m3-head" style="margin-bottom:10px;">Figure Validation & Assignment</div>'
      + '<div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">'
        + '<button type="button" class="btn '+(isMain?'pri':'')+'" data-t2-main="true" title="Sets the main figure of THIS figure\'s architecture (Architecture '+figArchOf(fNum)+'). Each architecture has its own main figure.">★ Set as Main Figure'+(getArchCount()>1?' (Arch '+figArchOf(fNum)+')':'')+'</button>'
        // Copy all image labels from THIS architecture's main figure onto the
        // current figure (editable). Shown only when a main exists for this arch
        // and the current figure isn't itself the main. Copies labels only — it
        // does NOT mark the figure as a duplicate of the main.
        + (function(){
            var _mainF = mainFigureOfArch(figArchOf(fNum));
            if (!_mainF || _mainF === fNum) return '';
            return '<button type="button" class="btn" id="btn-fig-copy-main" style="padding:6px 10px; font-size:12px;" title="Copy all image labels from this architecture\'s main figure (FIG. '+escHtml(_mainF)+') onto this figure (editable)">⟲ Copy labels from main (FIG. '+escHtml(_mainF)+')</button>';
          })()
        + '<div style="width:1px; height:24px; background:var(--border);"></div>'
        + '<div style="display:flex; align-items:center; gap:6px;"><span class="m3-label" style="margin-bottom:0;">Assign To:</span><select class="m3-num" data-t2-arch="true" style="padding:6px 10px; min-height:0; width:140px;">'+archOptions+'</select></div>'
        + '<button type="button" class="btn" id="btn-add-arch" style="padding:6px 10px; font-size:12px;" title="Declare another distinct architecture in this patent">+ Add architecture</button>'
        + (nArch > 1 ? '<button type="button" class="btn" id="btn-remove-arch" style="padding:6px 10px; font-size:12px; color:var(--danger); border-color:var(--danger);" title="Remove the last architecture (Architecture '+nArch+'). Reassign any figures tagged to it first.">− Remove architecture</button>' : '')
      + '</div>'
      // Live count of distinct architectures in this patent. When >1, the
      // G1/M1/M2/M3 pages repeat once per architecture (see the page loop).
      + '<div class="flag '+(nArch>1?'info':'')+'" style="margin-top:10px;">'
        + '<span class="f-lbl">Distinct Architectures</span>'
        + nArch + ' in this patent'
        + (nArch>1 ? ' — you\'ll fill G1/M1/M2/M3 once per architecture.' : ' — assign figures above (or "+ Add architecture") if this patent shows more than one.')
      + '</div></div>';

    // Structural Elements is SINGLE-select by default (SigLIP over-tags parts on a
    // single layout figure; the human should normally pick exactly one token). The
    // per-figure partsMulti flag opts into legacy multi-select for genuine edge cases.
    var partsMulti = figGet(fNum, 'partsMulti', false);
    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;"><div class="m3-head" style="display:flex; justify-content:space-between; align-items:center;">C. Present Structural Elements (Visual Tokens)'
       + '<button type="button" class="btn ' + (partsMulti ? 'danger' : '') + '" id="btn-parts-multi-toggle" style="padding:4px 10px; font-size:11px;">' + (partsMulti ? 'Back to single' : 'Allow multiple (edge case)') + '</button></div>'
       + '<div class="m3-sub" style="margin-bottom:6px;">' + (partsMulti ? 'MULTI-SELECT (edge case) — pick all structural tokens that apply.' : 'SINGLE-SELECT — pick exactly one structural token. Click it again to clear.') + '</div>'
       + grid('n',(T2_PARTS_DEFAULT.concat(PART_TOKENS||[]).concat(S.t2customParts||[]).filter(function(v,i,a){return a.indexOf(v)===i;})).map(function(p){return ocArrFig('parts',p,p);}))
       + '<div style="margin-top:10px; display:flex; gap:8px;"><input type="text" class="m3-num" id="t2-new-part" placeholder="+ Add Custom Token" style="flex:1; padding:8px 12px; min-height:0;"><button type="button" class="btn" id="btn-add-part" style="padding:8px 16px;">Add Tag</button></div>'
       + '</div>';

    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;"><div class="m3-head">D. Image Quality Flag</div>'
       + grid('n', QUALITY_FLAGS.map(qualityChip));
    h += '<div style="display:flex;align-items:center;gap:8px;margin-top:8px;">'
       + '<input type="checkbox" id="t2-has-legends"'
       + (figGet(fNum,"hasLegends",false) ? " checked" : "")
       + ' data-fig-bool="hasLegends" style="width:14px;height:14px;">'
       + '<label for="t2-has-legends" style="font-size:13px;cursor:pointer;">'
       + 'Contains callouts / legends / text overlays</label></div>';
    h += '</div>';

    // Per-figure "Aircraft State in this View" — many patents draw the SAME aircraft
    // in several configurations (a hover view AND a cruise view). This records which
    // configuration THIS specific drawing shows. Structured toggles + a free-text
    // box; all per-figure (figData), persisted + exported like the other T2 fields.
    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;"><div class="m3-head">Aircraft State in this View</div>'
       + '<div class="m3-sub" style="margin-bottom:6px;">Describe the configuration shown in <b>THIS drawing</b>, not the aircraft in general — e.g. hover with the wing/rotors tilted up, or cruise with everything horizontal. The same aircraft often appears in several states across a patent’s figures, so set this per image.</div>'
       + '<div class="m2-kv">Flight configuration shown</div>' + grid('n', AC_STATE.map(function(o){ return ocFig('acState', o.id, o.n); }))
       + '<div class="m2-kv" style="margin-top:8px;">What is tilted / deployed in this view (if any)</div>' + grid('n', TILTED_IN_VIEW.map(function(o){ return ocArrFig('tiltedInView', o.id, o.n); }))
       + '<textarea class="m3-num" data-fig-text="stateNote" placeholder="Anything else about the state in this image (gear down, doors open, blades folded, mid-transition angle…)" style="width:100%;min-height:48px;margin-top:8px;padding:8px;resize:vertical;font-size:13px;">' + escHtml(figGet(fNum, "stateNote", "")) + '</textarea>'
       + '</div>';

    // Per-figure commentary — replaces the global commentsSection() in T2 only;
    // notes and edge-case tags are stored on figData[fNum] so they travel with
    // this specific figure instead of the whole patent.
    h += '<div class="m3-card" style="margin-bottom:8px;padding:12px;">'
       + '<div class="m3-head">Figure Notes</div>'
       + '<textarea class="m3-num" data-fig-comment="true" placeholder="Notes for this figure..."'
       + ' style="width:100%;min-height:60px;padding:8px;resize:vertical;font-size:13px;">'
       + escHtml(figGet(fNum, "comment", "")) + '</textarea>'
       + '<div style="margin-top:8px;display:flex;gap:8px;">'
       + '<input type="text" id="t2-edge-tag-input" class="m3-num" list="edge-token-options" autocomplete="off"'
       + ' placeholder="New or existing edge-case token..." style="flex:1;padding:6px 10px;min-height:0;">'
       + '<datalist id="edge-token-options">'
       + EDGE_TOKENS.map(function(t){ return '<option value="'+escHtml(t)+'"></option>'; }).join('')
       + '</datalist>'
       + '<button type="button" class="btn" id="btn-add-edge-tag" style="padding:6px 12px;">+ Tag</button>'
       + '</div>'
       // Parity with Structural Elements: surface every session edge-case token
       // (EDGE_TOKENS) as one-click chips so the reviewer never has to retype a tag
       // they created earlier. Applied tags are highlighted; clicking a chip appends
       // it to this figure's edgeTags (no-op if already applied). The text input
       // above still CREATES new tokens (btn-add-edge-tag pushes into EDGE_TOKENS).
       + (EDGE_TOKENS.length > 0
          ? '<div style="margin-top:8px;">'
            + '<div class="m3-sub" style="margin-bottom:4px;">Edge-case tokens (click to apply):</div>'
            + '<div style="display:flex;flex-wrap:wrap;gap:4px;">'
            + EDGE_TOKENS.map(function(t){
                var applied = figGet(fNum,"edgeTags",[]).indexOf(t) > -1;
                return '<span class="crumb' + (applied ? ' hi' : '') + '" style="cursor:pointer;" data-add-edge-tag="'+escHtml(t)+'">'
                       + escHtml(t) + '</span>';
              }).join('')
            + '</div></div>'
          : '')
       + (figGet(fNum,"edgeTags",[]).length > 0
          ? '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;">'
            + figGet(fNum,"edgeTags",[]).map(function(t){
                return '<span class="crumb" style="cursor:pointer;" data-remove-tag="'+escHtml(t)+'">'
                       + escHtml(t) + ' ×</span>';
              }).join("") + "</div>"
          : "")
       + "</div>";

    h += archDinoUnderstandingCard(fNum);

    // ── Patent-level (GLOBAL) image-semantics review ──────────────────────────
    // These two cards are NOT per-figure — they describe the patent's imagery as
    // a whole (S.* keys, exported as META rows). Kept visually distinct (accent
    // border) so it's clear they apply to the whole patent, not the active figure.
    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px; border-color:var(--warn-bdr);">'
       + '<div class="m3-head">Image Semantics (whole patent)</div>'
       + '<div class="m3-sub" style="margin-bottom:8px;">Some patents’ drawings don’t faithfully reflect the real aircraft — e.g. a tilt-rotor whose figures only make it look like combined-thrust. Flag that here for the whole patent.</div>'
       + '<div style="display:flex;align-items:center;gap:8px;">'
       + '<input type="checkbox" id="t2-img-not-reflect"' + (S.imgNotReflect ? ' checked' : '')
       + ' data-field="imgNotReflect" style="width:14px;height:14px;">'
       + '<label for="t2-img-not-reflect" style="font-size:13px;cursor:pointer;font-weight:500;color:var(--warn);">⚠ Images don’t reflect the aircraft semantics</label></div>';
    if (S.imgNotReflect) {
      h += '<div class="m2-kv" style="margin-top:10px;">What do the images APPEAR to be?</div>'
         + grid('n', APPARENT_ARCH.map(function(o){ return oc('imgApparentArch', o.id, o.n); }));
    }
    h += '</div>';

    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;">'
       + '<div class="m3-head">Patent Image Notes (whole patent)</div>'
       + '<div class="m3-sub" style="margin-bottom:6px;">Global notes about this patent’s imagery (not tied to one figure).</div>'
       + '<textarea class="m3-num" data-field="patentImageComments" placeholder="Overall observations about the patent’s drawings..." style="width:100%;min-height:60px;padding:8px;resize:vertical;font-size:13px;">'
       + escHtml(S.patentImageComments || '') + '</textarea></div>';

    // DINOv2 image-selection reminder (guidance only — no data captured). Sits at
    // the end of the per-figure column as the "last comment" the reviewer reads.
    h += '<div class="flag info" style="margin-bottom:8px;"><span class="f-lbl">💡 Picking images for DINOv2</span>'
       + 'Aim for ~3–4 representative drawings of this aircraft across the patent. Every drawing has a flaw (odd angle, occlusion, callout clutter, partial view), so a few complementary views describe the 3-D shape far better than any single “best” image.</div>';
    h += '</div>';  // close COL 4
  } else {
    h += '<div class="t2-col t2-col-tags"><div class="flag skip"><span class="f-lbl">No Figure Selected</span>Select a figure card above to begin labeling.</div></div>';
    h += '<div class="t2-col t2-col-tags"></div>';
  }

  h += '</div>';  // close .t2-grid4
  return h;
}

function renderPreserveScroll() {
  // The page scrolls on the WINDOW (the .panel div has no overflow/fixed height,
  // so it grows with content) — #panel.scrollTop is always 0. On the T2 page the
  // (up to 4) columns (.t2-col) are their own scroll containers, so we capture/
  // restore each one by index. render() rebuilds #panel.innerHTML, so the inner
  // elements are recreated and must be re-scrolled by selector after render.
  var winY = window.scrollY || document.documentElement.scrollTop || 0;
  var cols = document.querySelectorAll('.t2-col');
  var tops = [];
  for (var i = 0; i < cols.length; i++) tops.push(cols[i].scrollTop);
  render();
  window.scrollTo(0, winY);
  var cols2 = document.querySelectorAll('.t2-col');
  for (var j = 0; j < cols2.length && j < tops.length; j++) cols2[j].scrollTop = tops[j];
}

// Task B (CHANGE 4): compact main-figure image shown on the G1/M1/M2/M3 morphology
// pages so the reviewer can see the drawing while classifying. Prefers
// S.mainFigure; falls back to the first approved figure that has an image, then to
// any figure that has an image. Returns '' (renders nothing — no broken <img>)
// when no usable image exists. The panel is CSS-positioned (.morph-mainfig): fixed
// in the right margin on wide screens, static at the top on narrow ones.
function morphologyMainImage() {
  // Shown only on the morphology pages (per architecture), so prefer the main
  // figure of the CURRENT architecture; fall back to an approved/any figure that
  // belongs to this architecture, then to any figure at all.
  var curArch1 = (S.curArch || 0) + 1;
  var pick = null;
  var amf = mainFigureOfArch(curArch1);
  if (amf && realFigImage(amf)) pick = amf;
  if (!pick) {
    var nums = Object.keys(S.figData || {}).sort(function(a,b){ return (parseFloat(a)||0) - (parseFloat(b)||0); });
    var inArch = nums.filter(function(n){ return figArchOf(n) === curArch1; });
    var pools = [inArch, nums];   // this architecture first, then any figure
    for (var p = 0; p < pools.length && !pick; p++) {
      for (var i = 0; i < pools[p].length; i++) { if (figGet(pools[p][i],'status',null) === 'approved' && realFigImage(pools[p][i])) { pick = pools[p][i]; break; } }
      if (!pick) { for (var j = 0; j < pools[p].length; j++) { if (realFigImage(pools[p][j])) { pick = pools[p][j]; break; } } }
    }
  }
  if (!pick) return '';
  var url = realFigImage(pick);
  if (!url) return '';
  return '<div class="morph-mainfig">'
    + '<div class="morph-mainfig-lbl">Main figure' + (getArchCount() > 1 ? ' · Arch ' + (S.curArch + 1) : '') + ' · FIG. ' + escHtml(pick) + '</div>'
    + '<img src="' + url + '" onerror="this.parentNode.style.display=\'none\';" alt="Main figure FIG. ' + escHtml(pick) + '">'
    + '</div>';
}

function render(){
  persistSession();   // refresh-safe: snapshot the whole session on every render (debounced)
  renderStep(); renderBC(); renderThroughput(); renderCopyMorph();
  document.getElementById('hdr-id').textContent = T1_META.recordNumber || '';
  // Prefer a dedicated, capitalization-normalized aircraft/prototype name;
  // fall back to the patent title when the pipeline doesn't supply one.
  var acName = normalizeAircraftName(T1_META.aircraftName);
  document.getElementById('hdr-name').textContent =
    acName || T1_META.title || 'Unnamed';
  var sid=curSID(), p=document.getElementById('panel'), content='';
  if(sid=='t1') content=pageT1(); else if(sid=='t2') content=pageT2(); else if(sid=='gate') content=pageGate(); else if(sid=='m1') content=pageM1(); else if(sid=='m2') content=pageM2(); else if(sid=='m3') content=pageM3(); else if(sid=='done'){ p.innerHTML=pageDone(); return; }
  // Multi-architecture banner on the morphology pages (G1/M1/M2/M3): tells the
  // reviewer which architecture they're filling when the patent has more than one.
  if (['gate','m1','m2','m3'].indexOf(sid) > -1) {
    var _nA = getArchCount();
    if (_nA > 1) {
      content = '<div class="flag info" style="margin-bottom:12px; border-left:4px solid var(--accent);">'
        + '<span class="f-lbl">Architecture ' + (S.curArch + 1) + ' of ' + _nA + '</span>'
        + 'These G1/M1/M2/M3 answers apply to architecture ' + (S.curArch + 1) + '. '
        + (S.curArch < _nA - 1 ? 'After M3 you\'ll move to the next architecture.' : 'This is the last architecture — after M3 you\'ll reach the summary.')
        + '</div>' + content;
    }
    // CHANGE 4: prepend the sticky main-figure image so the drawing stays visible
    // while classifying. Out of normal flow (position:fixed) on wide screens, so it
    // does not disturb the Architecture-N-of-M banner above; renders nothing if no
    // usable image exists.
    content = morphologyMainImage() + content;
  }
  var blockers = nextBlockers();
  var blockerHint = blockers.length
    ? '<span style="font-size:11px;color:var(--warn);text-align:right;max-width:420px;">\u26a0 To continue: ' + escHtml(blockers.join('  \u00b7  ')) + '</span>'
    : '';
  p.innerHTML=content+'<div class="nav">'+(S.step>0?'<button type="button" class="btn" id="btn-back">\u2190 Back</button>':'<div></div>')+'<div class="bgrp" style="display:flex;align-items:center;gap:10px;">'+blockerHint+'<button type="button" class="btn pri" id="btn-next"'+(!canGo()?' disabled':'')+'>Next Step \u2192</button></div></div>';
}

// The G1/M1/M2/M3 morphology object for whatever architecture is CURRENTLY
// loaded into the flat S.* keys. Factored out of buildExport so it can be
// called once per architecture (after swapping that arch's profile into S).
function buildMorphologyObj() {
  return {
    topologyClass: S.topType, wingConf: S.wingConf, wCount: S.wCount,
    wings: [1,2,3,4].map(function(i){ return i<=S.wCount ? {role:S['wRole'+i]||'Main', tilt:S['wTilt'+i], posV:S['wPosV'+i], posL:S['wPosL'+i], plan:S['wPlan'+i]==='Oth'?S['wPlanOth'+i]:S['wPlan'+i]} : null }).filter(Boolean),
    empType: S.empType, empKin: S.empKin, empNotes: S.empNotes,
    fusShape: S.fusShape, fusKin: S.fusKin, fusNotes: S.fusNotes, gearArch: S.gearArch, gearNotes: S.gearNotes, wingNotes: S.wingNotes,
    boomsPresent: !!S.boomsPresent, boomCount: S.boomsPresent ? (S.boomCount || 0) : 0, boomOrient: S.boomsPresent ? S.boomOrient : null, boomSym: S.boomsPresent ? !!S.boomSym : null,
    footLen: S.footLen, footWid: S.footWid, footHgt: S.footHgt, footAmbiguous: S.footAmbiguous, latSym: S.latSym, longSym: S.longSym,
    propulsionCards: m3Blueprints().map(function(bp){
      var nT = m3NTypes(bp.key);
      // Shared, card-level fields (the same for every propeller type on the card).
      var card = { component: bp.key, ntypes: nT, sym: m3Sym(bp.key), symLong: m3SymLong(bp.key), zone: m3Get(bp.key,'zone'), zoneChord: m3Get(bp.key,'zoneChord'), zoneSpan: m3Get(bp.key,'zoneSpan'), boomAttach: m3Get(bp.key,'boomAttach'), boomPosLong: m3Get(bp.key,'boomPosLong'), boomPosSpan: m3Get(bp.key,'boomPosSpan'), notes: m3Get(bp.key,'notes') };
      if (nT <= 1) {
        // Legacy single-type: flat per-attribute fields under the bare key, so
        // older readers and the existing export rows keep working unchanged.
        card.count  = m3Count(bp.key);
        card.chord  = m3Get(bp.key,'chord');
        card.orient = m3Get(bp.key,'orient');
        card.bmech  = m3Get(bp.key,'bmech');
        card.rmech  = m3Get(bp.key,'rmech');
        card.propKin = (propKinLock(S.topType) || m3Get(bp.key,'propKin'));
      } else {
        // Multi-type: per-type attribute sets. Articulation (propKin) is NOT
        // physics-locked here — mixing fixed + tilting is the whole point.
        card.count = m3CardCount(bp.key);   // total across types (for downstream counts)
        card.types = [];
        for (var t = 1; t <= nT; t++) {
          var tk = m3TypeKey(bp.key, t);
          // Mounting-zone position is now per type, so it travels inside each type.
          card.types.push({ idx: t, count: m3Count(tk), chord: m3Get(tk,'chord'), orient: m3Get(tk,'orient'), bmech: m3Get(tk,'bmech'), rmech: m3Get(tk,'rmech'), propKin: m3Get(tk,'propKin'), zone: m3Get(tk,'zone'), zoneChord: m3Get(tk,'zoneChord'), zoneSpan: m3Get(tk,'zoneSpan'), boomAttach: m3Get(tk,'boomAttach'), boomPosLong: m3Get(tk,'boomPosLong'), boomPosSpan: m3Get(tk,'boomPosSpan') });
        }
      }
      return card;
    })
  };
}

// Build the array of per-architecture morphology objects by swapping each
// stored profile into S in turn, reading it, then restoring the active arch.
// For a single-architecture patent this is just [currentMorphology].
function buildArchitectures() {
  saveCurArchProfile();                       // make sure the active arch is captured
  var nArch = getArchCount();
  var savedActive = captureAircraftSnapshot(); // remember what's currently in S
  var out = [];
  for (var ai = 0; ai < nArch; ai++) {
    // Fall back to the active morphology if a profile slot was never visited
    // (e.g. same-name-aircraft auto-jump), so we never emit a wiped architecture.
    applyAircraftSnapshot(S.archProfiles[ai] || savedActive);
    var morph = buildMorphologyObj();
    // dinoUnderstanding lives outside the morphology snapshot (it's set from
    // T2, keyed by architecture NUMBER, not swapped via archProfiles) — attach
    // it here by the same 1-based number recordToRows uses for the _arch{N} suffix.
    morph.dinoUnderstanding = (S.archDinoUnderstanding || {})[ai + 1] || null;
    out.push(morph);
  }
  applyAircraftSnapshot(savedActive);          // restore the active arch into S
  return out;
}

function buildExport() {
  var _dupId = (S.duplicateId || '').trim();
  var dupCommitted = !!S.isDuplicate && (
    S.duplicateType === '1'
      ? (_dupId !== '' && S.duplicateCopiedId === _dupId)   // type-1: must have Copied this id
      : true                                                 // types 2–4: no copy action, flag is enough
  );
  var rec = {
    recordId: T1_META.recordNumber, familyId: T1_META.familyId,
    aircraftName: T1_META.aircraftName || '',
    assignee: T1_META.assignee, pubYear: T1_META.pubYear, appYear: T1_META.appYear,
    isApproved: S.isApproved, disapproveReason: S.t1DisapproveReason, disapproveOther: S.t1DisapproveOther,
    // A patent duplicate is only EXPORTED once the reviewer committed it via Copy:
    // type-1 (Same Aircraft) requires "Copy M1–M3" to have run for THIS exact id
    // (S.duplicateCopiedId), so merely ticking the flag without copying saves as
    // NOT a duplicate. Types 2–4 have no copy action, so they save on the flag.
    isDuplicate: dupCommitted, duplicateOf: dupCommitted ? S.duplicateId : '', duplicateType: dupCommitted ? S.duplicateType : null,
    archCount: getArchCount(), scope: S.t1Scope, techField: S.t1Field, innovTarget: S.t1Target,
    figures: Object.keys(S.figData).reduce(function(acc, fNum){
      var fd = S.figData[fNum] || {};
      // Single source of truth for every per-figure default the UI shows as
      // "selected" without the reviewer ever clicking it (qualityFlag defaults
      // to "Clean" in qualityChip(), arch defaults to "1" in figArchOf()) —
      // resolved HERE, once, so every consumer of record.figures (recordToRows,
      // any future reader) sees the real displayed value instead of having to
      // duplicate the same fallback and risk drifting out of sync (the bug that
      // silently dropped "Clean" from the export).
      // Disapproved figures are exempt from the "arch" default: recordToRows()
      // deliberately keeps disapproved-image rows lean (only status + arch IF
      // it was actually tagged), so forcing a "1" here would add a spurious
      // arch row to every discarded figure.
      acc[fNum] = Object.assign({}, fd, {
        rotation_deg: fd.t2_rotation || 0,
        qualityFlag: fd.qualityFlag != null ? fd.qualityFlag : 'clean',
        arch: (fd.arch != null || fd.status === 'disapproved') ? fd.arch : '1',
      });
      return acc;
    }, {}), mainFigure: mainFigureOfArch(1),   // legacy META field = architecture 1's main (per-figure isMain carries the rest)
    // architectures[]: one morphology per architecture. The flat morphology
    // fields below mirror architectures[0] for backward-compatibility with any
    // consumer that still reads record.topologyClass etc. directly.
    architectures: buildArchitectures(),
    labelToken: buildLbl(), comments: S.comments,
    t1EdgeTags: Array.isArray(S.t1EdgeTags) ? S.t1EdgeTags.slice() : [],
    // Patent-level image-semantics review (T2 col 4, global).
    imgNotReflect: !!S.imgNotReflect, imgApparentArch: S.imgApparentArch || '', patentImageComments: S.patentImageComments || '',
    timestamp: new Date().toISOString()
  };
  var first = rec.architectures[0] || {};
  Object.keys(first).forEach(function(k){ rec[k] = first[k]; });
  return rec;
}

function ingestAI(data) {
  // T1
  if (data.T1) {
    var t1 = data.T1;
    if (t1.approved    != null) S.isApproved         = t1.approved;
    if (t1.disapprove_reason)   S.t1DisapproveReason = t1.disapprove_reason;
    if (t1.disapprove_other)    S.t1DisapproveOther  = t1.disapprove_other;
    if (t1.isDuplicate != null) S.isDuplicate        = !!t1.isDuplicate;
    if (t1.duplicateId)         S.duplicateId        = t1.duplicateId;
    if (t1.duplicateType)       S.duplicateType      = t1.duplicateType;
    // A duplicate that was SAVED was, by definition, committed via Copy — mark it
    // copied so re-exporting this patent keeps it (buildExport gates on this).
    if (t1.isDuplicate && t1.duplicateId) S.duplicateCopiedId = t1.duplicateId;
    if (t1.scope)               S.t1Scope            = t1.scope;
    if (t1.t1Field)             S.t1Field            = t1.t1Field;
    if (t1.t1Target)            S.t1Target           = t1.t1Target;
    if (t1.innovTarget && !t1.t1Target) S.t1Target   = t1.innovTarget; // fallback key
    if (t1.arch_count  != null) S.archCount          = parseInt(t1.arch_count) || 1;
    if (t1.aircraftName)        T1_META.aircraftName = t1.aircraftName;
  }
  // G1
  if (data.G1 && data.G1.topType) {
    S.topType = data.G1.topType;
    S.g1Focus = ['TW','TP','DS','CVT','SLC','SRW'].indexOf(S.topType) > -1 ? 'winged'
              : ['RC','MR'].indexOf(S.topType) > -1 ? 'wingless' : 'other';
    // Apply all physics locks — mirrors Audit B-02 exactly
    if (S.topType === 'TP') {
      for (var i = 1; i <= 4; i++) { S['wTilt' + i] = 'Fixed'; }
    } else if (S.topType === 'TW') {
      S.wTilt1 = 'Tilt';
      // Default the wing-mounted thrust orientation but DON'T clobber a saved
      // value (Mixed is a valid reviewer choice — applied later from the cards).
      for (var i = 1; i <= 4; i++) { if (!S['m3_wing' + i + '_orient']) S['m3_wing' + i + '_orient'] = 'Horizontal'; }
    } else if (S.topType === 'RC' || S.topType === 'MR') {
      for (var i = 1; i <= 4; i++) { S['wTilt' + i] = null; }
    }
    applyPropKinLock();   // propKin lock per the physics matrix (TW/DS/SLC/SRW/MR→Fixed, RC→Cyclic; TP & CVT free)
  }
  // M1
  if (data.M1) {
    var m1 = data.M1;
    if (m1.wingConf)       S.wingConf = m1.wingConf;
    if (m1.wCount != null) {
      S.wCount = parseInt(m1.wCount) || 1;
      // BWB/FW/LB: the lift surface is continuous with the fuselage (no separate
      // fuselage tube to attach a panel to), so there's no discrete panel to
      // count — NOT a claim that the aircraft has no wing/lift surface. See
      // WING_CONFIG's per-option description above for the distinction.
      if (['BWB','FW','LB'].indexOf(S.wingConf) > -1) S.wCount = 0;
    }
    if (m1.empType)        S.empType  = m1.empType;
    if (m1.empKin)         S.empKin   = m1.empKin;
    if (m1.fusShape)       S.fusShape = m1.fusShape;
    if (m1.fusKin)         S.fusKin   = m1.fusKin;
    if (m1.gearArch)       S.gearArch = m1.gearArch;
    if (m1.latSym != null) S.latSym   = xlBool(m1.latSym);
    if (m1.longSym != null)       S.longSym       = xlBool(m1.longSym);
    if (m1.footAmbiguous != null) S.footAmbiguous = xlBool(m1.footAmbiguous);
    if (m1.footLen != null && m1.footLen !== '') S.footLen = String(m1.footLen);
    if (m1.footWid != null && m1.footWid !== '') S.footWid = String(m1.footWid);
    if (m1.footHgt != null && m1.footHgt !== '') S.footHgt = String(m1.footHgt);
    // Persistence fix (H4): restore the free-text morphology notes (per arch).
    if (m1.wingNotes != null) S.wingNotes = m1.wingNotes;
    if (m1.empNotes  != null) S.empNotes  = m1.empNotes;
    if (m1.fusNotes  != null) S.fusNotes  = m1.fusNotes;
    if (m1.gearNotes != null) S.gearNotes = m1.gearNotes;
    // M1 structural booms / outriggers.
    if (m1.boomsPresent != null) S.boomsPresent = xlBool(m1.boomsPresent);
    if (m1.boomCount != null && m1.boomCount !== '') S.boomCount = parseInt(m1.boomCount, 10) || 0;
    if (m1.boomOrient) S.boomOrient = m1.boomOrient;
    if (m1.boomSym != null) S.boomSym = xlBool(m1.boomSym);
    // dinoUnderstanding is intentionally NOT applied here — it's per-T2-
    // architecture, not part of the morphology snapshot, so "copy morphology
    // from another aircraft/patent" (the other ingestAI({G1,M1,...}) callers)
    // must not drag a DIFFERENT patent's image-legibility rating onto this
    // one. ingestPatentRows() (the reviewed-file round-trip) handles it
    // separately via rowsForArch()'s M1.dinoUnderstanding — see below.
    // TW empennage lock: must be Fixed
    if (S.topType === 'TW' && S.empType && S.empType !== 'Tailless' && S.empType !== 'Fins') {
      S.empKin = 'Fixed';
    }
    // RC empennage kin: only Fixed or Stabilator allowed
    if (S.topType === 'RC' && S.empKin === 'Tilt') {
      S.empKin = 'Fixed';
    }
  }
  // Wings (per-wing detail, if provided)
  if (Array.isArray(data.wings)) {
    data.wings.forEach(function(w, idx) {
      var i = w.id || (idx + 1);
      if (w.tilt) S['wTilt' + i] = w.tilt;
      if (w.posV) S['wPosV' + i] = w.posV;
      if (w.posL) S['wPosL' + i] = w.posL;
      if (w.plan) {
        if (['Str','Swp','Del','Oth'].indexOf(w.plan) > -1) {
          S['wPlan' + i] = w.plan;
        } else {
          S['wPlan' + i] = 'Oth'; S['wPlanOth' + i] = w.plan;
        }
      }
      if (i > 1 && w.role) S['wRole' + i] = w.role;
    });
  }
  // Re-apply TP/TW tilt locks AFTER wing data (AI might have sent wrong tilt values)
  if (S.topType === 'TP') { for (var i = 1; i <= 4; i++) { S['wTilt' + i] = 'Fixed'; } }
  if (S.topType === 'TW') { S.wTilt1 = 'Tilt'; }
  // T2 per-figure
  if (data.T2 && typeof data.T2 === 'object') {
    Object.keys(data.T2).forEach(function(figNum) {
      var fig = data.T2[figNum];
      if (!fig || typeof fig !== 'object') return;
      // Only write fields that are non-null and valid strings. qualityFlag/comment/
      // arch/status are persistence-fix fields restored from a reviewed file (the
      // ML pre-label never carries them, so a fresh load is unchanged).
      ['per','acSty','acCol','bgSty','bgCol','dupOfPatent','dupOfFig','sourceUrl',
       'qualityFlag','comment','arch','status','acState','stateNote'].forEach(function(key) {
        if (fig[key] != null) figSet(figNum, key, fig[key]);
      });
      if (fig.hasLegends != null) figSet(figNum, 'hasLegends', xlBool(fig.hasLegends));
      if (fig.isMain != null) figSet(figNum, 'isMain', xlBool(fig.isMain));
      // A dupOf that was SAVED was committed via Copy — restore dupConfirmed so it
      // keeps exporting (recordToRows gates the dupOf row on this).
      if (fig.dupOfPatent != null || fig.dupOfFig != null) figSet(figNum, 'dupConfirmed', true);
      if (Array.isArray(fig.tiltedInView) && fig.tiltedInView.length > 0) figSet(figNum, 'tiltedInView', fig.tiltedInView);
      // Restore the saved single/multi mode BEFORE handling parts so the collapse
      // below respects a figure the human deliberately set to multi.
      if (fig.partsMulti != null) figSet(figNum, 'partsMulti', xlBool(fig.partsMulti));
      if (Array.isArray(fig.parts) && fig.parts.length > 0) {
        var _parts = fig.parts;
        // Single-select default: SigLIP over-tags parts, so collapse a multi-tag guess
        // to ONE on load — only the human may assign >1, via the "Allow multiple"
        // button (now persisted as partsMulti). Prefer "Whole Vehicle Layout" (the
        // common case: the figure shows the whole architecture), else the first tag.
        if (!figGet(figNum, 'partsMulti', false) && _parts.length > 1) {
          _parts = _parts.indexOf('Whole Vehicle Layout') > -1 ? ['Whole Vehicle Layout'] : [_parts[0]];
        }
        figSet(figNum, 'parts', _parts);
      }
      // Restore human edge-case tags (array) and the actual chosen rotation from a
      // reloaded reviewed file. rotation_deg goes straight into t2_rotation (the
      // human's real value), distinct from the ML rotation_deg_suggested below.
      if (Array.isArray(fig.edgeTags) && fig.edgeTags.length > 0) {
        figSet(figNum, 'edgeTags', fig.edgeTags);
      }
      if (fig.rotation_deg != null) {
        figSet(figNum, 't2_rotation', parseInt(fig.rotation_deg, 10) || 0);
      }
      // Pipeline-suggested rotation (Stage 01) — only the suggestion is
      // stored here; pageT2() applies it to t2_rotation on first view only,
      // so it never clobbers a rotation the human has already set.
      if (fig.rotation_deg_suggested != null) {
        figSet(figNum, 'rotation_deg_suggested', parseInt(fig.rotation_deg_suggested, 10) || 0);
      }
      // Figure approve/disapprove status is restored above ONLY when the file
      // carries it (reviewed exports do; ML pre-labels never do — so a fresh ML
      // load still leaves the human to confirm each figure).
    });
    // Pipeline-detected duplicates: when a figure is flagged dupOfFig pointing at
    // another figure in THIS patent, copy that original's T2 labels in (same
    // image ⇒ same image-level labels), editable. Cross-patent originals are
    // handled when the reviewer (re)flags them or once that patent is in the
    // session registry.
    Object.keys(S.figData).forEach(function(figNum){
      var dop = figGet(figNum,'dupOfPatent',''), dof = figGet(figNum,'dupOfFig','');
      var samePatent = !dop || String(dop).trim() === String(T1_META.recordNumber).trim();
      if (dof && samePatent && S.figData[dof]) applyDuplicateFigureLabels(figNum, dop, dof);
    });
  }
  // M3 propulsion cards
  if (Array.isArray(data.propulsionCards)) {
    data.propulsionCards.forEach(function(card) {
      var key = card.component;
      if (!key) return;
      // Card-level (shared) fields — count is the total; zone/notes/sym are shared.
      ['count','zone','zoneChord','zoneSpan','boomAttach','boomPosLong','boomPosSpan','notes'].forEach(function(f) {
        if (card[f] != null) { S['m3_' + key + '_' + f] = card[f]; }
      });
      // Migrate an OLD single boomPos value (pre-split) into the new two-axis
      // fields so previously-saved reviewed files still show their boom position.
      if (card.boomPos != null && card.boomPosLong == null && card.boomPosSpan == null) {
        var _bp = String(card.boomPos);
        if (['Fore','Mid','Aft'].indexOf(_bp) > -1)        S['m3_' + key + '_boomPosLong'] = _bp;
        else if (_bp === 'Inboard' || _bp === 'Outboard')  S['m3_' + key + '_boomPosSpan'] = _bp;
        else if (_bp === 'Spanning')                       S['m3_' + key + '_boomPosSpan'] = 'Spanning';
      }
      // Symmetric-pairs flag is a boolean — coerce so "true"/"false" strings
      // from a round-tripped xlsx don't read as truthy non-empty strings.
      if (card.sym != null) { S['m3_' + key + '_sym'] = xlBool(card.sym); }
      if (card.symLong != null) { S['m3_' + key + '_symLong'] = xlBool(card.symLong); }

      var _pk = propKinLock(S.topType);
      var nT = parseInt(card.ntypes, 10) || (Array.isArray(card.types) ? card.types.length : 1);
      if (Array.isArray(card.types) && card.types.length) {
        // Multi-type: write each type's attributes under the "<key>__t<n>" sub-key.
        // propKin is NOT physics-locked here (mixed fixed/tilting is the point).
        S['m3_' + key + '_ntypes'] = Math.min(M3_MAX_TYPES, Math.max(1, nT));
        card.types.forEach(function(ty) {
          var tk = key + '__t' + ty.idx;
          ['count','chord','orient','bmech','rmech','propKin','zone','zoneChord','zoneSpan','boomAttach','boomPosLong','boomPosSpan'].forEach(function(f) {
            if (ty[f] != null) { S['m3_' + tk + '_' + f] = ty[f]; }
          });
          if (['SLC','SRW'].indexOf(S.topType) > -1 && S['m3_' + tk + '_orient'] === 'Mixed') { S['m3_' + tk + '_orient'] = null; }
        });
      } else {
        // Legacy single-type: flat per-attribute fields under the bare key.
        S['m3_' + key + '_ntypes'] = 1;
        ['chord','orient','bmech','rmech','propKin'].forEach(function(f) {
          if (card[f] != null) { S['m3_' + key + '_' + f] = card[f]; }
        });
        // SLC/SRW: strip Mixed (tilting/vectoring) if a stored/AI value sneaks in —
        // independent fixed lift+cruise / stopped-rotor never vectors.
        if (['SLC','SRW'].indexOf(S.topType) > -1 && S['m3_' + key + '_orient'] === 'Mixed') { S['m3_' + key + '_orient'] = null; }
        // propKin lock per the physics matrix — force the architecture's fixed value
        // over any stored/AI value (TW/DS/SLC/SRW/MR→Fixed, RC→Cyclic; TP & CVT free).
        // TW wing orient is intentionally NOT forced anymore so a saved Mixed survives.
        if (_pk) { S['m3_' + key + '_propKin'] = _pk; }
      }
    });
  }
  // Confidence summary in status bar
  var confs = [];
  if (data.T1 && data.T1.confidence != null) confs.push(data.T1.confidence);
  if (data.G1 && data.G1.confidence != null) confs.push(data.G1.confidence);
  if (data.M1 && data.M1.confidence != null) confs.push(data.M1.confidence);
  if (data.overall_confidence != null) confs.push(data.overall_confidence);
  var avgConf = confs.length ? (confs.reduce(function(a,b){return a+b;},0)/confs.length) : null;
  var confPct = avgConf != null ? Math.round(avgConf * 100) + '%' : '';
  var confColor = avgConf >= 0.85 ? 'var(--ok)' : avgConf >= 0.60 ? 'var(--warn)' : 'var(--danger)';
  // The single-patent "AI Pre-Label" status bar was removed from the header, so
  // this is now a no-op when that element is absent (ingestAI still runs for every
  // batch patent via ingestPatentRows — must not throw on the missing node).
  var _aiStatus = document.getElementById('ai-load-status');
  if (_aiStatus) _aiStatus.innerHTML =
    ' Pre-labels loaded &nbsp;&nbsp; AI confidence: <b style="color:' + confColor + '">' + confPct + '</b>' +
    (data.G1 && data.G1.reasoning ? ' &nbsp;&nbsp; <i style="color:var(--text3);">' + data.G1.reasoning + '</i>' : '');
  render();
}

// --- BATCH LOADER (ml_predict_labels_<batch>.xlsx — one row per leaf field, all patents
// stacked in a single "Review" sheet; see src/excel_schema.py COLUMNS) ──────
// Lets a reviewer load one consolidated file for the whole batch instead of
// one ai_prelabel.json per patent, with Prev/Next stepping through patients
// and patTot auto-detected from the distinct Patent_ID count.
var BATCH = null;  // { ids: [...], byId: {pid: rows[]}, idx: 0, label: "Batch_01" }

// Per-patent filename/image-path lookup keyed by fNum — rebuilt by
// rowsToAIData() on every loadBatchPatent() call. recordToRows() needs this
// to reconstruct the "Image: <filename>" Sub_Dimension that build_patent_rows()
// (src/excel_schema.py) uses, since S.figData itself is only keyed by fNum.
var FIG_FILENAMES  = {};
var FIG_IMAGE_PATH = {};

// FIG_IMAGE_PATH values are absolute local filesystem paths written by
// src/excel_schema.py (e.g. "/mnt/storage_11tb/.../matched/Batch_02/<pid>/<crop>.png"),
// not URLs — convert to a file:// URL so <img src> can load them directly from
// disk when this HTML is opened via file:// in Chrome (no upload step needed).
function pathToFileURL(p) {
  if (!p || p.trim() === '') return null;
  if (/^(https?|file):\/\//i.test(p)) return p;
  var cleanPath = p.replace(/\\/g, '/');
  if (/^[a-zA-Z]:/.test(cleanPath)) {
    return 'file:///' + cleanPath;
  }
  return 'file://' + (cleanPath.startsWith('/') ? '' : '/') + cleanPath;
}
// Two reusable side-by-side viewer windows, one per "slot":
//   'epo' → the Espacenet record opened automatically by Prev/Next
//   'pdf' → the PatSeer source PDF opened by the header "Open PDF" button
// Keeping them separate lets you park the EPO record and the source PDF side by
// side on display 2 instead of one replacing the other.
var patentWindows = { epo: null, pdf: null };
var PATENT_WINDOW_NAMES = { epo: 'evtolPatentEpoViewer', pdf: 'evtolPatentPdfViewer' };

// Where the viewer windows should appear, captured via the header "Set viewer
// area" button and remembered across patents AND across F5 (it lives in
// localStorage). Returns null when never calibrated, so we fall back to a spot
// beside the wizard.
var VIEWER_GEO_KEY = 'evtolViewerGeo_v1';
function getViewerGeo() {
  try {
    var g = JSON.parse(localStorage.getItem(VIEWER_GEO_KEY));
    if (g && g.width > 120 && g.height > 120) return g;
  } catch (e) {}
  return null;
}

function openOrUpdatePatentWindow(url, slot) {
  if (!url) return;
  slot = (slot === 'pdf') ? 'pdf' : 'epo';
  var win = patentWindows[slot];
  // ── Reuse-in-place first ──────────────────────────────────────────────────
  // Navigating an existing cross-origin window IS allowed (you can assign its
  // location even though you can't READ it), so when the previous popup is still
  // reachable we just point it at the new URL — same window, same size, same
  // spot, no flicker. We deliberately do NOT moveTo/resizeTo on reuse so we never
  // fight a layout you positioned by hand on display 2.
  if (win && !win.closed) {
    try {
      win.location.href = url;              // navigate in place (cross-origin OK)
      try { win.focus(); } catch (e) {}
      return;
    } catch (e) {
      // Reference severed (a target sending Cross-Origin-Opener-Policy:
      // same-origin moves the popup into a new browsing-context group and nulls
      // our handle). Fall through and reopen.
      try { win.close(); } catch (e2) {}
    }
  }
  // ── First open (or after a severed reference) ─────────────────────────────
  // Prefer the calibrated viewer area; otherwise sit beside the wizard, using
  // THIS window's actual location/size (not window.screen, which on multi-
  // monitor Linux often reports the whole virtual desktop).
  var geo = getViewerGeo(), left, top, w, h;
  if (geo) {
    left = geo.left; top = geo.top; w = geo.width; h = geo.height;
  } else {
    left = (window.screenX || window.screenLeft || 0) + (window.outerWidth || 800);
    top  = window.screenY || window.screenTop || 0;
    w = window.outerWidth || 800;
    h = window.outerHeight || window.screen.availHeight;
  }
  // Offset the PDF window so it isn't dropped exactly on top of the EPO one.
  if (slot === 'pdf') { left += 48; top += 48; }
  win = window.open(url, PATENT_WINDOW_NAMES[slot],
    'left=' + left + ',top=' + top + ',width=' + w + ',height=' + h);
  // Some Linux WMs ignore the features string but honor an explicit
  // moveTo/resizeTo once the window exists — only on first open, never on reuse.
  if (win) {
    try { win.moveTo(left, top); win.resizeTo(w, h); } catch (e) {}
  }
  patentWindows[slot] = win;
}

// Header "Set viewer area" → open a SAME-ORIGIN placeholder window we can read
// the geometry of (cross-origin patent windows hide theirs). You drag/size it to
// the exact spot on display 2 where you want the EPO record and the PDF, press
// the button inside, and that geometry is remembered for every viewer window
// from then on — re-runnable on ANY patent, not just the first.
function calibrateViewerArea() {
  var sx = (window.screenX || window.screenLeft || 0) + (window.outerWidth || 800);
  var sy = window.screenY || window.screenTop || 0;
  var ph = window.open('', 'evtolViewerCalibrator',
    'left=' + sx + ',top=' + sy + ',width=760,height=820');
  if (!ph) { alert('Allow pop-ups for this page, then click "Set viewer area" again.'); return; }
  ph.document.write(
    '<!doctype html><html><head><meta charset="utf-8"><title>Set patent-viewer area</title></head>' +
    '<body style="margin:0;height:100vh;display:flex;flex-direction:column;align-items:center;' +
    'justify-content:center;gap:18px;padding:28px;box-sizing:border-box;text-align:center;' +
    'font-family:system-ui,sans-serif;background:#10243e;color:#fff;">' +
    '<h2 style="margin:0;font-size:19px;">Drag &amp; resize THIS window</h2>' +
    '<p style="max-width:440px;line-height:1.5;opacity:.85;margin:0;">Move it to exactly where you want ' +
    'the EPO record and the source PDF to open on display 2, at the size you want — then press the button.</p>' +
    '<button id="useit" style="font-size:15px;padding:11px 24px;border:0;border-radius:9px;' +
    'background:#2f80ed;color:#fff;cursor:pointer;font-weight:600;">Use this spot</button>' +
    '<p id="msg" style="opacity:.6;font-size:13px;margin:0;"></p></body></html>');
  ph.document.close();
  var btn = ph.document.getElementById('useit');
  if (btn) btn.addEventListener('click', function() {
    var geo = { left: ph.screenX, top: ph.screenY, width: ph.outerWidth, height: ph.outerHeight };
    try { localStorage.setItem(VIEWER_GEO_KEY, JSON.stringify(geo)); } catch (e) {}
    try { ph.document.getElementById('msg').textContent = 'Saved ✓ you can close this.'; } catch (e) {}
    setTimeout(function(){ try { ph.close(); } catch (e) {} }, 400);
  });
}

function realFigImage(fNum) {
  return pathToFileURL(FIG_IMAGE_PATH[fNum]);
}

// Reviewed rows accumulated across the whole batch, in the same flat
// Patent_ID/Section/Sub_Dimension/Field/.../Image_Path schema as
// src/excel_schema.py's COLUMNS — written out as one xlsx per batch via
// exportReviewedBatch() instead of one JSON download per patent.
var REVIEWED_ROWS = [];
// Definition/Options/Confidence dropped from the wizard's OWN export — they
// were always blank/null here (the only real values for those columns live
// in the upstream ml_predict_labels_<batch>.xlsx, written by the Python
// pipeline's excel_schema.py, which this file is NOT). Confirmed nothing
// downstream reads them back: the only Python consumer of a reviewed file
// (01_review.ipynb's "Copy approved files" cell) looks up columns by name
// (Section/Field/Value/Patent_ID) and never touches these three.
var EXCEL_COLUMNS = ["Patent_ID","Section","Sub_Dimension","Field","Value","Source","Image_Path"];

// Make coded taxonomy values ("CVT", "LE", "1"...) readable in the exported
// Excel WITHOUT losing the machine-readable code: write "<id> — <name>" and,
// on re-load, strip everything from " — " onward to recover the bare id.
// stripLabel() is a no-op for plain ids/free text that never contained
// " — " in the first place, so older reviewed_patents_*.xlsx files (written
// before this change) keep loading exactly as before.
function withLabel(rawId, optsArray) {
  if (rawId == null || rawId === '' || !optsArray) return rawId;
  var o = optsArray.find(function(x){ return x.id === rawId; });
  if (!o) return rawId;
  return rawId + ' — ' + (o.n || o.name);
}
function stripLabel(v) {
  if (typeof v !== 'string') return v;
  var i = v.indexOf(' — ');
  return i > -1 ? v.slice(0, i).trim() : v;
}

function reviewRow(pid, section, subDim, field, value, confidence, source, imagePath) {
  return {
    Patent_ID: pid, Section: section, Sub_Dimension: subDim, Field: field,
    Value: value != null ? value : null,
    Source: source != null ? source : null,
    Image_Path: imagePath != null ? imagePath : null,
  };
}

// Inverse of build_patent_rows() (src/excel_schema.py) — flattens one
// buildExport() record (the human-reviewed wizard state) back into rows of
// that same schema, so the per-batch reviewed xlsx can be reloaded into this
// wizard's batch loader just like ml_predict_labels_<batch>.xlsx can.
function recordToRows(record, pid) {
  var rows = [];

  // ── T1 ── title/abstract/description_of_drawings come from T1_META since
  // buildExport() doesn't carry them (they're not editable in the wizard).
  // Disapproved patents were never actually reviewed by the human past the
  // triage step, so only the disapproval verdict + reason are worth keeping —
  // everything else below would just be unreviewed ML/placeholder noise.
  rows.push(reviewRow(pid, "T1", "T1 — Approval Status", "isApproved", record.isApproved));
  if (record.isApproved === false) {
    rows.push(reviewRow(pid, "T1", "T1 — Disapproval Reason", "t1DisapproveReason", withLabel(record.disapproveReason, T1_DISAPPROVE_REASONS)));
    if (record.disapproveReason === 'Other') {
      rows.push(reviewRow(pid, "META", "Review Metadata", "disapproveOther", record.disapproveOther));
    }
  } else {
    rows.push(reviewRow(pid, "T1", "Patent Title", "title", T1_META.title));
    rows.push(reviewRow(pid, "T1", "Aircraft / Prototype Name", "aircraftName", record.aircraftName));
    rows.push(reviewRow(pid, "T1", "Abstract", "abstract", T1_META.abstract));
    rows.push(reviewRow(pid, "T1", "Assignee", "assignee", record.assignee));
    rows.push(reviewRow(pid, "T1", "Publication Year", "pub_year", record.pubYear));
    rows.push(reviewRow(pid, "T1", "Application Year", "app_year", record.appYear));
    rows.push(reviewRow(pid, "T1", "Description of Drawings", "description_of_drawings", T1_META.descriptionOfDrawings));
    if (T1_META.pdfLinkRaw) rows.push(reviewRow(pid, "T1", "PDF Link", "pdf_link", T1_META.pdfLinkRaw, null, "patseer"));
    rows.push(reviewRow(pid, "T1", "scope", "scope", record.scope));
    rows.push(reviewRow(pid, "T1", "t1Field", "t1Field", record.techField));
    rows.push(reviewRow(pid, "T1", "t1Target", "t1Target", record.innovTarget));
    rows.push(reviewRow(pid, "T1", "T1 — Distinct Architectures", "archCount", record.archCount));
    rows.push(reviewRow(pid, "T1", "T1 — Duplicate Flag", "isDuplicate", record.isDuplicate));
    rows.push(reviewRow(pid, "T1", "T1 — Duplicate Of (Patent ID)", "duplicateId", record.duplicateOf));
    // Extra fields buildExport() carries with no build_patent_rows() slot —
    // harmless additions, ignored by rowsToAIData() on reload.
    rows.push(reviewRow(pid, "META", "Review Metadata", "familyId", record.familyId));
    rows.push(reviewRow(pid, "META", "Review Metadata", "duplicateType", withLabel(record.duplicateType, DUP_TYPES)));
    rows.push(reviewRow(pid, "META", "Review Metadata", "mainFigure", record.mainFigure));
    rows.push(reviewRow(pid, "META", "Review Metadata", "comments", record.comments));
    // T1 edge-case toggle tags — one META row, ids joined with "|" (read back in loadBatchPatent).
    rows.push(reviewRow(pid, "META", "Review Metadata", "t1EdgeTags", (record.t1EdgeTags && record.t1EdgeTags.length) ? record.t1EdgeTags.join("|") : null));
    rows.push(reviewRow(pid, "META", "Review Metadata", "imgNotReflect", record.imgNotReflect));
    rows.push(reviewRow(pid, "META", "Review Metadata", "imgApparentArch", withLabel(record.imgApparentArch, APPARENT_ARCH)));
    rows.push(reviewRow(pid, "META", "Review Metadata", "patentImageComments", record.patentImageComments));
    rows.push(reviewRow(pid, "META", "Review Metadata", "labelToken", record.labelToken));
  }
  rows.push(reviewRow(pid, "META", "Review Metadata", "timestamp", record.timestamp));

  // Disapproved patent: STOP here. Per the rule "when I disapprove a patent,
  // only the reason appears", we emit nothing else — no T2 image classification,
  // no G1/M1/M2/M3 morphology (none of it was human-reviewed for a rejected
  // patent; it would just be unreviewed ML noise). Patent_ID is already on every
  // row above, so the rejected patent stays identifiable. (All rows emitted so
  // far — isApproved/reason/timestamp — are non-empty, so skipping the trailing
  // empty-trim below is harmless.)
  if (record.isApproved === false) return rows;

  // ── T2 — per-figure rows, keyed back to filenames via FIG_FILENAMES ──────
  var fNums = Object.keys(record.figures || {});
  if (!fNums.length) {
    rows.push(reviewRow(pid, "T2", "Image: (none available)", "match_status", null));
  }
  fNums.forEach(function(fNum) {
    var fd      = record.figures[fNum] || {};
    var fname   = FIG_FILENAMES[fNum] || "";
    var imgPath = FIG_IMAGE_PATH[fNum] || null;
    var subDim  = fname ? ("Image: " + fname) : ("Image: (fig " + fNum + ")");
    // Discarded (disapproved) image: per the rule "a disapproved image only says
    // it's disapproved", we emit ONLY the status row — no architecture tag, no
    // duplicate-of info, and certainly no ML classification fields. The Image_Path
    // still rides on this row so the figure stays anchored to its file.
    if (fd.status === 'disapproved') {
      rows.push(reviewRow(pid, "T2", subDim, "status", "disapproved", null, "human", imgPath));
      return;
    }
    ["per","acSty","acCol","bgSty","bgCol"].forEach(function(f) {
      rows.push(reviewRow(pid, "T2", subDim, f, fd[f] != null ? fd[f] : null, null, "human", imgPath));
    });
    rows.push(reviewRow(pid, "T2", subDim, "parts", Array.isArray(fd.parts) ? fd.parts.join("|") : (fd.parts || null), null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "status", fd.status != null ? fd.status : null, null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "rotation_deg", fd.rotation_deg != null ? fd.rotation_deg : null, null, "human", imgPath));
    // Duplicate reference on ONE row: "<patent> FIG. <fig>" (e.g.
    // "US2024051687A1 FIG. 1a"), instead of separate dupOfPatent/dupOfFig rows
    // stacked on two lines. rowsToAIData() splits it back into dupOfPatent +
    // dupOfFig on reload, and still accepts the old two-field form (ML files /
    // older reviewed exports). Handles all cases: patent-only, fig-only (same
    // patent), or both.
    // Only RECORD an image duplicate once the reviewer committed it via a Copy
    // (dupConfirmed is set true only when labels were actually copied from the
    // source figure). A figure flagged but never copied exports as NOT a duplicate.
    var _dp = fd.dupConfirmed ? (fd.dupOfPatent || '').trim() : '';
    var _df = fd.dupConfirmed ? (fd.dupOfFig || '').trim() : '';
    var _dupOf = _df ? ((_dp ? _dp + ' ' : '') + 'FIG. ' + _df) : _dp;
    rows.push(reviewRow(pid, "T2", subDim, "dupOf", _dupOf || null, null, "human", imgPath));
    // Persistence fix (C1-C5): these per-figure human labels used to be captured
    // in buildExport() but never serialised here, so they were silently lost on
    // save. edgeTags is an array → joined with "|" like parts (split back on load).
    // qualityFlag's "Clean" default is now resolved once in buildExport()'s
    // figures reduce, so fd.qualityFlag is always populated here already.
    rows.push(reviewRow(pid, "T2", subDim, "qualityFlag", withLabel(fd.qualityFlag != null ? fd.qualityFlag : null, QUALITY_FLAGS), null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "hasLegends", fd.hasLegends != null ? fd.hasLegends : null, null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "comment", fd.comment != null ? fd.comment : null, null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "edgeTags", Array.isArray(fd.edgeTags) ? fd.edgeTags.join("|") : (fd.edgeTags || null), null, "human", imgPath));
    // arch's "1" default is now resolved once in buildExport()'s figures
    // reduce (same fix as qualityFlag above), so fd.arch is always populated.
    rows.push(reviewRow(pid, "T2", subDim, "arch", fd.arch != null ? fd.arch : null, null, "human", imgPath));
    // Per-architecture main-figure flag (replaces the single patent-level mainFigure).
    rows.push(reviewRow(pid, "T2", subDim, "isMain", fd.isMain != null ? fd.isMain : null, null, "human", imgPath));
    // partsMulti: persists whether the reviewer opted this figure into multi-select
    // so the single-select collapse-on-load (ingestAI) doesn't undo a deliberate >1 pick.
    rows.push(reviewRow(pid, "T2", subDim, "partsMulti", fd.partsMulti != null ? fd.partsMulti : null, null, "human", imgPath));
    // Per-figure aircraft state in this view (config + what's tilted + free note).
    rows.push(reviewRow(pid, "T2", subDim, "acState", withLabel(fd.acState != null ? fd.acState : null, AC_STATE), null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "tiltedInView", Array.isArray(fd.tiltedInView) ? fd.tiltedInView.map(function(v){ return withLabel(v, TILTED_IN_VIEW); }).join("|") : (fd.tiltedInView || null), null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "stateNote", fd.stateNote != null ? fd.stateNote : null, null, "human", imgPath));
  });

  // ── G1/M1/M2/M3 — emitted once PER ARCHITECTURE ─────────────────────────
  // Multi-architecture patents carry several morphologies. Each is keyed with a
  // "_arch{N}" suffix on the Patent_ID so (Patent_ID, Field) stays unique; a
  // single-architecture patent keeps the BARE Patent_ID (no suffix), exactly as
  // before — so existing exports/downstream tools are unchanged for that case.
  var archs = record.architectures && record.architectures.length ? record.architectures : [record];
  archs.forEach(function(m, ai) {
    var apid = archs.length > 1 ? (pid + "_arch" + (ai + 1)) : pid;

    // ── G1 ──
    rows.push(reviewRow(apid, "G1", "Topology Type", "topType", withLabel(m.topologyClass, TOP)));

    // ── M1 ──
    rows.push(reviewRow(apid, "M1", "fusShape", "fusShape", withLabel(m.fusShape, FUS_SHAPE)));
    rows.push(reviewRow(apid, "M1", "fusKin", "fusKin", withLabel(m.fusKin, FUS_KIN)));
    rows.push(reviewRow(apid, "M1", "gearArch", "gearArch", withLabel(m.gearArch, GEAR_ARCH)));
    rows.push(reviewRow(apid, "M1", "latSym", "latSym", m.latSym));
    rows.push(reviewRow(apid, "M1", "M1 — Footprint Length (m)", "footLen", m.footLen));
    rows.push(reviewRow(apid, "M1", "M1 — Footprint Width (m)", "footWid", m.footWid));
    rows.push(reviewRow(apid, "M1", "M1 — Footprint Height (m)", "footHgt", m.footHgt));
    rows.push(reviewRow(apid, "M1", "M1 — Footprint Ambiguous", "footAmbiguous", m.footAmbiguous));
    rows.push(reviewRow(apid, "M1", "M1 — Longitudinal Symmetry", "longSym", m.longSym));
    rows.push(reviewRow(apid, "M1", "wingNotes", "wingNotes", m.wingNotes));
    rows.push(reviewRow(apid, "M1", "empNotes", "empNotes", m.empNotes));
    rows.push(reviewRow(apid, "M1", "fusNotes", "fusNotes", m.fusNotes));
    rows.push(reviewRow(apid, "M1", "gearNotes", "gearNotes", m.gearNotes));
    // Structural booms / outriggers — presence, count, orientation, symmetry.
    rows.push(reviewRow(apid, "M1", "M1 — Booms Present", "boomsPresent", m.boomsPresent));
    rows.push(reviewRow(apid, "M1", "M1 — Boom Count", "boomCount", m.boomsPresent ? m.boomCount : null));
    rows.push(reviewRow(apid, "M1", "M1 — Boom Orientation", "boomOrient", withLabel(m.boomOrient, BOOM_ORIENT)));
    rows.push(reviewRow(apid, "M1", "M1 — Booms Symmetric", "boomSym", m.boomsPresent ? m.boomSym : null));
    // Reviewer's projection of how usable THIS ARCHITECTURE's figures will be
    // as DINOv2 shape cues — one value per architecture, not per image/patent.
    rows.push(reviewRow(apid, "M1", "dinoUnderstanding", "dinoUnderstanding", withLabel(m.dinoUnderstanding, DINO_UNDERSTANDING)));

    // ── M2 — wingConf/wCount/empType/empKin + per-wing rows ──
    rows.push(reviewRow(apid, "M2", "wingConf", "wingConf", withLabel(m.wingConf, WING_CONFIG)));
    rows.push(reviewRow(apid, "M2", "wCount", "wCount", m.wCount));
    rows.push(reviewRow(apid, "M2", "empType", "empType", withLabel(m.empType, EMP_TYPE)));
    rows.push(reviewRow(apid, "M2", "empKin", "empKin", withLabel(m.empKin, EMP_KIN)));
    (m.wings || []).forEach(function(w, i) {
      var wi = i + 1;
      [["tilt","Tilt",W_TILT],["posV","Vertical Position",W_POS_V],["posL","Longitudinal Position",W_POS_L],
       ["plan","Planform",W_PLAN],["role","Role",W_ROLE]].forEach(function(pair) {
        var field = pair[0], label = pair[1], opts = pair[2];
        rows.push(reviewRow(apid, "M2", "Wing " + wi + " — " + label, "wing" + wi + "_" + field, withLabel(w[field] != null ? w[field] : null, opts)));
      });
    });

    // ── M3 — one set of rows per propulsion-card component ──
    (m.propulsionCards || []).forEach(function(card) {
      var subDim = "Propulsion: " + card.component;
      // "zone" options depend on WHICH card this is (m3ZoneOptions(bp)), so look
      // up its blueprint once; the rest are static option sets shared by every
      // card. "orient" is deliberately left unlabelled — Horizontal/Vertical/
      // Mixed are already plain English, unlike the short codes (LE, CVT, Cent...)
      // everything else here uses.
      var _bp = m3Blueprints().find(function(b){ return b.key === card.component; });
      var M3_FIELD_OPTS = {
        zone: _bp ? m3ZoneOptions(_bp) : null, zoneChord: m3ZoneChordOptions(), zoneSpan: m3ZoneSpanOptions(),
        boomAttach: BOOM_ATTACH, boomPos: BOOM_POS, boomPosLong: BOOM_POS_LONG, boomPosSpan: BOOM_POS_SPAN, chord: CHORD, bmech: BLADE_MECH, rmech: RETRACT_MECH, propKin: PROP_KIN,
      };
      // Persistence fix (C6/C7): propKin + sym were captured by buildMorphologyObj()
      // but omitted from this emit list, so they were lost on save (propKin only
      // re-derivable for TP via the physics lock; sym not at all). The reader
      // (rowsToAIData byComponent + ingestAI) already handles both once emitted.
      // Card-level (shared) fields. `count` is the card total; `ntypes` says how
      // many distinct propeller types this card holds.
      ["count","sym","symLong","zone","zoneChord","zoneSpan","boomAttach","boomPos","boomPosLong","boomPosSpan","notes","ntypes"].forEach(function(field) {
        if (card[field] === undefined) return;
        rows.push(reviewRow(apid, "M3", subDim, card.component + "_" + field, withLabel(card[field] != null ? card[field] : null, M3_FIELD_OPTS[field])));
      });
      if (card.types && card.types.length) {
        // Multi-type: one labelled sub-dimension per propeller type, fields
        // suffixed t<n>_<field> so rowsToAIData can regroup them.
        card.types.forEach(function(ty) {
          var tDim = subDim + " — Type " + ty.idx;
          ["count","chord","orient","bmech","rmech","propKin","zone","zoneChord","zoneSpan","boomAttach","boomPos","boomPosLong","boomPosSpan"].forEach(function(field) {
            if (ty[field] === undefined) return;
            rows.push(reviewRow(apid, "M3", tDim, card.component + "_t" + ty.idx + "_" + field, withLabel(ty[field] != null ? ty[field] : null, M3_FIELD_OPTS[field])));
          });
        });
      } else if (card.count > 0 || m.topologyClass === 'RC') {
        // Legacy single-type: flat per-attribute fields under the bare component.
        // Mirrors the UI's own gate (m3Card(): count>0 is what reveals this
        // section, EXCEPT for RC, whose single/coaxial hub attrs are always
        // shown with no count stepper at all) — with 0 propulsors here the
        // attribute fields were never shown to the reviewer, so stale
        // ML/default values must not be saved.
        ["chord","orient","bmech","rmech","propKin"].forEach(function(field) {
          if (card[field] === undefined) return;
          rows.push(reviewRow(apid, "M3", subDim, card.component + "_" + field, withLabel(card[field] != null ? card[field] : null, M3_FIELD_OPTS[field])));
        });
      }
    });
  });

  // ── Trim empties ─────────────────────────────────────────────────────────
  // Drop rows whose Value is null/undefined/'' so the export only carries what
  // was actually set — no more one-row-per-unset-field bloat. IMPORTANT: keep
  // boolean false and numeric 0 (those ARE meaningful answers), and always keep
  // each figure's T2 "status" row so a figure stays anchored (its Image_Path
  // rides on it) even when nothing else was recorded for it.
  function _emptyVal(v){ return v === null || v === undefined || v === ''; }
  rows = rows.filter(function(r){
    if (r.Section === 'T2' && r.Field === 'status') return true;   // figure anchor
    return !_emptyVal(r.Value);
  });

  return rows;
}

// Builds one xlsx (SheetJS, client-side) from REVIEWED_ROWS accumulated so
// far and downloads it — named after the batch label so it never collides
// with another batch's output, mirroring ml_predict_labels_<batch>.xlsx.
function exportReviewedBatch() {
  if (!REVIEWED_ROWS.length) {
