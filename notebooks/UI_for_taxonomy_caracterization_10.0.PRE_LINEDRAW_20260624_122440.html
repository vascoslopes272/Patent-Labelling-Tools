});

// Flip the save indicator to "Modified"/"Unsaved" as soon as a reviewer touches
// the patent's data. Only true data-entry controls are watched — pure-navigation
// clicks (Next/Back/Save, figure switching) are deliberately excluded so they
// don't falsely mark a saved patent as modified.
(function(){
  var panel = document.getElementById('panel');
  if (!panel) return;
  var DIRTY_SEL = '[data-field],[data-arrfield],[data-figfield],[data-figarrfield],'
    + '[data-t1-approve],[data-dup-type],[data-fig-quality],'
    + '[data-grid-approve],[data-grid-disapprove],'
    + '[data-t2-main],[data-t2-rotate],[data-t2-arch],[data-g1-top],'
    + '[data-m3-action],[data-inc],[data-dec],[data-add-edge-tag],#btn-m1-bypass';
  panel.addEventListener('click', function(e){
    if (BATCH && e.target.closest(DIRTY_SEL)) markBatchDirty();
  });
  // Every <input>/<textarea>/<select> inside the panel is a patent data field.
  panel.addEventListener('input',  function(){ if (BATCH) markBatchDirty(); });
  panel.addEventListener('change', function(){ if (BATCH) markBatchDirty(); });
})();

document.getElementById('panel').addEventListener('click', function(e){
  var tgt=e.target;

  if(tgt.tagName === 'SUMMARY' || tgt.closest('summary')) return;

  if(tgt.id === 'btn-m1-bypass') { S.footAmbiguous = !S.footAmbiguous; renderPreserveScroll(); return; }
  if(tgt.id === 'btn-next' && !tgt.disabled) {
    var sidNow = curSID();
    // Same-name aircraft auto-jump: when the M1/M2/M3 were pre-filled from a
    // known aircraft on T1, clicking Next on T2 skips Gate/M1/M2/M3 and lands on
    // the Summary (Done) page — the morphology is already filled. You can still
    // Back into the skipped steps to verify/edit. Fires only once per patent.
    // Same-name auto-jump only makes sense for a SINGLE-architecture patent
    // (one shared morphology was copied). For a multi-architecture patent the
    // reviewer must still fill each architecture, so fall through to the loop;
    // the copied morphology pre-fills architecture 1.
    if (S.aircraftAutoJump && sidNow === 't2' && getArchCount() === 1) {
      var doneIdx = STEPS.map(function(s){return s.id;}).indexOf('done');
      S.curArch = 0; loadArchProfile(0);   // ensure arch1 profile captured before jumping
      S.step = doneIdx >= 0 ? doneIdx : S.step + 1;
      S.aircraftAutoJump = false;
      renderPreserveScroll(); return;
    }
    // Entering the morphology pages from T2: start at architecture 1.
    if (sidNow === 't2') { S.curArch = 0; loadArchProfile(0); S.step++; renderPreserveScroll(); return; }
    // Leaving M3: if more architectures remain, save this one, advance curArch,
    // load it, and jump BACK to G1 to fill the next architecture. Otherwise fall
    // through to the normal Next (→ Done).
    if (sidNow === 'm3') {
      saveCurArchProfile();
      if (S.curArch < getArchCount() - 1) {
        loadArchProfile(S.curArch + 1);
        var gateIdx = STEPS.map(function(s){return s.id;}).indexOf('gate');
        S.step = gateIdx;
        renderPreserveScroll(); return;
      }
    }
    S.step++; renderPreserveScroll(); return;
  }
  if(tgt.id === 'btn-back') {
    var sidBack = curSID();
    // Going Back from G1 while on architecture 2+ returns to M3 of the PREVIOUS
    // architecture (not T2): save current arch, step curArch down, reload it.
    if (sidBack === 'gate' && S.curArch > 0) {
      saveCurArchProfile();
      loadArchProfile(S.curArch - 1);
      var m3Idx = STEPS.map(function(s){return s.id;}).indexOf('m3');
      S.step = m3Idx;
      renderPreserveScroll(); return;
    }
    S.step--; renderPreserveScroll(); return;
  }
  
  if(tgt.id === 'btn-export-next') {
    var record = buildExport();
    console.log("JSON Payload Ready for Pipeline:", record);

    // Record this aircraft's name + morphology so the next same-name patent can
    // copy it (no-op for the no-name bucket / blank name).
    registerAircraft(T1_META.aircraftName);
    // Register every figure's T2 labels so a later duplicate (this patent or a
    // future one) can copy them in, and harvest any edge-case tokens into the
    // session-wide token list so they keep being suggested.
    Object.keys(S.figData).forEach(function(fNum){
      registerFigureLabels(T1_META.recordNumber, fNum);
      (figGet(fNum,'edgeTags',[])||[]).forEach(function(t){ if (EDGE_TOKENS.indexOf(t) === -1) EDGE_TOKENS.push(t); });
    });

    if (BATCH) {
      // Accumulate into the batch's reviewed rows instead of downloading one
      // JSON per patent — exportReviewedBatch() writes all of these as a
      // single reviewed_patents_<batch>.xlsx. commitReviewedRows() dedupes by
      // Patent_ID and flips the save indicator to "✓ Saved".
      commitReviewedRows(BATCH.ids[BATCH.idx], record);
    } else {
      // No batch loaded (single-patent ad-hoc review) — fall back to the
      // original per-patent JSON download, since there's no batch to export.
      var blob = new Blob([JSON.stringify(record, null, 2)], {type:'application/json'});
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = T1_META.recordNumber + '_label.json'; a.click();
    }

    if (BATCH && BATCH.idx < BATCH.ids.length - 1) {
      // A batch xlsx is loaded — advance straight to the next patient's
      // precomputed AI predictions instead of resetting to a blank form.
      loadBatchPatent(BATCH.idx + 1);
      openOrUpdatePatentWindow(T1_META.pdfLink, 'epo');
    } else {
      if (BATCH) {
        document.getElementById('batch-load-status').textContent =
          ' Batch complete — reviewed all ' + BATCH.ids.length + ' patent(s). Exporting reviewed_patents_' + BATCH.label + '.xlsx...';
        exportReviewedBatch();
      }
      THROUGHPUT.patCur = String(parseInt(THROUGHPUT.patCur||0) + 1);
      THROUGHPUT.figCur = '1';
      S=fresh();
    }
    renderPreserveScroll(); return;
  }

  var figNavBtn = tgt.closest('[data-fig-nav]');
  if (figNavBtn) { S.t2figNum = figNavBtn.getAttribute('data-fig-nav'); renderPreserveScroll(); return; }

  if (tgt.id === 'btn-copy-morphology') {
    copyMorphologyFromOriginal((S.duplicateId||'').trim());
    return;
  }

  // T1 Approve Patent
  var t1AppBtn = tgt.closest('[data-t1-approve]');
  if (t1AppBtn) {
    S.isApproved = t1AppBtn.getAttribute('data-t1-approve') === 'true';
    if (S.isApproved === true) {
      // Approving without filled-in scope/field/target left the export with
      // empty triage fields — backfill generic defaults so there's always
      // something valid to ship downstream.
      if (!S.t1Scope)  S.t1Scope  = 'Whole Aircraft Architecture';
      if (!S.t1Field)  S.t1Field  = 'Aerodynamic/Structural';
      if (!S.t1Target) S.t1Target = 'Layout Convergence';
    }
    renderPreserveScroll(); return;
  }

  // T1 Duplicate Type
  var dupTypeBtn = tgt.closest('[data-dup-type]');
  if (dupTypeBtn) { S.duplicateType = dupTypeBtn.getAttribute('data-dup-type'); renderPreserveScroll(); return; }

  // T2 Figure Quality Flag
  var figQualBtn = tgt.closest('[data-fig-quality]');
  if (figQualBtn) {
    var fNumQ = (S.t2figNum||'1').trim();
    figSet(fNumQ, 'qualityFlag', figQualBtn.getAttribute('data-fig-quality'));
    renderPreserveScroll(); return;
  }

  // T2 Per-figure edge-case tags
  if (tgt.id === 'btn-add-edge-tag') {
    var tagInput = document.getElementById('t2-edge-tag-input');
    var newTag = tagInput ? tagInput.value.trim() : '';
    if (newTag) {
      var fNumTag = (S.t2figNum||'1').trim();
      var tags = figGet(fNumTag, 'edgeTags', []);
      if (tags.indexOf(newTag) === -1) { tags = tags.concat([newTag]); figSet(fNumTag, 'edgeTags', tags); }
      // Persist the token session-wide (like PART_TOKENS / aircraft names) so it
      // is offered as a suggestion on every later figure/patent.
      if (EDGE_TOKENS.indexOf(newTag) === -1) EDGE_TOKENS.push(newTag);
      tagInput.value = '';
      renderPreserveScroll();
    }
    return;
  }
  var addTagChip = tgt.closest('[data-add-edge-tag]');
  if (addTagChip) {
    var fNumAddTag = (S.t2figNum||'1').trim();
    var tagToAdd = addTagChip.getAttribute('data-add-edge-tag');
    var curEdgeTags = figGet(fNumAddTag, 'edgeTags', []);
    if (curEdgeTags.indexOf(tagToAdd) === -1) {
      figSet(fNumAddTag, 'edgeTags', curEdgeTags.concat([tagToAdd]));
    }
    renderPreserveScroll();
    return;
  }
  var removeTagEl = tgt.closest('[data-remove-tag]');
  if (removeTagEl) {
    var fNumRmTag = (S.t2figNum||'1').trim();
    var tagToRemove = removeTagEl.getAttribute('data-remove-tag');
    var tagsArr = figGet(fNumRmTag, 'edgeTags', []).filter(function(t){ return t !== tagToRemove; });
    figSet(fNumRmTag, 'edgeTags', tagsArr);
    renderPreserveScroll();
    return;
  }

  // T2 Figure Grid — per-card Approve / Disapprove / Text-toggle. Checked
  // BEFORE the card-select branch so a click on these buttons toggles the
  // figure's state (and re-renders the green/red glow) instead of merely
  // selecting the card. Clicking the same status again clears it.
  var gridApproveBtn = tgt.closest('[data-grid-approve]');
  if (gridApproveBtn) {
    var fNumA = gridApproveBtn.getAttribute('data-grid-approve');
    figSet(fNumA, 'status', figGet(fNumA,'status',null) === 'approved' ? null : 'approved');
    renderPreserveScroll(); return;
  }
  var gridDisBtn = tgt.closest('[data-grid-disapprove]');
  if (gridDisBtn) {
    var fNumD = gridDisBtn.getAttribute('data-grid-disapprove');
    var nextD = figGet(fNumD,'status',null) === 'disapproved' ? null : 'disapproved';
    figSet(fNumD, 'status', nextD);
    if (nextD === 'disapproved' && S.mainFigure === fNumD) S.mainFigure = null;
    renderPreserveScroll(); return;
  }
  var gridTextBtn = tgt.closest('[data-grid-text-toggle]');
  if (gridTextBtn) {
    var fNumT = gridTextBtn.getAttribute('data-grid-text-toggle');
    figSet(fNumT, 'gridShowText', !figGet(fNumT,'gridShowText',false));
    renderPreserveScroll(); return;
  }

  // T2 Figure Grid Card select
  var figCardBtn = tgt.closest('[data-fig-card]');
  if (figCardBtn) { S.t2figNum = figCardBtn.getAttribute('data-fig-card'); renderPreserveScroll(); return; }
  if (tgt.id === 'btn-add-figure') {
    var maxN = 0;
    t2AllFigNums().forEach(function(n){ var p = parseInt(n,10); if(!isNaN(p) && p>maxN) maxN=p; });
    S.t2figNum = String(maxN+1); renderPreserveScroll(); return;
  }

  // T2 Main Figure (approve/disapprove now lives only on the figure cards via
  // data-grid-approve / data-grid-disapprove — the duplicate buttons that used
  // to be here in "Figure Validation & Assignment" were removed).
  // Manually declare one more architecture than is currently derived (for a
  // distinct architecture the patent describes but no single figure isolates).
  // Bumping S.archCount above the figure-derived max makes getArchCount() return
  // it; the Assign-To dropdown then offers the new number.
  if (tgt.id === 'btn-add-arch') {
    S.archCount = getArchCount() + 1;
    renderPreserveScroll(); return;
  }

  var t2MainBtn = tgt.closest('[data-t2-main]');
  if (t2MainBtn) {
      var fNum2 = (S.t2figNum||'1').trim();
      if(fNum2){ S.mainFigure = fNum2; figSet(fNum2, 'status', 'approved'); renderPreserveScroll(); }
      return;
  }

  // T2 Rotation
  var t2RotateBtn = tgt.closest('[data-t2-rotate]');
  if (t2RotateBtn) {
      var fNumR = (S.t2figNum||'1').trim();
      if (fNumR) {
          var curRot = figGet(fNumR, 't2_rotation', 0);
          figSet(fNumR, 't2_rotation', (curRot + 90) % 360);
          renderPreserveScroll();
      }
      return;
  }

  var t1Btn = tgt.closest('.t1-scopebtn');
  if (t1Btn) { S.t1Scope = decodeURIComponent(t1Btn.getAttribute('data-val')); renderPreserveScroll(); return; }

  var g1Master = tgt.closest('.g1-master');
  if(g1Master){ S.g1Focus = g1Master.getAttribute('data-g1-master'); S.topType = null; renderPreserveScroll(); return; }

  var g1Sub = tgt.closest('.g1-subbtn');
  if(g1Sub && g1Sub.getAttribute('data-g1-top')){ 
    S.topType = g1Sub.getAttribute('data-g1-top'); 
    S.g1Focus = g1Sub.getAttribute('data-g1-group'); 
    
    // Audit B-02 Fix: Apply Physics Locks here, not in render
    if (S.topType === 'TP') {
        for (var i = 1; i <= 4; i++) { S['wTilt'+i] = 'Fixed'; }
    } else if (S.topType === 'TW') {
        S['wTilt1'] = 'Tilt';
        // default wing-mounted thrust orient, but leave it editable (Mixed allowed)
        for (var i = 1; i <= 4; i++) { if (!S['m3_wing'+i+'_orient']) S['m3_wing'+i+'_orient'] = 'Horizontal'; }
    } else if (S.topType === 'RC' || S.topType === 'MR') {
        for (var i = 1; i <= 4; i++) { S['wTilt'+i] = null; }
    }
    applyPropKinLock();   // propKin lock per the physics matrix
    renderPreserveScroll(); return;
  }
  
  var opt = tgt.closest('.opt');
  if(opt && !opt.classList.contains('dis')){
    var field = opt.getAttribute('data-field'), arrfield = opt.getAttribute('data-arrfield');
    var figfield = opt.getAttribute('data-figfield'), figarrfield = opt.getAttribute('data-figarrfield');
    var val = decodeURIComponent(opt.getAttribute('data-val'));
    
    if(field){
      S[field] = val;
      // Audit B-05 Fix: Clear wing orphan fields on wingConf change
      if(field === 'wingConf'){ 
          S.wKin = null; S.wCount = (['BWB', 'FW', 'LB'].indexOf(val) > -1) ? 0 : 1; 
          ['wTilt','wPosV','wPosL','wPlan','wRole','wPlanOth'].forEach(function(base){
            [1,2,3,4].forEach(function(i){ S[base+i] = (base==='wPlanOth')?'':null; });
          });
      }
      renderPreserveScroll(); return;
    } else if (arrfield) {
      var arr = S[arrfield] || [], idx = arr.indexOf(val);
      if (idx > -1) arr.splice(idx, 1); else arr.push(val);
      S[arrfield] = arr; renderPreserveScroll(); return;
    } else if (figfield) {
      figSet((S.t2figNum||'1').trim(), figfield, val); renderPreserveScroll(); return;
    } else if (figarrfield) {
      var fN = (S.t2figNum||'1').trim(), fArr = figGet(fN, figarrfield, []), fIdx = fArr.indexOf(val);
      if (figarrfield === 'parts' && !figGet(fN, 'partsMulti', false)) {
        // SINGLE mode (default): radio-like. Click the selected token to clear,
        // otherwise replace the selection. parts stays an ARRAY (length 0 or 1) so
        // the export schema (recordToRows joins with "|") is unchanged.
        fArr = (fIdx > -1) ? [] : [val];
      } else {
        // MULTI mode (figData[fN].partsMulti) or any other figarrfield: legacy toggle.
        if (fIdx > -1) fArr.splice(fIdx, 1); else fArr.push(val);
      }
      figSet(fN, figarrfield, fArr); renderPreserveScroll(); return;
    }
  }

  if (tgt.id === 'btn-fig-dup-set') {
    var dupPatentInput = document.getElementById('t2-dup-patent-input');
    var dupFigInput    = document.getElementById('t2-dup-fig-input');
    var dupPid = dupPatentInput ? dupPatentInput.value.trim() : '';
    if (dupPid) {
      var fNumDup = (S.t2figNum||'1').trim();
      var dupFig  = dupFigInput ? dupFigInput.value.trim() : '';
      figSet(fNumDup, 'dupOfPatent', dupPid);
      figSet(fNumDup, 'dupOfFig', dupFig);
      // Same image ⇒ same image-level labels. Copy the original figure's T2
      // labels in as an editable starting point (image-level only, not status),
      // mirroring how same-name aircraft share M1/M2/M3.
      var copied = dupFig ? applyDuplicateFigureLabels(fNumDup, dupPid, dupFig) : false;
      var st = document.getElementById('batch-load-status');
      if (st) st.textContent = copied
        ? ' Copied FIG. ' + dupFig + ' labels from ' + dupPid + ' into FIG. ' + fNumDup + ' (editable).'
        : (dupFig ? ' Flagged duplicate — original FIG. ' + dupFig + ' not seen yet this session, no labels copied.' : ' Flagged duplicate.');
      renderPreserveScroll();
    }
    return;
  }
  if (tgt.id === 'btn-fig-dup-clear') {
    var fNumDupClear = (S.t2figNum||'1').trim();
    figSet(fNumDupClear, 'dupOfPatent', '');
    figSet(fNumDupClear, 'dupOfFig', '');
    renderPreserveScroll();
    return;
  }

  if (tgt.id === 'btn-parts-multi-toggle') {
    var fNumPM = (S.t2figNum||'1').trim();
    var nowMulti = !figGet(fNumPM, 'partsMulti', false);
    figSet(fNumPM, 'partsMulti', nowMulti);
    // Switching MULTI -> SINGLE while >1 token is selected: keep only the first
    // (single mode can hold at most one; the extra edge-case picks are dropped).
    if (!nowMulti) {
      var partsArrPM = figGet(fNumPM, 'parts', []);
      if (partsArrPM.length > 1) figSet(fNumPM, 'parts', [partsArrPM[0]]);
    }
    renderPreserveScroll();
    return;
  }

  if (tgt.id === 'btn-add-part') {
    var input = document.getElementById('t2-new-part');
    if (input && input.value.trim()) {
      var newTag = input.value.trim();
      // Persist the token session-wide so it appears on every subsequent patent
      // (previously it lived only in S.t2customParts, which fresh() wiped — that
      // is why a token like "test" vanished on the next patent).
      if (PART_TOKENS.indexOf(newTag) === -1) PART_TOKENS.push(newTag);
      if ((S.t2customParts || []).indexOf(newTag) === -1) { S.t2customParts = S.t2customParts || []; S.t2customParts.push(newTag); }
      var fN2 = (S.t2figNum||'1').trim(), arr2 = figGet(fN2, 'parts', []);
      // Auto-select the freshly created token. In single mode it REPLACES the
      // current selection (keeps parts length 1); in multi mode it is appended.
      if (figGet(fN2, 'partsMulti', false)) {
        if (arr2.indexOf(newTag) === -1) arr2.push(newTag);
      } else {
        arr2 = [newTag];
      }
      figSet(fN2, 'parts', arr2);
      renderPreserveScroll();
    }
    return;
  }

  var m3Btn = tgt.closest('.m3-btn');
  if(m3Btn){
    // Counts step by 1 for every component now — symmetric pairs are no longer
    // forced to even values (a reviewer may legitimately enter any count).
    var comp = m3Btn.getAttribute('data-comp'), action = m3Btn.getAttribute('data-m3-action'), countField = m3Field(comp,'count'), cur = m3Count(comp);
    if(action === 'inc') cur += 1; if(action === 'dec') cur = Math.max(0, cur - 1);
    S[countField] = cur; renderPreserveScroll(); return;
  }

  var ib = tgt.closest('.ibtn');
  if(ib && !ib.hasAttribute('data-m3-action')){
    var f = ib.getAttribute('data-field'), mn = parseInt(ib.getAttribute('data-min'), 10), mx = parseInt(ib.getAttribute('data-max'), 10), d = ib.hasAttribute('data-dec') ? -1 : 1;
    S[f] = Math.min(mx, Math.max(mn, (S[f] || (f==='archCount'?1:0)) + d)); renderPreserveScroll(); return;
  }
});

document.getElementById('panel').addEventListener('change', function(e){
  var tgt = e.target; if (!tgt || !tgt.dataset) return;
  var field = tgt.dataset.field;

  // Aircraft / prototype name committed. Store it; if it matches a known
  // aircraft that already has a saved M1/M2/M3 snapshot, copy that in (editable)
  // and arm the T2→Done auto-jump. "(No-name aircraft)" stores no name and never
  // copies.
  if (tgt.id === 't1-aircraft-name') {
    var raw = (tgt.value||'').trim();
    if (raw === NO_NAME_AIRCRAFT) { T1_META.aircraftName = ''; S.aircraftAutoJump = false; renderPreserveScroll(); return; }
    T1_META.aircraftName = raw;
    S.aircraftAutoJump = false;
    var hit = raw ? lookupAircraft(raw) : null;
    if (hit && hit.snapshot) {
      applyAircraftSnapshot(hit.snapshot);   // editable pre-fill of M1/M2/M3 (+G1)
      T1_META.aircraftName = hit.display;     // canonical display form
      S.aircraftAutoJump = true;              // Next on T2 skips straight to Done
    }
    renderPreserveScroll(); return;
  }

  if (tgt.hasAttribute('data-t2-arch')) { var fNum = (S.t2figNum||'1').trim(); if(fNum){ figSet(fNum, 'arch', tgt.value); renderPreserveScroll(); } return; }

  if (tgt.hasAttribute('data-fig-bool')) {
    var fNumBool = (S.t2figNum||'1').trim();
    if (fNumBool) { figSet(fNumBool, tgt.getAttribute('data-fig-bool'), tgt.checked); renderPreserveScroll(); }
    return;
  }

  // Part 6: Fu_ unlabeled figure → existing taxonomy FIG. assignment
  if (tgt.hasAttribute('data-fig-reassign')) {
    var srcFig = tgt.getAttribute('data-fig-reassign'), dstFig = tgt.value;
    if (dstFig) { reassignFigure(srcFig, dstFig); markBatchDirty(); renderPreserveScroll(); }
    return;
  }

  // Audit B-03 Fix: Defer t2figNum render to 'change' event to allow multi-digit
  // typing without losing focus. Full render() (not scroll-preserving) here is
  // intentional — switching the active figure resets to a clean top-of-panel view.
  if (field === 't2figNum') { S.t2figNum = tgt.value.trim(); render(); return; }

  if (field === 'isDuplicate') { S[field] = tgt.checked; renderPreserveScroll(); return; }

  if (field && field.indexOf('m3_') === 0 && tgt.type === 'number') {
    // Free counts for all components — no odd→even coercion for symmetric ones.
    var val = parseInt(tgt.value, 10); if (isNaN(val) || val < 0) val = 0;
    S[field] = val; renderPreserveScroll(); return;
  }
  if ((field === 'footLen' || field === 'footWid' || field === 'footHgt') && tgt.type === 'number') {
    var val3 = parseFloat(tgt.value); if (!isFinite(val3) || val3 < 0) val3 = 0;
    S[field] = val3; renderPreserveScroll(); return;
  }
  if (tgt.type === 'checkbox' && (field === 'latSym' || field === 'longSym')) { S[field] = tgt.checked; renderPreserveScroll(); return; }
  if (field && field.indexOf('m3_') === 0 && tgt.type === 'checkbox') {
    // Ticking "symmetric pairs" no longer bumps an odd count up to even —
    // counts are free for all components.
    S[field] = tgt.checked;
    renderPreserveScroll(); return;
  }
  if (tgt.tagName === 'SELECT') { S[field] = tgt.value; renderPreserveScroll(); return; }
});

document.getElementById('panel').addEventListener('input', function(e){
  var tgt = e.target;
  // Clicking a <datalist> suggestion (incl. "(No-name aircraft)") only
  // reliably fires 'input' in some browsers, not 'change' — the 'change'
  // listener below was the only place this got committed, so a datalist
  // click could visually fill the box without ever updating T1_META /
  // re-rendering. Commit immediately here too; the 'change' handler still
  // runs afterwards on blur/Enter and is a harmless no-op repeat.
  if (tgt && tgt.id === 't1-aircraft-name') {
    var rawImmediate = (tgt.value || '').trim();
    if (rawImmediate === NO_NAME_AIRCRAFT) {
      T1_META.aircraftName = ''; S.aircraftAutoJump = false; renderPreserveScroll(); return;
    }
  }
  if (tgt && tgt.hasAttribute && tgt.hasAttribute('data-fig-comment')) {
    var fNumC = (S.t2figNum||'1').trim();
    if (fNumC) figSet(fNumC, 'comment', tgt.value);
    return;
  }
  // Generic per-figure free-text field (e.g. data-fig-text="stateNote").
  if (tgt && tgt.dataset && tgt.dataset.figText) {
    var fNumFT = (S.t2figNum||'1').trim();
    if (fNumFT) figSet(fNumFT, tgt.dataset.figText, tgt.value);
    return;
  }
  if (tgt && tgt.dataset && tgt.dataset.field) {
    var f = tgt.dataset.field;
    if (f === 'duplicateId') S.duplicateId = tgt.value;
    else if (f === 't1DisapproveReason') S.t1DisapproveReason = tgt.value;
    else if (f === 't1DisapproveOther') S.t1DisapproveOther = tgt.value;
    else if (f === 'empNotes') S.empNotes = tgt.value;
    else if (f === 'fusNotes') S.fusNotes = tgt.value;
    else if (f === 'gearNotes') S.gearNotes = tgt.value;
    else if (f === 'wingNotes') S.wingNotes = tgt.value;
    else if (f === 'comments') S.comments = tgt.value;
    else if (f.indexOf('wPlanOth') === 0) S[f] = tgt.value;
    else if (f.indexOf('m3_') === 0 && f.indexOf('_notes') > -1) S[f] = tgt.value;
  }
});

// Wizard width control — cycles Compact (820px) / Wide (1200px) / Full (96vw) via
// the #btn-width-toggle button, persisting the choice in localStorage. Defaults to
// Wide on first use so the 4-column T2 layout has room. The class lives on .wiz
// (which render() never rebuilds), so the choice survives patent navigation.
(function(){
  var ORDER = ['compact','wide','full'];
  var LABEL = { compact:'Compact', wide:'Wide', full:'Full' };
  var wiz = document.querySelector('.wiz');
  var btn = document.getElementById('btn-width-toggle');
  function apply(mode){
    if (ORDER.indexOf(mode) === -1) mode = 'wide';
    if (wiz) {
      wiz.classList.remove('w-wide','w-full');
      if (mode === 'wide') wiz.classList.add('w-wide');
      else if (mode === 'full') wiz.classList.add('w-full');
    }
    if (btn) btn.innerHTML = '↔ Width: ' + LABEL[mode];
    try { localStorage.setItem('wizWidth', mode); } catch(e){}
  }
  var saved; try { saved = localStorage.getItem('wizWidth'); } catch(e){}
  apply(saved || 'wide');
  if (btn) btn.addEventListener('click', function(){
    var cur; try { cur = localStorage.getItem('wizWidth'); } catch(e){}
    cur = (ORDER.indexOf(cur) === -1) ? 'wide' : cur;
    apply(ORDER[(ORDER.indexOf(cur) + 1) % ORDER.length]);
  });
})();

// ── Refresh-safe session persistence ────────────────────────────────────────
// Mirrors the ENTIRE working session into localStorage so an F5 (or even a
// browser/tab close + reopen on the same machine) drops you back on the SAME
// patent, SAME architecture, SAME wizard step, with every reviewed-but-not-yet-
// exported patent, custom token, duplicate-image memory and in-progress edit
// intact — nothing left behind. localStorage (not sessionStorage) is used so it
// also survives closing the window; loading a different "Load Batch" file just
// overwrites it. Everything stored is plain JSON (no DOM/functions), so it
// round-trips cleanly. The batch .xlsx file itself can't be re-opened
// programmatically, so we persist its already-parsed rows (BATCH.byId) instead.
// ── Session persistence (IndexedDB, with a localStorage fallback) ───────────
// Large batches (the whole BATCH.byId row map + REVIEWED_ROWS) can blow past
// localStorage's ~5 MB cap, so the session blob lives in IndexedDB, which has no
// practical size limit. localStorage is kept only as a fallback for environments
// where IndexedDB can't be opened (e.g. some file:// configs), and to migrate a
// session saved by the older localStorage-only build.
var SESSION_KEY = 'evtolTaxonomySession_v1';   // legacy localStorage key (fallback + migration)
var IDB_NAME = 'evtolTaxonomyDB', IDB_STORE = 'session', IDB_KEY = 'current';
var _idbPromise = null, _idbBroken = false;
var _sessionReady = false;     // gate: never persist until restoreSession() has run,
                               // so the first paint can't clobber a saved session
var _persistTimer = null;

function _idbOpen() {
  if (_idbBroken) return Promise.reject('idb-unavailable');
  if (_idbPromise) return _idbPromise;
  _idbPromise = new Promise(function(resolve, reject) {
    var req;
    try { req = indexedDB.open(IDB_NAME, 1); }
    catch (e) { _idbBroken = true; reject(e); return; }
    req.onupgradeneeded = function(){ try { req.result.createObjectStore(IDB_STORE); } catch (e) {} };
    req.onsuccess = function(){ resolve(req.result); };
    req.onerror   = function(){ _idbBroken = true; reject(req.error); };
  });
  return _idbPromise;
}
function _idbPut(value) {
  return _idbOpen().then(function(db){ return new Promise(function(resolve, reject){
    var tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, IDB_KEY);
    tx.oncomplete = function(){ resolve(true); };
    tx.onerror    = function(){ reject(tx.error); };
    tx.onabort    = function(){ reject(tx.error); };
  }); });
}
function _idbGet() {
  return _idbOpen().then(function(db){ return new Promise(function(resolve, reject){
    var tx = db.transaction(IDB_STORE, 'readonly');
    var rq = tx.objectStore(IDB_STORE).get(IDB_KEY);
    rq.onsuccess = function(){ resolve(rq.result || null); };
    rq.onerror   = function(){ reject(rq.error); };
  }); });
}

function _serializeSession() {
  return {
    v: 1, ts: Date.now(),
    S: S, T1_META: T1_META, BATCH: BATCH, REVIEWED_ROWS: REVIEWED_ROWS,
    AIRCRAFT_REGISTRY: AIRCRAFT_REGISTRY, PART_TOKENS: PART_TOKENS,
    EDGE_TOKENS: EDGE_TOKENS, FIGURE_LABEL_REGISTRY: FIGURE_LABEL_REGISTRY,
    FIG_FILENAMES: FIG_FILENAMES, FIG_IMAGE_PATH: FIG_IMAGE_PATH
  };
}
// Write the whole session. Prefer IndexedDB (structured-clone, no size cap); fall
// back to localStorage if IDB is unavailable or its write fails.
function _writeSessionNow() {
  if (!_sessionReady) return;
  var snap = _serializeSession();
  _idbPut(snap).then(function(){
    try { localStorage.removeItem(SESSION_KEY); } catch (e) {}   // drop stale legacy copy
  }).catch(function(){
    // IDB unavailable/failed — best effort to localStorage (may hit quota on huge
    // batches, in which case it degrades silently like the old build did).
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(snap)); } catch (e) {}
  });
}
function persistSession() {
  if (!_sessionReady) return;          // pre-restore renders must not overwrite the save
  if (_persistTimer) return;           // debounce: coalesce bursts of render() calls
  _persistTimer = setTimeout(function(){ _persistTimer = null; _writeSessionNow(); }, 400);
}

// Apply a deserialized snapshot onto the live globals, then paint. Shared by the
// IDB and localStorage-fallback restore paths. Calls done(true) on success,
// done(false) if the snapshot is missing/invalid.
function _applySession(snap, migrateToIdb, done) {
  if (!snap || snap.v !== 1 || !snap.S) { _sessionReady = true; done(false); return; }
  try {
    S = snap.S;
    if (snap.T1_META) T1_META = snap.T1_META;
    BATCH                 = snap.BATCH || null;
    REVIEWED_ROWS         = snap.REVIEWED_ROWS || [];
    AIRCRAFT_REGISTRY     = snap.AIRCRAFT_REGISTRY || {};
    PART_TOKENS           = snap.PART_TOKENS || [];
    EDGE_TOKENS           = snap.EDGE_TOKENS || [];
    FIGURE_LABEL_REGISTRY = snap.FIGURE_LABEL_REGISTRY || {};
    FIG_FILENAMES         = snap.FIG_FILENAMES || {};
    FIG_IMAGE_PATH        = snap.FIG_IMAGE_PATH || {};
    if (BATCH) {
      buildAssigneeGroups(BATCH.byId);    // deterministic derived map — safe to recompute
      var st = document.getElementById('batch-load-status');
      if (st) st.textContent = ' Resumed session — ' + ((BATCH.ids && BATCH.ids.length) || 0)
        + ' patent(s), batch: ' + (BATCH.label || '?') + ' (load a new file to start over).';
      var nav = document.getElementById('batch-nav'); if (nav) nav.style.display = 'flex';
    }
    _sessionReady = true;
    try { if (typeof updateSaveIndicator === 'function') updateSaveIndicator(); } catch (e) {}
    render();
    if (migrateToIdb) _writeSessionNow();   // upgrade a legacy localStorage session into IDB
    done(true);
  } catch (e) {
    _sessionReady = true;
    done(false);
  }
}
// Async restore: IndexedDB first, then the legacy localStorage blob (migrating it
// into IDB), then give up. Calls done(restored) exactly once.
function restoreSession(done) {
  function fromLocalStorage(migrate) {
    var raw = null; try { raw = localStorage.getItem(SESSION_KEY); } catch (e) {}
    if (!raw) { _sessionReady = true; done(false); return; }
    var ls = null; try { ls = JSON.parse(raw); } catch (e) {}
    _applySession(ls, migrate, done);
  }
  _idbGet().then(function(snap){
    if (snap) _applySession(snap, false, done);
    else fromLocalStorage(true);          // nothing in IDB yet — migrate any legacy LS session
  }).catch(function(){
    fromLocalStorage(false);              // IDB unavailable — stay on localStorage
  });
}

// Flush on the events that precede an F5/close/tab-switch. IndexedDB writes are
// async, so these are best-effort for the final still-debounced edit — but the
// per-render debounced writes keep IDB current to within a fraction of a second,
// so at most the last <400 ms of typing is ever at risk.
function _flushSession(){ if (_persistTimer) { clearTimeout(_persistTimer); _persistTimer = null; } _writeSessionNow(); }
window.addEventListener('beforeunload', _flushSession);
window.addEventListener('pagehide', _flushSession);
document.addEventListener('visibilitychange', function(){ if (document.visibilityState === 'hidden') _flushSession(); });

// Bootstrap: resume a saved session if one exists, otherwise first-time render.
restoreSession(function(restored){ if (!restored) render(); });
</script>
</body>
</html>
