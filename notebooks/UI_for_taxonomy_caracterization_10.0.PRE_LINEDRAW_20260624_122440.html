<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eVTOL Taxonomy Wizard v12.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F4F0;--bg2:#EDECE7;--surface:#fff;--border:#D6D5CF;--border2:#C4C3BB;
  --text:#1A1A18;--text2:#5A5955;--text3:#8A8985;
  --accent:#2D5BE3;--accent-bg:#EEF2FD;--accent-bdr:#B8C9F8;--accent-text:#1A3A9E;
  --ok:#1A7F4E;--ok-bg:#EAF6F0;--ok-bdr:#9FD9BC;
  --warn:#9A4F0A;--warn-bg:#FDF3E7;--warn-bdr:#F0C88A;
  --danger:#C0392B;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:6px;--rl:10px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem;font-size:14px;}
.wiz{max-width:820px;margin:0 auto;}
/* User-cyclable wizard width (▷ #btn-width-toggle): Compact = original 820px,
   Wide = roomier for the 4-column T2 layout, Full = nearly the whole window. */
.wiz.w-wide{max-width:1200px;}
.wiz.w-full{max-width:96vw;}
/* In Wide/Full the wizard is too wide for the fixed right-margin main-figure
   panel to clear it, so drop that panel back into normal flow at the top. */
.wiz.w-wide .morph-mainfig, .wiz.w-full .morph-mainfig{position:static;width:auto;max-width:100%;max-height:none;margin:0 auto 14px;right:auto;top:auto;box-shadow:none;}
.wiz-eyebrow{font-size:11px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.3rem;}
.wiz-h{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:.2rem;}
.wiz-sub{font-size:13px;color:var(--text2);margin-bottom:0.75rem;}

/* throughput tracker */
.progress-tracker { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 4px; margin-bottom: 1.5rem; font-family: var(--mono); }
.progress-tracker input { border: none; background: transparent; color: var(--accent); font-weight: 600; width: 44px; text-align: center; font-family: var(--mono); padding: 2px 0; outline: none; border-bottom: 1px dashed var(--border2); font-size: 13px; transition: border-color 0.2s; }
.progress-tracker input:focus { border-bottom-color: var(--accent); }

/* stepper */
.stepper{display:flex;align-items:flex-start;overflow-x:auto;padding-bottom:4px;margin-bottom:1.75rem;}
.s-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:50px;}
.s-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;font-family:var(--mono);color:var(--text3);background:var(--surface);transition:all .2s;flex-shrink:0;}
.s-dot.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.s-dot.done{background:var(--ok-bg);border-color:var(--ok-bdr);color:var(--ok);}
.s-lbl{font-size:10px;color:var(--text3);text-align:center;font-family:var(--mono);max-width:58px;line-height:1.3;}
.s-lbl.active{color:var(--accent-text);font-weight:500;}
.s-lbl.done{color:var(--ok);}
.s-bar{height:1.5px;flex:1;background:var(--border);margin-top:12px;min-width:6px;transition:background .2s;}
.s-bar.done{background:var(--ok-bdr);}

/* breadcrumb */
.bc{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem;min-height:22px;}
.crumb{font-size:11px;font-family:var(--mono);padding:2px 9px;border-radius:999px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);}
.crumb.hi{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent-bdr);}
.crumb.w{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-bdr);}

/* panel */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.p-module{font-size:10px;font-family:var(--mono);font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.35rem;}
.p-q{font-size:17px;font-weight:600;letter-spacing:-.015em;margin-bottom:.3rem;}
.p-hint{font-size:12px;color:var(--text2);margin-bottom:1.25rem;line-height:1.55;}
.sec{font-size:12px;font-weight:500;color:var(--text2);margin:1.25rem 0 .55rem;}

/* options */
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px;margin-bottom:.25rem;}
.og.n{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));}
.opt{padding:12px 14px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;background:var(--surface);transition:all 0.15s ease;position:relative;user-select:none;box-shadow:0 1px 2px rgba(0,0,0,0.02);}
.opt:hover{border-color:var(--text3);background:var(--bg);transform:translateY(-1px);box-shadow:0 3px 5px rgba(0,0,0,0.04);}
.opt.sel{border-color:var(--accent);background:var(--accent-bg);}
.opt.sel::after{content:'\2713';position:absolute;top:8px;right:9px;font-size:11px;color:var(--accent);font-weight:700;}
.opt.dis{opacity:.3;pointer-events:none;}
.o-id{font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:2px;}
.opt.sel .o-id{color:var(--accent);}
.o-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;padding-right:16px;}
.opt.sel .o-name{color:var(--accent-text);}
.o-desc{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.45;}
.opt.sel .o-desc{color:var(--accent-text);opacity:.75;}

/* int stepper */
.irow{display:flex;align-items:center;gap:12px;margin:.75rem 0;}
.ibtn{width:36px;height:36px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);cursor:pointer;font-size:20px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;transition:all 0.2s ease;}
.ibtn:hover{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
.ival{font-size:22px;font-weight:600;font-family:var(--mono);min-width:40px;text-align:center;}
.ilbl{font-size:13px;color:var(--text2);font-weight:500;}

/* flags */
.flag{border-radius:var(--r);padding:10px 13px;font-size:12.5px;line-height:1.5;margin-top:.75rem;}
.flag.warn{background:var(--warn-bg);border:1px solid var(--warn-bdr);color:var(--warn);}
.flag.info{background:var(--accent-bg);border:1px solid var(--accent-bdr);color:var(--accent-text);}
.flag.skip{background:var(--bg2);border:1px solid var(--border);color:var(--text2);}
.f-lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:3px;}

/* nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);}
.btn{padding:10px 24px;border-radius:var(--r);border:1px solid var(--border2);font-size:14px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text);font-family:var(--sans);transition:all 0.2s ease;}
.btn:hover:not(:disabled){background:var(--bg2);border-color:var(--text3);transform:translateY(-1px);}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.pri:hover:not(:disabled){background:#1a45bd;border-color:#1a45bd;}
.btn.danger{background:var(--surface);border-color:var(--danger);color:var(--danger);}
.btn.danger:hover{background:#FDEDEC;}
.btn.danger.sel{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn.danger.sel:hover{background:#a12d22;}
.btn:disabled{opacity:0.4;cursor:not-allowed;background:var(--bg);}
.bgrp{display:flex;gap:12px;align-items:center;}

/* summary blocks */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sb{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;}
.sb.full{grid-column:1/-1;}
.sl{font-size:10px;font-family:var(--mono);font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
.sv{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;}
.code{margin-top:8px;background:var(--text);border-radius:var(--r);padding:10px 14px;font-family:var(--mono);font-size:13px;color:#E8E7E0;word-break:break-all;}
.reset{font-size:12px;font-family:var(--mono);color:var(--text3);cursor:pointer;text-decoration:underline;}

.comments-wrap{margin-top:1rem;}
.comments{width:100%;min-height:96px;resize:vertical;border-radius:var(--rl);border:1px solid var(--border2);background:var(--bg);color:var(--text);font:13px/1.55 var(--sans);padding:12px 13px;}
.comments:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,91,227,.12);background:var(--surface);}

/* propulsion & structural modules */
.m2-shell, .m3-shell{display:grid;gap:12px;}
.m2-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px;margin-bottom:.2rem;}
.m2-card, .m3-card{border:1px solid var(--border);border-radius:var(--rl);background:linear-gradient(180deg,var(--surface),var(--bg));padding:14px;}
.m2-head, .m3-head{font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--text);margin-bottom:4px;}
.m2-sub, .m3-sub{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:10px;}
.m3-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;}
.m3-field{display:flex;flex-direction:column;gap:6px;}
.m3-label{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);}
.m3-num, .m3-readonly{width:100%;padding:10px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font:600 14px var(--mono);}
.m3-num:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,91,227,.12);}
.m3-readonly{background:var(--bg);color:var(--accent-text);}
.m3-footnote{font-size:11px;color:var(--text2);line-height:1.45;margin-top:2px;}
.m2-zone, .m3-zone{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:7px;}
.m2-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;}
.m2-count-wrap{display:flex;align-items:center;gap:8px;}
.m2-count{width:92px;padding:9px 10px;border-radius:var(--r);border:1px solid var(--border2);font:600 14px var(--mono);text-align:center;}
.m2-check{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);cursor:pointer;}
.m2-kv{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:10px 0 4px;}

/* Details/Summary overrides for T1 Citations */
details.m3-readonly { cursor: pointer; transition: background 0.2s ease; overflow:hidden; }
details.m3-readonly[open] { background: var(--surface); border-color: var(--text3); }
details.m3-readonly summary { outline: none; font-weight: 600; user-select: none; display: flex; align-items: center; justify-content: space-between; margin: -10px -11px; padding: 10px 11px; font-family: var(--sans); font-size:14px; color:var(--text);}
details.m3-readonly summary::-webkit-details-marker { display: none; }
details.m3-readonly summary::after { content: '+'; font-size: 16px; font-weight: 400; color: var(--text3); font-family:var(--mono); }
details.m3-readonly[open] summary::after { content: '\2212'; }
.cite-list { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border2); font-size: 13px; font-weight: 400; line-height: 1.55; color: var(--text2); font-family: var(--sans); }
.cite-link { color: var(--accent); text-decoration: none; font-weight: 500; border-bottom: 1px dotted var(--accent); padding-bottom: 1px;}
.cite-link:hover { background: var(--accent-bg); }

/* progressive UI structures */
.g1-master-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:4px;}
.g1-master{border:1px solid var(--border);border-radius:var(--rl);background:linear-gradient(180deg,var(--surface),var(--bg));padding:14px;cursor:pointer;transition:all .18s ease;}
.g1-master:hover{border-color:var(--text3);transform:translateY(-1px);}
.g1-master.sel{border-color:var(--accent);background:var(--accent-bg);}
.g1-master-lbl{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;}
.g1-master.sel .g1-master-lbl{color:var(--accent-text);}
.g1-master-desc{font-size:12px;color:var(--text2);line-height:1.45;}
.g1-panel{display:none;opacity:0;margin-top:12px;}
.g1-panel.open{display:block;opacity:1;}
.g1-subcard{border:1px solid var(--border);border-radius:var(--rl);background:var(--surface);padding:14px;margin-bottom:10px;}
.g1-subhead{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.g1-subdesc{font-size:12px;color:var(--text2);margin-bottom:10px;}
.g1-subgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px;}
.g1-subbtn, .t1-scopebtn{border:1px solid var(--border);border-radius:var(--r);background:var(--bg);padding:12px;text-align:left;cursor:pointer;transition:all .16s ease;width:100%;}
.g1-subbtn:hover, .t1-scopebtn:hover{border-color:var(--text3);transform:translateY(-1px);}
.g1-subbtn.sel, .t1-scopebtn.sel{border-color:var(--accent);background:var(--accent-bg);}
.g1-subid{font-size:10px;font-family:var(--mono);text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
.g1-subbtn.sel .g1-subid, .g1-subbtn.sel .g1-subname, .t1-scopebtn.sel .g1-subname{color:var(--accent-text);}
.g1-subname{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.g1-subtxt{font-size:11px;color:var(--text2);}

/* T2 Image Module Layout */
.t2-split{display:flex;gap:20px;align-items:flex-start;height:calc(100vh - 220px);}
@media (max-width:768px){.t2-split{flex-direction:column; height:auto;}}
.t2-left{flex:1;min-width:280px;background:var(--bg2);padding:16px;border-radius:var(--rl);height:100%;overflow-y:auto;border:1px solid var(--border);}
.t2-right{flex:1.5;min-width:0;display:flex;flex-direction:column;gap:4px;height:100%;overflow-y:auto;padding-right:8px;}
/* 4-column T2 layout (Task B): image | thumbnails | tag group 1 | tag group 2.
   Each column scrolls independently so a long column never stretches the others. */
.t2-grid4{display:grid;grid-template-columns:1.35fr 1fr 1fr 1.05fr;gap:14px;align-items:stretch;height:calc(100vh - 200px);}
.t2-col{min-width:0;height:100%;overflow-y:auto;}
.t2-col-img{background:var(--bg2);padding:14px;border-radius:var(--rl);border:1px solid var(--border);}
.t2-col-thumbs,.t2-col-tags{padding-right:6px;}
@media (max-width:1200px){.t2-grid4{grid-template-columns:1fr 1fr;height:auto;}.t2-col{height:auto;max-height:70vh;}}
@media (max-width:768px){.t2-grid4{grid-template-columns:1fr;height:auto;}.t2-col{height:auto;max-height:none;overflow:visible;}}
/* Sticky main-figure helper on the G1/M1/M2/M3 morphology pages (Task B). On wide
   screens it floats in the empty right margin beside the 820px-wide wizard; on
   narrower screens it drops into normal flow at the top so it never overlaps. */
.morph-mainfig{position:fixed;top:88px;right:16px;width:220px;max-height:48vh;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:0 2px 10px rgba(0,0,0,.10);padding:10px;z-index:50;}
.morph-mainfig-lbl{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px;}
.morph-mainfig img{width:100%;max-height:38vh;object-fit:contain;border-radius:6px;border:1px solid var(--border);background:var(--bg2);display:block;}
@media (max-width:1300px){.morph-mainfig{position:static;width:auto;max-width:820px;max-height:none;margin:0 auto 14px;right:auto;top:auto;box-shadow:none;}.morph-mainfig img{max-height:34vh;}}
.highlight-fig{background:var(--warn-bg);color:var(--warn);font-weight:600;padding:2px 6px;border-radius:4px;border:1px solid var(--warn-bdr);display:inline-block;margin-bottom:4px;}

/* Custom Scrollbar for inner panes */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>
<div class="wiz">
  <div class="wiz-eyebrow">eVTOL Taxonomy Builder v12.0</div>
  <div id="batch-load-bar" style="display:flex;align-items:center;gap:10px;margin-bottom:.5rem;padding:10px 14px;background:var(--accent-bg);border:1px solid var(--accent-bdr);border-radius:var(--r);flex-wrap:wrap;">
    <span style="font-size:11px;font-family:var(--mono);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-text);">Load Batch</span>
    <input type="file" id="batch-xlsx-input" accept=".xlsx" style="font-size:12px;color:var(--text2);">
    <span id="batch-load-status" style="font-size:12px;font-family:var(--mono);color:var(--text3);"></span>
    <span id="batch-nav" style="display:none;align-items:center;gap:6px;margin-left:auto;">
      <button type="button" id="btn-open-pdf" class="btn" style="padding:4px 10px;font-size:12px;" title="Open this patent's source PDF in its own side-by-side viewer window (display 2)">&#128196; Open PDF</button>
      <button type="button" id="btn-set-viewer" class="btn" style="padding:4px 10px;font-size:12px;" title="Pick exactly where the EPO record and PDF windows open on display 2 — drag/size the placeholder, then save. Remembered across patents and refreshes; re-run any time.">&#128205; Set viewer area</button>
      <button type="button" id="batch-prev" class="btn" style="padding:4px 10px;font-size:12px;">&#9664; Prev</button>
      <span id="batch-nav-label" style="font-size:12px;font-family:var(--mono);color:var(--text2);"></span>
      <span id="batch-save-status" style="font-size:11px;font-family:var(--mono);font-weight:600;letter-spacing:.04em;padding:2px 8px;border-radius:999px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);white-space:nowrap;" title="Whether the patent currently on screen has been written into the reviewed .xlsx buffer">&#8226; Unsaved</span>
      <button type="button" id="batch-next" class="btn" style="padding:4px 10px;font-size:12px;">Next &#9654;</button>
      <button type="button" id="batch-export" class="btn" style="padding:4px 10px;font-size:12px;" title="Download reviewed rows accumulated so far for this batch">&#11015; Export batch <span id="batch-saved-count" style="opacity:.7;"></span></button>
    </span>
    <button type="button" id="btn-width-toggle" class="btn" style="padding:4px 10px;font-size:12px;margin-left:8px;" title="Cycle the wizard width: Compact (820px) / Wide (1200px) / Full (96% of the window)">&#8596; Width: Wide</button>
  </div>
  <div class="wiz-h">Full Morphological Tree Classifier</div>
  <div class="wiz-sub">Audit Patches: Dictionary Data Architecture, Throughput Decoupling, JSON Export, and Keyboard Navigation.</div>
  <div id="throughput" class="progress-tracker"></div>
  <div class="stepper" id="stepper"></div>
  <div class="bc" id="bc"></div>
  <div id="aircraft-header" style="
    position:sticky;top:0;z-index:50;
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:6px 16px;display:flex;align-items:center;gap:12px;">
    <span style="font-size:11px;font-family:var(--mono);color:var(--text3);" id="hdr-id"></span>
    <span style="color:var(--border);">|</span>
    <span style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.04em;">Prototype</span>
    <span style="font-size:13px;font-weight:600;color:var(--text);" id="hdr-name"></span>
  </div>
  <div class="panel" id="panel"></div>
</div>
<!-- SheetJS — parses ml_predict_labels_<batch>.xlsx client-side for the batch loader below -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
// --- CORE PATENT DATA EXTRACTED FROM FILE DATASET ---
var T1_META = {
  recordNumber: 'REC-1627-0001',
  familyId: 'DOCDB-2022-00145-US',  // Included per Audit G-04
  priorityDate: '2021-03-15',
  patentType: 'Application',
  assignee: 'Dataset placeholder / Assignee',
  pubYear: '2026',
  appYear: '2024',
  targetModel: 'Joby S4 / Generic Placeholder',
  macroDomain: 'Aviation / Electric Propulsion',
  pdfLink: 'https://worldwide.espacenet.com/patent/search?q=pn%3DUS20220145A1',
  backwardCites: ['US-20220145-A1', 'US-1029348-B2', 'EP-3482910-A1', 'US-987349-B1', 'WO-20214829-A1'],

// back to their slot, then load idx's stored profile into the flat keys (or a
// blank morphology if that arch hasn't been visited yet). m3_* keys are cleared
// by applyAircraftSnapshot so one arch never inherits another's propulsion rows.
function loadArchProfile(idx) {
  if (!S.archProfiles) S.archProfiles = [];
  // stash current edits first (unless we're loading the very slot we're on)
  if (idx !== S.curArch || S.archProfiles[S.curArch] == null) saveCurArchProfile();
  S.curArch = idx;
  var prof = S.archProfiles[idx];
  if (prof) {
    applyAircraftSnapshot(prof);

    var blank = fresh();
    Object.keys(S).forEach(function(k){ if (k.indexOf('m3_') === 0) delete S[k]; });

  var key = disp.toLowerCase();
  if (!AIRCRAFT_REGISTRY[key]) AIRCRAFT_REGISTRY[key] = { display: disp, rawNames: [], snapshot: null };
  if (AIRCRAFT_REGISTRY[key].rawNames.indexOf(rawName) === -1) AIRCRAFT_REGISTRY[key].rawNames.push(rawName);

// Fuzzy lookup: exact normalized match first, then a lightweight near-match
// (case/space-insensitive prefix or small edit distance) so minor spelling
// variants resolve to the same aircraft. Returns the registry entry or null.
function lookupAircraft(rawName) {
  var disp = normalizeAircraftName(rawName);
  if (!disp || disp === NO_NAME_AIRCRAFT) return null;
  var key = disp.toLowerCase();
  if (AIRCRAFT_REGISTRY[key]) return AIRCRAFT_REGISTRY[key];
  // fuzzy: compare the de-spaced lowercase forms
  var probe = key.replace(/\s+/g,'');
  var best = null, bestD = 1e9;
  Object.keys(AIRCRAFT_REGISTRY).forEach(function(k){
    var cand = k.replace(/\s+/g,'');
    var d = _editDistance(probe, cand);
    // accept if identical de-spaced, or within a small distance relative to length
    if (d < bestD && d <= Math.max(1, Math.floor(Math.min(probe.length,cand.length)*0.15))) { bestD = d; best = AIRCRAFT_REGISTRY[k]; }
  });
  return best;
}

function _editDistance(a, b) {
  if (a === b) return 0;
  var m=a.length, n=b.length, dp=[]; for(var i=0;i<=m;i++) dp[i]=[i];
  for(var j=1;j<=n;j++) dp[0][j]=j;
  for(i=1;i<=m;i++) for(j=1;j<=n;j++)
    dp[i][j]=Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return dp[m][n];
}

var ASSIGNEE_GROUPS = {};

  ASSIGNEE_GROUPS = {};

    var row = (byId[pid]||[]).find(function(r){ return r.Field === 'assignee'; });

    var key = raw.toLowerCase();

    if (ASSIGNEE_GROUPS[key].patentIds.indexOf(pid) === -1) ASSIGNEE_GROUPS[key].patentIds.push(pid);

function lookupAssigneeGroup(assignee) {
  var raw = (assignee || '').trim();
  if (!raw) return null;

  if (!g) return null;
  return { count: g.patentIds.length, isRepeat: g.patentIds.length > 1,

        if (!fd0.per)   miss.push('Perspective');
        if (!fd0.acSty) miss.push('Rendering Style');
        if (!fd0.acCol) miss.push('Rendering Color');
        if (!fd0.bgSty) miss.push('Background Style');
        if (!fd0.bgCol) miss.push('Background Color');
        b.push('FIG. ' + f0 + ' needs: ' + miss.join(', '));
      }
    }
    return b;
  }
  if(sid=='gate') { if(!S.topType) b.push('Select an architecture topology'); return b; }
  if(sid=='m1') {
    if (isOtherArch()) return b;   // Novel/Other: M1 is free-text commentary, nothing required
    if (S.footAmbiguous) return b;
    if (!S.footLen || !S.footWid || !S.footHgt) b.push('Enter footprint dimensions (or Bypass)');
    if (!S.fusShape) b.push('Fuselage shape');
    if (!S.fusKin)   b.push('Fuselage kinematics');
    if (!S.gearArch) b.push('Landing gear architecture');
    return b;
  }
  if(sid=='m2') {
     if (isOtherArch()) return b;   // Novel/Other: M2 is free-text commentary, nothing required
     if (isWinged()) {
        if (!S.wingConf) { b.push('Wing configuration'); }
        else if (S.wingConf == 'W') {
          for (var i = 1; i <= S.wCount; i++) {
            if (!S['wTilt' + i] || !S['wPosV' + i] || !S['wPosL' + i] || !S['wPlan' + i]) { b.push('Wing ' + i + ' position/planform'); }
            else if (i > 1 && !S['wRole' + i]) { b.push('Wing ' + i + ' role'); }
            else if (S['wPlan' + i] === 'Oth' && !(S['wPlanOth' + i]||'').trim()) { b.push('Wing ' + i + ' planform "Other" detail'); }
          }
        }
     }
     if (!S.empType) b.push('Empennage type');
     else if (S.empType != 'Tailless' && S.empType != 'Fins' && S.empType != 'VertFin' && (S.topType=='RC' || isWinged()) && !S.empKin) b.push('Empennage kinematics');
     return b;
  }
  if(sid=='m3') { if (isOtherArch()) return b; if(!m3Ready()) b.push('Complete propulsion fields for each active component'); return b; }
  return b;
}

function canGo(){ return nextBlockers().length === 0; }

function buildLbl() {
  var p=[];
  if(S.t1Scope) p.push(S.t1Scope.replace(/\s+/g, ''));
  if(S.topType) p.push(S.topType);
  if(isWinged() && S.wingConf) p.push(S.wingConf + (S.wingConf=='W'?'\u00d7'+S.wCount:''));
  if (isWinged() && S.wingConf == 'W') {
    for (var i = 1; i <= S.wCount; i++) {
      if (S['wPosV' + i] || S['wPosL' + i] || S['wPlan' + i]) {
        var wParts = [S['wTilt' + i]==='Tilt'?'T':'F', S['wPosV' + i], S['wPosL' + i], S['wPlan' + i] === 'Oth' ? 'Oth' : S['wPlan' + i]];
        if (i > 1 && S['wRole' + i]) wParts.unshift(S['wRole' + i]);
        p.push('W' + i + ':' + wParts.filter(Boolean).join('-'));
      }
    }
  }
  if(S.empType) p.push(S.empType.split(' ')[0]);
  if(S.fusShape) p.push('FUS:'+S.fusShape);
  if(S.latSym) p.push('LSYM');
  if(S.longSym) p.push('FSYM');
  
  var activeBlueprints = m3Blueprints();
  activeBlueprints.forEach(function(bp){
    var cnt = m3Count(bp.key);
    if(cnt > 0) p.push(bp.key.toUpperCase()+'x'+cnt);
  });

function m3Field(key, suffix) { return 'm3_' + key + '_' + suffix; }
// TP physics lock: tilt propulsors articulate by definition, so force
// propKin = Tilt across every possible M3 component (the component set is
// dynamic, so cover all known keys). Mirrored by the render-time lock in
// m3Card() and the export-time force in buildExport().
function lockPropKinTilt() {
  ['core_layout','hull_array','fuselage','emp','wing1','wing2','wing3','wing4'].forEach(function(k){
    S[m3Field(k,'propKin')] = 'Tilt';
  });
}

// ── Architecture physics locks (M3 Propulsor Articulation) ──────────────────
// Single source of truth for the approved physics matrix: which architectures
// FIX how the propulsor articulates vs leave it free. Used by the M3 render
// (m3Card), the lock-application points (ingestAI / topType click) and the
// export (buildMorphologyObj) so the three never drift.
//   TP → Tilt (the propulsors are what tilt)
//   RC → Cyclic (helicopter main rotor swashplate)
//   TW/DS/SLC/SRW/MR → Fixed (nothing articulates independently)
//   CVT (and anything else) → null = reviewer is free (so "both tilt ⇒ CVT" holds)
function propKinLock(topType){
  if (topType === 'TP') return 'Tilt';
  if (topType === 'RC') return 'Cyclic';
  if (['TW','DS','SLC','SRW','MR'].indexOf(topType) > -1) return 'Fixed';
  return null;
}
function applyPropKinLock(){
  var locked = propKinLock(S.topType);
  if (!locked) return;
  ['core_layout','hull_array','fuselage','emp','wing1','wing2','wing3','wing4'].forEach(function(k){
    S[m3Field(k,'propKin')] = locked;
  });
}
function propKinLockReason(topType){
  return ({
    TP:'the propulsors themselves tilt to vector thrust',
    TW:'the rotors are fixed to the wing — the wing tilts, the rotors do not tilt on their own (if they did, it would be CVT)',
    DS:'fixed propellers; the flaps deflect the slipstream, so the props do not articulate',
    SLC:'separate fixed lift and fixed cruise units — nothing tilts',
    SRW:'the rotor stops and locks for cruise rather than tilting',
    MR:'distributed fixed rotors — thrust is set by RPM, not articulation',
    RC:'helicopter main rotor uses cyclic / collective via the swashplate'
  })[topType] || '';
}
// Short, human label for a topType — used by the unified physics-lock banner.
function archShort(topType){
  return ({TW:'Tilt Wing',TP:'Tilt Propulsors',DS:'Deflected Slipstream',CVT:'Combined Thrust',
    SLC:'Lift + Cruise',SRW:'Stopped Rotor',RC:'Rotorcraft',MR:'Multirotor',
    HB:'Hoverbike',PFV:'Personal Flying Vehicle'})[topType] || (topType || '');
}
// One consistent banner for every taxonomy/physics lock across M2 and M3, so the
// pages read the same regardless of architecture (only the reason text changes).
function physicsLock(topType, reason){
  return '<div class="flag skip"><span class="f-lbl">🔒 Physics Lock — ' + archShort(topType) + '</span>' + reason + '</div>';
}
function m3Get(key, suffix, fallback) {
  var field = m3Field(key, suffix);
  if (typeof S[field] == 'undefined' || S[field] === null || S[field] === '') return fallback;
  return S[field];
}
function m3Count(key) { return parseInt(m3Get(key, 'count', 0), 10) || 0; }
function m3Sym(key) {
  var bp = m3Blueprints().find(function(item){ return item.key === key; });
  var fallback = bp ? bp.defaultSym !== false : true;
  return m3Get(key, 'sym', fallback) !== false && m3Get(key, 'sym', fallback) !== 'false';
}
function m3WingLabel(i) {
  var parts = [];
  if (S['wPosV' + i]) parts.push(labelFor(W_POS_V, S['wPosV' + i]));
  if (S['wPosL' + i]) parts.push(labelFor(W_POS_L, S['wPosL' + i]));
  return parts.length ? parts.join(' / ') : 'Unspecified';
}

function m3Blueprints() {
  if (S.topType === 'RC' || S.topType === 'MR') return [{key:'core_layout', title:'Main Rotor Layout', subtitle:'Central vertical thrust mechanics.', zoneMode:true, defaultSym:false}];
  if (!isWinged() || S.wCount === 0 || ['BWB', 'FW', 'LB'].indexOf(S.wingConf) > -1) {
    var fallbackCards = [];
    if (['BWB', 'FW', 'LB'].indexOf(S.wingConf) > -1) {
      fallbackCards.push({key:'hull_array', title:'Integrated Hull Edge Array', subtitle:'Propulsion mapped directly to the lifting body edges.', zoneMode:true, defaultSym:S.latSym, isHull:true});
    } else {
      fallbackCards.push({key:'core_layout', title:'Fuselage & Airframe Hub Array', subtitle:'Primary propulsion allocation grid.', zoneMode:true, defaultSym:S.latSym});
    }
    if (S.empType && S.empType != 'Tailless') {
      fallbackCards.push({key:'emp', title:'Empennage [' + labelFor(EMP_TYPE, S.empType) + ']', subtitle:'Tail stabilizer structural thrusters.', defaultSym:S.latSym});
    }
    return fallbackCards;
  }
  var cards = [];
  for (var i = 1; i <= S.wCount; i++) {
    cards.push({key:'wing' + i, title:'Wing ' + i + ' [' + m3WingLabel(i) + ']', subtitle:'Independent thruster allocations across this wing.', defaultSym:true, zoneMode:true});
  }
  cards.push({key:'fuselage', title:'Fuselage Body', subtitle:'Central structure, cabin spine, or structural outriggers.', defaultSym:false, zoneMode:true});
  if (S.empType && S.empType != 'Tailless') {
    cards.push({key:'emp', title:'Empennage / Tail [' + labelFor(EMP_TYPE, S.empType) + ']', subtitle:'Stabilizer control thrusters.', defaultSym:false, zoneMode:true});
  }
  return cards;
}

function m3OrientationOptions() {
  // orient vocab [Horizontal, Vertical, Mixed] — identical across the stack
  // (vlm_extractor.py / cross_modal.py / reviewer.py / excel_schema.py).

  if (isIndependentThrust()) return [{id:'Vertical', n:'Vertical / Lift Engine'},{id:'Horizontal', n:'Horizontal / Cruise Pusher'}];
  return [{id:'Horizontal', n:'Horizontal (Cruise)'},{id:'Vertical', n:'Vertical (Hover)'},{id:'Mixed', n:'Mixed (Vectoring / Tilting)'}];

function m3ZoneOptions(bp) {

  return [{id:'Nose', n:'Nose/Forward'},{id:'Aft', n:'Aft/Pusher'},{id:'Side', n:'Side Outriggers'},{id:'Dorsal', n:'Dorsal/Top'},{id:'Ventral', n:'Ventral/Bottom'}];

function m3ZoneChordOptions() { return [{id:'LE', n:'Leading Edge'},{id:'TE', n:'Trailing Edge'},{id:'Above', n:'Above Surface'},{id:'Below', n:'Below Surface'}]; }
function m3ZoneSpanOptions() { return [{id:'Inboard', n:'Inboard (Near Fuselage)'},{id:'MidSpan', n:'Mid-Span'},{id:'Outboard', n:'Outboard (Near Tip)'},{id:'Wingtip', n:'Wingtip'}]; }

function m3TotalCount() { return m3Blueprints().reduce(function(sum, bp){ return sum + m3Count(bp.key); }, 0); }
function m3DistributedFlag() {
  var total = m3TotalCount();
  if (S.topType === 'MR') return {cls:'info', text:'Multi-Rotor (Native DEP — not wing-integrated)'};
  if (S.topType === 'RC') return {cls:'skip', text:'Rotorcraft — Single/Coaxial Hub Architecture'};

function m3Card(bp) {
  var count = m3Count(bp.key), sym = m3Get(bp.key, 'sym', bp.defaultSym);
  var chord = m3Get(bp.key, 'chord', null), orient = m3Get(bp.key, 'orient', null), bmech = m3Get(bp.key, 'bmech', null), rmech = m3Get(bp.key, 'rmech', null);
  var zone = m3Get(bp.key, 'zone', null), zoneChord = m3Get(bp.key, 'zoneChord', null), zoneSpan = m3Get(bp.key, 'zoneSpan', null);
  var notes = m3Get(bp.key, 'notes', '');
  var isRotorcraft = (S.topType === 'RC' || S.topType === 'MR');

  var h = '<div class="m3-card"><div class="m3-head">' + bp.title + '</div><div class="m3-sub">' + bp.subtitle + '</div><div class="m2-tools"><div class="m2-row">';

  if (isRotorcraft) {
     if(S.topType === 'RC') h += '<div class="flag info" style="margin-top:0;">Single/Coaxial Main Hub Prescribed</div>';
     else h += '<div class="m2-count-wrap"><button class="m3-btn ibtn" type="button" data-m3-action="dec" data-comp="' + bp.key + '">−</button><input class="m2-count" type="number" min="0" step="1" inputmode="numeric" data-field="' + m3Field(bp.key,'count') + '" value="' + count + '"><button class="m3-btn ibtn" type="button" data-m3-action="inc" data-comp="' + bp.key + '">+</button></div>';
  } else {
     h += '<div class="m2-count-wrap"><button class="m3-btn ibtn" type="button" data-m3-action="dec" data-comp="' + bp.key + '">−</button><input class="m2-count" type="number" min="0" step="1" inputmode="numeric" data-field="' + m3Field(bp.key,'count') + '" value="' + count + '"><button class="m3-btn ibtn" type="button" data-m3-action="inc" data-comp="' + bp.key + '">+</button></div><label class="m2-check"><input type="checkbox" data-field="' + m3Field(bp.key,'sym') + '" ' + (sym ? 'checked' : '') + '> Laterally Symmetric Pairs</label>';
  }
  h += '</div></div>';

  if (count > 0 || S.topType === 'RC') {
    if (S.topType == 'DS') h += physicsLock('DS', 'wing thrusters must sit along the leading edge to blow the deflection flaps; the propellers themselves stay fixed.');
    if (isRotorcraft) {
      h += physicsLock(S.topType, 'thrust kinematics and spatial localization are taxonomy-fixed for a rotorborne hub — only the blade / rotor type is recorded here (articulation is ' + (propKinLock(S.topType) || 'n/a') + ').');
      h += '<div class="m2-kv">Visual Blade/Rotor Classification</div>' + grid('', BLADE_MECH.map(function(o){ return oc(m3Field(bp.key,'bmech'), o.id, o.n); }));
    } else {
      h += '<div class="m2-kv">Rotor Chordwise Position</div>' + grid('', CHORD.map(function(o){ return oc(m3Field(bp.key,'chord'), o.id, o.n, o.d); }));
      
      if (S.topType === 'TW' && bp.key.indexOf('wing') > -1) {
        // Tilt-wing: the propulsor is bolted to the wing, so its ARTICULATION is
        // locked (propKin, below). Its thrust DIRECTION still sweeps as the wing
        // rotates, so orient stays a free choice — Mixed is offered as an option.
        h += '<div class="m2-kv">Thrust Kinematics</div>'
           + '<div class="m3-sub" style="margin-bottom:4px;">Tilt-wing: the whole wing rotates, so the wing-mounted thrust vectors with it — pick <b>Mixed</b> for the airframe-relative sweep, or <b>Horizontal</b> if you mean relative to the wing chord.</div>'
           + grid('', m3OrientationOptions().map(function(o){ return oc(m3Field(bp.key,'orient'), o.id, o.n); }));
      } else {
        h += '<div class="m2-kv">Thrust Kinematics</div>' + grid('', m3OrientationOptions().map(function(o){ return oc(m3Field(bp.key,'orient'), o.id, o.n); }));
      }

      h += '<div class="m2-kv">Aerodynamic Blade Behavior</div>' + grid('', BLADE_MECH.map(function(o){ return oc(m3Field(bp.key,'bmech'), o.id, o.n); }));
      h += '<div class="m2-kv">Retraction Kinematics</div>' + grid('', RETRACT_MECH.map(function(o){ return oc(m3Field(bp.key,'rmech'), o.id, o.n); }));

      // Propulsor Articulation (propKin) — locked per the architecture physics
      // matrix (propKinLock): TP→Tilt, TW/DS/SLC/SRW→Fixed, CVT free. The locked
      // value is shown selected+disabled, forced again in buildExport, and the
      // unified physics-lock banner explains why.
      var pkLock = propKinLock(S.topType);
      var propKinLocked = !!pkLock;
      if (propKinLocked) h += physicsLock(S.topType, propKinLockReason(S.topType) + '.');
      h += '<div class="m2-kv">Propulsor Articulation' + (propKinLocked ? ' (Locked)' : '') + '</div>' + grid('', PROP_KIN.map(function(o){
        var sel = propKinLocked ? (o.id === pkLock) : (m3Get(bp.key,'propKin',null) === o.id);
        return '<div class="opt' + (sel ? ' sel' : '') + (propKinLocked ? ' dis' : '') + '" data-field="' + m3Field(bp.key,'propKin') + '" data-val="' + encodeURIComponent(o.id) + '" title="' + o.n + '"><div class="o-name">' + o.n + '</div></div>';
      }));
    }
    
    if (bp.zoneMode) {
        if (bp.key.indexOf('wing') > -1) {
            h += '<div class="m2-kv">Wing Chordwise Position</div><div class="m2-zone">' + m3ZoneChordOptions().map(function(o){ return oc(m3Field(bp.key,'zoneChord'), o.id, o.n); }).join('') + '</div>';
            h += '<div class="m2-kv">Wing Spanwise Position</div><div class="m2-zone">' + m3ZoneSpanOptions().map(function(o){ return oc(m3Field(bp.key,'zoneSpan'), o.id, o.n); }).join('') + '</div>';
        } else {
            h += '<div class="m2-kv">Airframe Mounting Zones</div><div class="m2-zone">' + m3ZoneOptions(bp).map(function(o){ return oc(m3Field(bp.key,'zone'), o.id, o.n); }).join('') + '</div>';
        }
    }
  }

  var cleanTitle = bp.title.replace(/\s*\[.*?\]/g, '');
  h += '<div class="m3-field" style="margin-top:12px; padding-top:12px; border-top:1px dashed var(--border2);"><div class="m3-label">' + escHtml(cleanTitle) + ' Edge-Case Notes</div><textarea class="comments" style="min-height:48px;" data-field="' + m3Field(bp.key, 'notes') + '" placeholder="Log ' + escHtml(cleanTitle.toLowerCase()) + ' propulsive edge cases...">' + escHtml(notes) + '</textarea></div>';
  h += '</div>';
  return h;
}

function m3Ready(){
  if (S.topType === 'RC') return !!m3Get('core_layout', 'bmech'); 
  var cards = m3Blueprints(), anyCount = false;
  for (var i = 0; i < cards.length; i++) {
    var bp = cards[i], count = m3Count(bp.key);
    if (count > 0) anyCount = true;
    if (count > 0) {
      // (Symmetric components no longer require an even count — any count is valid.)
      if (S.topType !== 'RC') {
        if (!m3Get(bp.key, 'chord') || !m3Get(bp.key, 'orient') || !m3Get(bp.key, 'bmech') || !m3Get(bp.key, 'rmech')) return false;
      }
      if (bp.zoneMode) {
        if (bp.key.indexOf('wing') > -1) {
            if (!m3Get(bp.key, 'zoneChord') || !m3Get(bp.key, 'zoneSpan')) return false;
        } else {
            if (!m3Get(bp.key, 'zone')) return false;
        }
      }
    }
  }
  return anyCount;
}

function m1FootprintArea() { var len = parseFloat(S.footLen), wid = parseFloat(S.footWid); if (!isFinite(len) || !isFinite(wid)) return ''; return (len * wid).toFixed(2); }
function labelFor(list, id) { var item = list.find(function(x){ return x.id === id; }); return item ? item.n : id; }
function escHtml(txt) { return String(txt || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
// Canonicalise an aircraft/prototype name so entries differing only by
// capitalization (e.g. "joby s4" vs "JOBY S4" vs "Joby S4") collapse to one
// consistent display form. Title-cases every word so casing variants always
// agree; alphanumeric designators (tokens containing a digit, e.g. S4, X2,
// 216, EH216) are uppercased since their canonical form is upper-case.
function normalizeAircraftName(name) {
  var s = String(name || '').trim().replace(/\s+/g, ' ');
  if (!s) return '';
  return s.split(' ').map(function(w){
    if (/\d/.test(w)) return w.toUpperCase();   // designators: S4, X2, 216, EH216…
    return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
  }).join(' ');
}
function wingField(base, idx) { return base + idx; }

function t2AllFigNums() {
  var nums = Object.keys(S.figData);
  var re = /FIG\.?\s*(\d+[A-Za-z]?)/gi, m;
  while ((m = re.exec(T1_META.descriptionOfDrawings))) {
    var n = m[1];
    if (nums.indexOf(n) === -1) nums.push(n);
  }
  nums = nums.filter(function(v,i,a){ return a.indexOf(v)===i; });
  nums.sort(function(a,b){
    var na = parseInt(a,10), nb = parseInt(b,10);
    if (na !== nb) return na-nb;
    return a.localeCompare(b);
  });
  return nums;
}

// Real, numbered FIG. entries from the patent's own description of drawings —
// the existing taxonomy framework that unlabeled Fu_ images get assigned into.
// Excludes Fu_ placeholder keys so the dropdown never offers another unlabeled
// figure as a target.
function t2RealFigNums() {
  return t2AllFigNums().filter(function(n){ return !/^Fu/i.test(n); });
}

// Merge an unlabeled Fu_ figure's data into an existing real FIG. entry
// (Part 6: no free-text labeling field — reassignment reuses the structured
// taxonomy that's already there). Existing target values win on conflict;
// the Fu_ entry's values only fill gaps. Updates t2figNum/mainFigure if they
// pointed at the now-removed Fu_ key.
function reassignFigure(sourceFig, targetFig) {
  if (!sourceFig || !targetFig || sourceFig === targetFig) return;
  var src = S.figData[sourceFig];
  if (src) {
    if (!S.figData[targetFig]) S.figData[targetFig] = {};
    var dst = S.figData[targetFig];
    Object.keys(src).forEach(function(k){ if (dst[k] == null) dst[k] = src[k]; });
    delete S.figData[sourceFig];
  }
  if (S.t2figNum === sourceFig) S.t2figNum = targetFig;
  if (S.mainFigure === sourceFig) S.mainFigure = targetFig;
}

function figGridCard(fNum) {
  var status = figGet(fNum,'status',null);
  var dotColor = status==='approved' ? 'var(--ok)' : status==='disapproved' ? 'var(--danger)' : 'var(--text3)';
  var qFlag = figGet(fNum,'qualityFlag',null);
  var qBadge = (qFlag && qFlag !== 'clean') ? '<span style="font-size:9px;font-family:var(--mono);text-transform:uppercase;background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bdr);border-radius:3px;padding:1px 5px;">'+escHtml(qFlag)+'</span>' : '';
  var dupOfPatent = figGet(fNum,'dupOfPatent',null);
  var dupBadge = dupOfPatent ? '<span title="Same image as ' + escHtml(dupOfPatent) + (figGet(fNum,'dupOfFig',null) ? (' FIG.' + escHtml(figGet(fNum,'dupOfFig',null))) : '') + '" style="font-size:9px;font-family:var(--mono);text-transform:uppercase;background:var(--accent-bg,#eef);color:var(--accent);border:1px solid var(--accent);border-radius:3px;padding:1px 5px;">DUP IMG</span>' : '';
  var per = figGet(fNum,'per','—'), sym = figGet(fNum,'sym','—'), acSty = figGet(fNum,'acSty','—');
  var active = (S.t2figNum === fNum);
  var realPath = realFigImage(fNum);
  var placeholder = 'https://placehold.co/160x110/E8E7E0/5A5955?text=FIG.+' + escHtml(fNum);
  var showText = figGet(fNum,'gridShowText',false);
  var isUnlabeled = /^Fu/i.test(fNum);

  // Approve/Disapprove visual feedback (per-image green/red border glow). The
  // border reflects ONLY the approve/disapprove status — NOT selection. Clicking
  // the card body just selects the figure (loads the detail panel); it must not
  // recolor the card. Selection is shown by a subtle outline ring instead, so a
  // body-click never looks like an approval action.
  var border = status==='approved'
      ? 'border-color:var(--ok);box-shadow:0 0 0 2px var(--ok-bdr),0 0 12px rgba(26,127,78,.35);'
    : status==='disapproved'
      ? 'border-color:var(--danger);box-shadow:0 0 0 2px var(--danger),0 0 12px rgba(192,57,43,.32);'
    : 'border-color:var(--border);';
  // Selection ring: a thin neutral outline (not a border-color change) so the
  // active card is findable without implying approve/disapprove.
  if (active) border += 'outline:2px solid var(--accent);outline-offset:1px;';

  // Image area: real crop with an onerror fallback to the placeholder, OR a
  // text panel when the user toggled "Text" or no real image exists at all
  // (missing/broken source). The text panel surfaces the same labels so the
  // figure stays reviewable even with no usable image.
  var textPanel =
      '<div style="width:100%;height:110px;border-radius:4px;background:var(--bg2);border:1px dashed var(--border2);'
    + 'display:flex;flex-direction:column;justify-content:center;gap:2px;padding:6px;box-sizing:border-box;overflow:hidden;">'
    + '<div style="font-size:11px;font-family:var(--mono);font-weight:600;color:var(--text2);">FIG. '+escHtml(fNum)+'</div>'
    + '<div style="font-size:10px;color:var(--text3);">'+escHtml(per)+' &middot; '+escHtml(sym)+'</div>'
    + '<div style="font-size:10px;color:var(--text3);">'+escHtml(acSty)+'</div>'
    + (realPath ? '' : '<div style="font-size:9px;color:var(--warn);margin-top:2px;">no image on disk</div>')
    + '</div>';
  var imageArea = (showText || !realPath)
    ? textPanel
    : '<img src="'+realPath+'" onerror="this.onerror=null;this.src=\''+placeholder+'\';this.dataset.broken=\'1\';" style="width:100%;border-radius:4px;display:block;'+(dupOfPatent?'opacity:0.7;':'')+'">';

  return '<div class="m3-card" style="padding:8px;cursor:pointer;'+border+'" data-fig-card="'+escHtml(fNum)+'">'
    + '<div style="position:relative;">'+imageArea
    + '<span style="position:absolute;top:4px;right:4px;width:9px;height:9px;border-radius:50%;background:'+dotColor+';border:1px solid #fff;"></span></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;flex-wrap:wrap;gap:4px;"><span style="font-size:11px;font-family:var(--mono);font-weight:600;">FIG. '+escHtml(fNum)+'</span>'+qBadge+dupBadge+'</div>'
    + '<div style="font-size:10px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+escHtml(per)+' &middot; '+escHtml(sym)+'</div>'
    + '<div style="font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+escHtml(acSty)+'</div>'
    // Per-image Approve / Disapprove + Text toggle. Buttons carry data-grid-*
    // attributes handled before the card-select branch so a click here toggles
    // status (and re-applies the glow) instead of just selecting the figure.
    + '<div style="display:flex;gap:4px;margin-top:7px;">'
      + '<button type="button" data-grid-approve="'+escHtml(fNum)+'" title="Approve image" style="flex:1;padding:3px 0;font-size:11px;border-radius:4px;cursor:pointer;border:1px solid '+(status==='approved'?'var(--ok)':'var(--border)')+';background:'+(status==='approved'?'var(--ok)':'var(--surface)')+';color:'+(status==='approved'?'#fff':'var(--ok)')+';">✓</button>'
      + '<button type="button" data-grid-disapprove="'+escHtml(fNum)+'" title="Disapprove image" style="flex:1;padding:3px 0;font-size:11px;border-radius:4px;cursor:pointer;border:1px solid '+(status==='disapproved'?'var(--danger)':'var(--border)')+';background:'+(status==='disapproved'?'var(--danger)':'var(--surface)')+';color:'+(status==='disapproved'?'#fff':'var(--danger)')+';">✗</button>'
      + '<button type="button" data-grid-text-toggle="'+escHtml(fNum)+'" title="Toggle image / text labels" style="flex:0 0 auto;padding:3px 8px;font-size:10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);">'+(showText?'🖼':'🅣')+'</button>'
    + '</div>'
    // Part 6: unlabeled Fu_ images get assigned into an existing FIG. from this
    // patent's own description of drawings — no free-text labeling field.
    + (isUnlabeled
        ? '<select data-fig-reassign="'+escHtml(fNum)+'" style="width:100%;margin-top:6px;font-size:10px;padding:3px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text2);" onclick="event.stopPropagation();">'
          + '<option value="">Assign to FIG…</option>'
          + t2RealFigNums().map(function(n){ return '<option value="'+escHtml(n)+'">FIG. '+escHtml(n)+'</option>'; }).join('')
          + '</select>'
        : '')
    + '</div>';
}

// Audit B-06 Fix: Strip kind codes properly
function normId(id) { 
  var stripped = id.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
  return stripped.replace(/[ab]\d+$/, '');
}
function renderCitationsWithLinks(citesArray) {
  if (!citesArray || citesArray.length === 0) return 'None';
  return citesArray.map(function(c) {
    var match = MASTER_DATASET_IDS.find(function(m) { return normId(m) === normId(c); });
    if (match) return '<a href="#" class="cite-link" title="Open Patent in Dataset">' + escHtml(c) + '</a>';
    return escHtml(c);
  }).join(', ');
}

function renderThroughput() {
  var tp = document.getElementById('throughput');

  // number of distinct Patent_IDs actually in the file. Force the tracker to it

  if (BATCH) {

function figIsMapped(fNum) {
  // Audit G-08 info: Improved regex to catch sub-figures could be applied here if needed,
  // but for basic _Fu detection, this simple base check suffices.
  var baseFNum = fNum.replace(/_Fu/i, '').replace(/[A-Z]$/i, '');
  return new RegExp('FIG\\.?\\s*' + baseFNum + '\\b', 'i').test(T1_META.descriptionOfDrawings);
}

// Return this figure's line(s) from the Brief Description of the Drawings, or
// null if the figure has no matching FIG. entry (e.g. an unlabeled _Fu crop).
// Used to show the description directly below the big image in pageT2().
function figDescriptionLine(fNum) {
  var baseFNum = String(fNum||'').replace(/_Fu/i, '').replace(/[A-Z]$/i, '').trim();
  if (!baseFNum) return null;
  var lines = String(T1_META.descriptionOfDrawings||'').split('\n');
  var re = new RegExp('FIG\\.?\\s*' + baseFNum + '\\b', 'i');
  var hits = lines.filter(function(line){ return re.test(line); });
  return hits.length ? hits.join(' ').trim() : null;
}

      + '<div class="m3-field" style="grid-column:1/-1;"><details class="m3-readonly"><summary>Forward Citations (' + (T1_META.forwardCites ? T1_META.forwardCites.length : 0) + ')</summary><div class="cite-list">' + renderCitationsWithLinks(T1_META.forwardCites) + '</div></details></div>'

      + '<div class="m3-field"><div class="m3-label">Technological Field</div><select class="m3-num" data-field="t1Field"><option value="">Select parameter field</option>' + t1FieldOptions().map(function(o){ return '<option value="' + o.id + '"' + (S.t1Field==o.id ? ' selected' : '') + '>' + o.n + '</option>'; }).join('') + '</select></div>'
      + '<div class="m3-field"><div class="m3-label">Core Innovation Objective</div><select class="m3-num" data-field="t1Target"><option value="">Select target objective</option>' + T1_TGT.map(function(o){ return '<option value="' + o.id + '"' + (S.t1Target==o.id ? ' selected' : '') + '>' + o.n + '</option>'; }).join('') + '</select></div>'

function pageT2(){

  // Real crop image (file:// URL built from this batch's Image_Path column) when
  // available, falling back to a placeholder only if no Image_Path was loaded.
  var previewPlaceholder = 'https://placehold.co/600x400/E8E7E0/5A5955?text=Mock+Crop:+FIG.+' + escHtml(fNum);

    + (srcUrl
        ? '<div style="margin-top:4px;font-size:11px;">'

    // Per-figure Brief-Description-of-Drawings text, shown directly under the
    // big image. Mapped figures show their own description line; unlabeled (_Fu)

    + (function(){
        var desc = figDescriptionLine(fNum);
        if (desc) {
          return '<div style="margin-top:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:12px;line-height:1.5;color:var(--text2);">'
               + '<span style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;">Brief Description of Drawings</span><br>'

    + '<div style="display:flex; align-items:center; gap:8px; margin-bottom:12px; margin-top:8px;">'

  // COL 2 — figure thumbnail list.

        + (dupOfPatent
          ? '<div class="flag warn" style="margin-top:8px;"><span class="f-lbl">🔁 Flagged Duplicate</span>Same image as <b>' + escHtml(dupOfPatent) + '</b>' + (dupOfFig ? (' FIG. ' + escHtml(dupOfFig)) : '') + '.</div>'
          : '<div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:8px;">'

            + '<input type="text" class="m3-num" id="t2-dup-fig-input" style="width:90px;" placeholder="FIG. #" value="' + escHtml(dupOfFig) + '">'
            + '<button type="button" class="btn" id="btn-fig-dup-set">Flag as Duplicate Image</button>'
            + '</div>')
        + '</div>';
    })();

    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;"><div class="m3-head">A. Projection Coordinates</div>'
       + sec('Perspective / Camera Angle') + grid('n',T2_PER.map(function(p){return ocFig('per',p,p);}))
       + '</div>';

    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;"><div class="m3-head">B. Image Rendering Style</div>'
       + sec('Aircraft Rendering') + grid('n',T2_AC_STY.map(function(s){return ocFig('acSty',s,s);})) + grid('n',T2_AC_COL.map(function(c){return ocFig('acCol',c,c);}))
       + sec('Background Rendering') + grid('n',T2_BG_STY.map(function(s){return ocFig('bgSty',s,s);})) + grid('n',T2_BG_COL.map(function(c){return ocFig('bgCol',c,c);}))
       + '</div>';
    h += '</div>';  // close COL 3

    // COL 4 — tag group 2: architecture assignment + C + D + Figure Notes.
    h += '<div class="t2-col t2-col-tags">';
    // Figure Validation & Assignment (Set Main / Assign-To architecture dropdown /
    // + Add architecture / Distinct-Architectures banner) — relocated here from
    // col 3; markup, ids and data-attributes unchanged.
    h += '<div class="m3-card" style="margin-bottom:8px; border-color:var(--accent);">'
      + '<div class="m3-head" style="margin-bottom:10px;">Figure Validation & Assignment</div>'
      + '<div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">'
        + '<button type="button" class="btn '+(isMain?'pri':'')+'" data-t2-main="true">★ Set as Main Figure</button>'
        + '<div style="width:1px; height:24px; background:var(--border);"></div>'
        + '<div style="display:flex; align-items:center; gap:6px;"><span class="m3-label" style="margin-bottom:0;">Assign To:</span><select class="m3-num" data-t2-arch="true" style="padding:6px 10px; min-height:0; width:140px;">'+archOptions+'</select></div>'
        + '<button type="button" class="btn" id="btn-add-arch" style="padding:6px 10px; font-size:12px;" title="Declare another distinct architecture in this patent">+ Add architecture</button>'
      + '</div>'
      // Live count of distinct architectures in this patent. When >1, the
      // G1/M1/M2/M3 pages repeat once per architecture (see the page loop).
      + '<div class="flag '+(nArch>1?'info':'')+'" style="margin-top:10px;">'
        + '<span class="f-lbl">Distinct Architectures</span>'
        + nArch + ' in this patent'
        + (nArch>1 ? ' — you\'ll fill G1/M1/M2/M3 once per architecture.' : ' — assign figures above (or "+ Add architecture") if this patent shows more than one.')
      + '</div></div>';

    // Structural Elements is SINGLE-select by default (SigLIP over-tags parts on a
    // single layout figure; the human should normally pick exactly one token). The
    // per-figure partsMulti flag opts into legacy multi-select for genuine edge cases.
    var partsMulti = figGet(fNum, 'partsMulti', false);
    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;"><div class="m3-head" style="display:flex; justify-content:space-between; align-items:center;">C. Present Structural Elements (Visual Tokens)'
       + '<button type="button" class="btn ' + (partsMulti ? 'danger' : '') + '" id="btn-parts-multi-toggle" style="padding:4px 10px; font-size:11px;">' + (partsMulti ? 'Back to single' : 'Allow multiple (edge case)') + '</button></div>'
       + '<div class="m3-sub" style="margin-bottom:6px;">' + (partsMulti ? 'MULTI-SELECT (edge case) — pick all structural tokens that apply.' : 'SINGLE-SELECT — pick exactly one structural token. Click it again to clear.') + '</div>'
       + grid('n',(T2_PARTS_DEFAULT.concat(PART_TOKENS||[]).concat(S.t2customParts||[]).filter(function(v,i,a){return a.indexOf(v)===i;})).map(function(p){return ocArrFig('parts',p,p);}))
       + '<div style="margin-top:10px; display:flex; gap:8px;"><input type="text" class="m3-num" id="t2-new-part" placeholder="+ Add Custom Token" style="flex:1; padding:8px 12px; min-height:0;"><button type="button" class="btn" id="btn-add-part" style="padding:8px 16px;">Add Tag</button></div>'
       + '</div>';

    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;"><div class="m3-head">D. Image Quality Flag</div>'

       + 'Contains callouts / legends / text overlays</label></div>';

    // Per-figure "Aircraft State in this View" — many patents draw the SAME aircraft

    // box; all per-figure (figData), persisted + exported like the other T2 fields.
    h += '<div class="m3-card" style="margin-bottom:8px; padding:12px;"><div class="m3-head">Aircraft State in this View</div>'
       + '<div class="m3-sub" style="margin-bottom:6px;">Describe the configuration shown in <b>THIS drawing</b>, not the aircraft in general — e.g. hover with the wing/rotors tilted up, or cruise with everything horizontal. The same aircraft often appears in several states across a patent’s figures, so set this per image.</div>'

       + '<textarea class="m3-num" data-fig-text="stateNote" placeholder="Anything else about the state in this image (gear down, doors open, blades folded, mid-transition angle…)" style="width:100%;min-height:48px;margin-top:8px;padding:8px;resize:vertical;font-size:13px;">' + escHtml(figGet(fNum, "stateNote", "")) + '</textarea>'
       + '</div>';

    // Per-figure commentary — replaces the global commentsSection() in T2 only;
    // notes and edge-case tags are stored on figData[fNum] so they travel with
    // this specific figure instead of the whole patent.
    h += '<div class="m3-card" style="margin-bottom:8px;padding:12px;">'
       + '<div class="m3-head">Figure Notes</div>'
       + '<textarea class="m3-num" data-fig-comment="true" placeholder="Notes for this figure..."'
       + ' style="width:100%;min-height:60px;padding:8px;resize:vertical;font-size:13px;">'
       + escHtml(figGet(fNum, "comment", "")) + '</textarea>'

       + (EDGE_TOKENS.length > 0

            + '</div></div>'
          : '')

          ? '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;">'
            + figGet(fNum,"edgeTags",[]).map(function(t){
                return '<span class="crumb" style="cursor:pointer;" data-remove-tag="'+escHtml(t)+'">'
                       + escHtml(t) + ' ×</span>';
              }).join("") + "</div>"
          : "")
       + "</div>";

    // DINOv2 image-selection reminder (guidance only — no data captured). Sits at

    h += '<div class="flag info" style="margin-bottom:8px;"><span class="f-lbl">💡 Picking images for DINOv2</span>'
       + 'Aim for ~3–4 representative drawings of this aircraft across the patent. Every drawing has a flaw (odd angle, occlusion, callout clutter, partial view), so a few complementary views describe the 3-D shape far better than any single “best” image.</div>';
    h += '</div>';  // close COL 4
  } else {
    h += '<div class="t2-col t2-col-tags"><div class="flag skip"><span class="f-lbl">No Figure Selected</span>Select a figure card above to begin labeling.</div></div>';
    h += '<div class="t2-col t2-col-tags"></div>';
  }

  h += '</div>';  // close .t2-grid4
  return h;
}

function pageGate(){ return '<div class="p-module">Level 1 &middot; G1 Architecture Split</div><div class="p-q">Primary Physics &amp; Thrust Configuration</div><div class="p-hint">Classification is driven by the most complex propulsive/structural system present. Isolate structural lifting surface traits via standard progressive disclosure blocks.</div><div class="g1-master-row">' + g1MasterButton('winged', 'Winged Architecture', 'Fixed or variable lifting profiles generating wing-mediated cruise lift.') + g1MasterButton('wingless', 'Wingless Architecture', 'Pure rotorborne configurations lacking standard aerodynamic wings.') + g1MasterButton('other', 'Novel / Other Forms', 'Alternative frameworks outside typical rotor-wing aerodynamic descriptions.') + '</div>' + (S.g1Focus ? g1SubPanel(S.g1Focus) : '<div class="flag skip"><span class="f-lbl">Progressive Disclosure Monitor</span>Select an structural master branch to display the underlying topological options.</div>') + commentsSection(); }

  + '</div><div class="m3-card"><div class="m3-head">Ground Contact Interface</div><div class="m3-zone">' + GEAR_ARCH.map(function(o){ return oc('gearArch', o.id, o.n); }).join('') + '</div>'
  + '<div class="m3-field" style="margin-top:10px;"><div class="m3-label">Ground Contact Edge-Case Notes</div><textarea class="comments" style="min-height:56px;" data-field="gearNotes" placeholder="Log landing gear ambiguities here...">' + escHtml(S.gearNotes) + '</textarea></div>'

function pageM2(){ if (isOtherArch()) return otherCommentaryPage('M2', 'Lifting Surfaces &amp; Stabilizers', 'wingNotes', _OTHER_M2_GUIDE);
  var h='<div class="p-module">Module M2 &middot; Aerodynamic Features</div><div class="p-q">Lifting Surfaces &amp; Stabilizers</div>';
  if(isWinged()){ h+=sec('Wing Architecture')+grid('',WING_CONFIG.map(function(c){return oc('wingConf',c.id,c.n,c.d);}));
  if(S.wingConf=='W'){ 
      h+=sec('Lifting Lines Grid')+ic('wCount',S.wCount,0,4,'Distinct Wing Panels');
      h+='<div class="m3-sub" style="margin-top:4px;">Count only lifting/wing panels here (main wing, canard, tandem wing, strake…). Empennage surfaces — horizontal/longitudinal stabilizers, tailplanes and fins — are <b>not</b> wings; classify those in the Empennage section below.</div>';
      h+='<div class="m3-field" style="margin-top:10px; margin-bottom:15px;"><div class="m3-label">Lifting Surfaces Edge-Case Notes</div><textarea class="comments" style="min-height:56px;" data-field="wingNotes" placeholder="Log wing ambiguities here...">' + escHtml(S.wingNotes) + '</textarea></div>';
      
      if(S.wCount>0){ 
          for(var i=1;i<=S.wCount;i++){ 
              h+=sec('Lifting Surface Wing: '+i);

              if(i === 1) {
                  h+='<div class="m3-sub" style="color:var(--accent); font-weight:500;">Wing 1 is the Main/Primary Lifting Surface (largest area). If wings are equal in size (e.g., Tandem), designate the forward-most wing as Wing 1.</div>';
              } else {
                  var roleOpts = [{id:'Canard', n:'Canard (Forward of Main)'}, {id:'Tandem', n:'Tandem (Equal Size / Distributed)'}, {id:'Aft', n:'Aft Stabilizer (Tailplane)'}, {id:'Stacked', n:'Stacked (Biplane / Vertical Separation at same CG)'}];
                  h+='<div class="m2-kv" style="margin-top:8px;">Relative Aerodynamic Role</div>' + grid('n', roleOpts.map(function(p){return oc(wingField('wRole',i),p.id,p.n);}));
              }

              var tiltOpts = [{id:'Fixed', n:'Fixed Surface'},{id:'Tilt', n:'Tiltable/Pivoting'}];
              
              if (S.topType === 'TP') {
                  h += physicsLock('TP', 'the wing stays fixed; only the propulsors tilt to vector thrust.');
                  h += grid('n', tiltOpts.map(function(p){return oc(wingField('wTilt',i),p.id,p.n,null,null,p.id!=='Fixed');}));
              } else if (i === 1 && S.topType === 'TW') {
                  h += physicsLock('TW', 'this primary wing must be tiltable — the entire wing rotates to vector thrust.');
                  h += grid('n', tiltOpts.map(function(p){return oc(wingField('wTilt',i),p.id,p.n,null,null,p.id!=='Tilt');}));
              } else {
                  h += grid('n', tiltOpts.map(function(p){return oc(wingField('wTilt',i),p.id,p.n);}));
              }

              h += grid('n',W_POS_V.map(function(p){return oc(wingField('wPosV',i),p.id,p.n);}))
                 + grid('',W_POS_L.map(function(p){return oc(wingField('wPosL',i),p.id,p.n);}))
                 + grid('n',W_PLAN.map(function(p){return oc(wingField('wPlan',i),p.id,p.n);})); 
              
              if (S['wPlan'+i] === 'Oth') {
                 h += '<div style="margin-top:8px;"><input type="text" class="m3-num" data-field="wPlanOth'+i+'" placeholder="Specify custom planform shape..." value="'+escHtml(S['wPlanOth'+i]||'')+'"></div>';
              }
          } 
      } 
  }else if(['BWB', 'FW', 'LB'].indexOf(S.wingConf) > -1){ h+=flg('info','Individual Wing Variables Bypassed','Integrated hull frameworks configure lifting surfaces directly.'); } 
  }else{ h+=sec('Wing Architecture')+physicsLock(S.topType,'wingless architecture — no fixed lifting surfaces to classify; lift is purely rotor-borne.'); }
  // Wingless architectures get the SAME directional-stabilizer set as Winged so a
  // multirotor with horizontal/vertical tail fins can be classified properly —
  // wings themselves stay locked out above (physicsLock), only the empennage opens
  // up. Rotorcraft (RC) already showed the full list; this also opens it for the
  // Wingless Multirotor (MR). 'Other'/Novel arches never reach here (pageM2 returns
  // the free-form commentary page first), so that guard is left as a harmless no-op.
  var eOpts=EMP_TYPE; if(S.g1Focus==='other') eOpts=EMP_TYPE.filter(function(e){return ['Tailless','Fins'].indexOf(e.id)>-1;});
  
  var kOpts=EMP_KIN.filter(function(k){return k.id!='Stabilator';}); 
  if(S.topType=='RC') kOpts=EMP_KIN.filter(function(k){return ['Fixed','Stabilator'].indexOf(k.id)>-1;}); 
  
  h+=sec('Directional Stabilizers (Empennage)')+grid('',eOpts.map(function(e){return oc('empType',e.id,e.n);})); 
  h+='<div class="m3-field" style="margin-top:10px;"><div class="m3-label">Empennage Edge-Case Notes</div><textarea class="comments" style="min-height:56px;" data-field="empNotes" placeholder="Log weird tail configurations here...">' + escHtml(S.empNotes) + '</textarea></div>';
  
  if(S.empType&&S.empType!='Tailless'&&S.empType!='Fins'&&S.empType!='VertFin'){
    if(S.topType=='RC'||isWinged()){
       if(S.topType=='TW') {
         kOpts=EMP_KIN.filter(function(k){return k.id==='Fixed';});
         h += physicsLock('TW', 'the empennage stays fixed through wing rotation to keep pitch authority.');
       }
       h+=sec('Empennage Articulation Rules')+grid('',kOpts.map(function(k){return oc('empKin',k.id,k.n);})); 
    } 
  } 
  return h+commentsSection(); 
}

function renderPreserveScroll() {
  // The page scrolls on the WINDOW (the .panel div has no overflow/fixed height,
  // so it grows with content) — #panel.scrollTop is always 0. On the T2 page the
  // (up to 4) columns (.t2-col) are their own scroll containers, so we capture/
  // restore each one by index. render() rebuilds #panel.innerHTML, so the inner
  // elements are recreated and must be re-scrolled by selector after render.
  var winY = window.scrollY || document.documentElement.scrollTop || 0;
  var cols = document.querySelectorAll('.t2-col');
  var tops = [];
  for (var i = 0; i < cols.length; i++) tops.push(cols[i].scrollTop);
  render();
  window.scrollTo(0, winY);
  var cols2 = document.querySelectorAll('.t2-col');
  for (var j = 0; j < cols2.length && j < tops.length; j++) cols2[j].scrollTop = tops[j];
}

// Task B (CHANGE 4): compact main-figure image shown on the G1/M1/M2/M3 morphology
// pages so the reviewer can see the drawing while classifying. Prefers
// S.mainFigure; falls back to the first approved figure that has an image, then to
// any figure that has an image. Returns '' (renders nothing — no broken <img>)
// when no usable image exists. The panel is CSS-positioned (.morph-mainfig): fixed
// in the right margin on wide screens, static at the top on narrow ones.
function morphologyMainImage() {
  var pick = null;
  if (S.mainFigure && realFigImage(S.mainFigure)) pick = S.mainFigure;
  if (!pick) {
    var nums = Object.keys(S.figData || {}).sort(function(a,b){ return (parseFloat(a)||0) - (parseFloat(b)||0); });
    for (var i = 0; i < nums.length; i++) {
      if (figGet(nums[i],'status',null) === 'approved' && realFigImage(nums[i])) { pick = nums[i]; break; }
    }
    if (!pick) { for (var j = 0; j < nums.length; j++) { if (realFigImage(nums[j])) { pick = nums[j]; break; } } }
  }
  if (!pick) return '';
  var url = realFigImage(pick);
  if (!url) return '';
  return '<div class="morph-mainfig">'
    + '<div class="morph-mainfig-lbl">Main figure · FIG. ' + escHtml(pick) + '</div>'
    + '<img src="' + url + '" onerror="this.parentNode.style.display=\'none\';" alt="Main figure FIG. ' + escHtml(pick) + '">'
    + '</div>';
}

  // Multi-architecture banner on the morphology pages (G1/M1/M2/M3): tells the
