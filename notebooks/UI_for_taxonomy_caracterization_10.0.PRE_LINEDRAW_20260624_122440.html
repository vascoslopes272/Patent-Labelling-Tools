// The G1/M1/M2/M3 morphology object for whatever architecture is CURRENTLY
// loaded into the flat S.* keys. Factored out of buildExport so it can be
// called once per architecture (after swapping that arch's profile into S).
function buildMorphologyObj() {
  return {
    topologyClass: S.topType, wingConf: S.wingConf, wCount: S.wCount,
    wings: [1,2,3,4].map(function(i){ return i<=S.wCount ? {role:S['wRole'+i]||'Main', tilt:S['wTilt'+i], posV:S['wPosV'+i], posL:S['wPosL'+i], plan:S['wPlan'+i]==='Oth'?S['wPlanOth'+i]:S['wPlan'+i]} : null }).filter(Boolean),
    empType: S.empType, empKin: S.empKin, empNotes: S.empNotes,
    fusShape: S.fusShape, fusKin: S.fusKin, fusNotes: S.fusNotes, gearArch: S.gearArch, gearNotes: S.gearNotes, wingNotes: S.wingNotes,
    footLen: S.footLen, footWid: S.footWid, footHgt: S.footHgt, footAmbiguous: S.footAmbiguous, latSym: S.latSym, longSym: S.longSym,
    propulsionCards: m3Blueprints().map(function(bp){
      return { component: bp.key, count: m3Count(bp.key), sym: m3Sym(bp.key), chord: m3Get(bp.key,'chord'), orient: m3Get(bp.key,'orient'), bmech: m3Get(bp.key,'bmech'), rmech: m3Get(bp.key,'rmech'), propKin: (propKinLock(S.topType) || m3Get(bp.key,'propKin')), zone: m3Get(bp.key,'zone'), zoneChord: m3Get(bp.key,'zoneChord'), zoneSpan: m3Get(bp.key,'zoneSpan'), notes: m3Get(bp.key,'notes') };
    })
  };
}

// Build the array of per-architecture morphology objects by swapping each
// stored profile into S in turn, reading it, then restoring the active arch.
// For a single-architecture patent this is just [currentMorphology].
function buildArchitectures() {
  saveCurArchProfile();                       // make sure the active arch is captured
  var nArch = getArchCount();
  var savedActive = captureAircraftSnapshot(); // remember what's currently in S
  var out = [];
  for (var ai = 0; ai < nArch; ai++) {
    // Fall back to the active morphology if a profile slot was never visited
    // (e.g. same-name-aircraft auto-jump), so we never emit a wiped architecture.
    applyAircraftSnapshot(S.archProfiles[ai] || savedActive);
    out.push(buildMorphologyObj());
  }
  applyAircraftSnapshot(savedActive);          // restore the active arch into S
  return out;
}

function buildExport() {
  var rec = {
    recordId: T1_META.recordNumber, familyId: T1_META.familyId,
    aircraftName: T1_META.aircraftName || '',
    assignee: T1_META.assignee, pubYear: T1_META.pubYear, appYear: T1_META.appYear,
    isApproved: S.isApproved, disapproveReason: S.t1DisapproveReason, disapproveOther: S.t1DisapproveOther,
    isDuplicate: S.isDuplicate, duplicateOf: S.duplicateId, duplicateType: S.duplicateType,
    archCount: getArchCount(), scope: S.t1Scope, techField: S.t1Field, innovTarget: S.t1Target,
    figures: Object.keys(S.figData).reduce(function(acc, fNum){
      var fd = S.figData[fNum] || {};
      acc[fNum] = Object.assign({}, fd, { rotation_deg: fd.t2_rotation || 0 });
      return acc;
    }, {}), mainFigure: S.mainFigure,
    // architectures[]: one morphology per architecture. The flat morphology
    // fields below mirror architectures[0] for backward-compatibility with any
    // consumer that still reads record.topologyClass etc. directly.
    architectures: buildArchitectures(),
    labelToken: buildLbl(), comments: S.comments, timestamp: new Date().toISOString()
  };
  var first = rec.architectures[0] || {};
  Object.keys(first).forEach(function(k){ rec[k] = first[k]; });
  return rec;
}

function ingestAI(data) {
  // T1
  if (data.T1) {
    var t1 = data.T1;
    if (t1.approved    != null) S.isApproved         = t1.approved;
    if (t1.disapprove_reason)   S.t1DisapproveReason = t1.disapprove_reason;
    if (t1.disapprove_other)    S.t1DisapproveOther  = t1.disapprove_other;
    if (t1.isDuplicate != null) S.isDuplicate        = !!t1.isDuplicate;
    if (t1.duplicateId)         S.duplicateId        = t1.duplicateId;
    if (t1.duplicateType)       S.duplicateType      = t1.duplicateType;
    if (t1.scope)               S.t1Scope            = t1.scope;
    if (t1.t1Field)             S.t1Field            = t1.t1Field;
    if (t1.t1Target)            S.t1Target           = t1.t1Target;
    if (t1.innovTarget && !t1.t1Target) S.t1Target   = t1.innovTarget; // fallback key
    if (t1.arch_count  != null) S.archCount          = parseInt(t1.arch_count) || 1;
    if (t1.aircraftName)        T1_META.aircraftName = t1.aircraftName;
  }
  // G1
  if (data.G1 && data.G1.topType) {
    S.topType = data.G1.topType;
    S.g1Focus = ['TW','TP','DS','CVT','SLC','SRW'].indexOf(S.topType) > -1 ? 'winged'
              : ['RC','MR'].indexOf(S.topType) > -1 ? 'wingless' : 'other';
    // Apply all physics locks — mirrors Audit B-02 exactly
    if (S.topType === 'TP') {
      for (var i = 1; i <= 4; i++) { S['wTilt' + i] = 'Fixed'; }
    } else if (S.topType === 'TW') {
      S.wTilt1 = 'Tilt';
      // Default the wing-mounted thrust orientation but DON'T clobber a saved
      // value (Mixed is a valid reviewer choice — applied later from the cards).
      for (var i = 1; i <= 4; i++) { if (!S['m3_wing' + i + '_orient']) S['m3_wing' + i + '_orient'] = 'Horizontal'; }
    } else if (S.topType === 'RC' || S.topType === 'MR') {
      for (var i = 1; i <= 4; i++) { S['wTilt' + i] = null; }
    }
    applyPropKinLock();   // propKin lock per the physics matrix (TP→Tilt, TW/DS/SLC/SRW/MR→Fixed, RC→Cyclic, CVT free)
  }
  // M1
  if (data.M1) {
    var m1 = data.M1;
    if (m1.wingConf)       S.wingConf = m1.wingConf;
    if (m1.wCount != null) {
      S.wCount = parseInt(m1.wCount) || 1;
      // BWB/FW/LB: the lift surface is continuous with the fuselage (no separate
      // fuselage tube to attach a panel to), so there's no discrete panel to
      // count — NOT a claim that the aircraft has no wing/lift surface. See
      // WING_CONFIG's per-option description above for the distinction.
      if (['BWB','FW','LB'].indexOf(S.wingConf) > -1) S.wCount = 0;
    }
    if (m1.empType)        S.empType  = m1.empType;
    if (m1.empKin)         S.empKin   = m1.empKin;
    if (m1.fusShape)       S.fusShape = m1.fusShape;
    if (m1.fusKin)         S.fusKin   = m1.fusKin;
    if (m1.gearArch)       S.gearArch = m1.gearArch;
    if (m1.latSym != null) S.latSym   = xlBool(m1.latSym);
    if (m1.longSym != null)       S.longSym       = xlBool(m1.longSym);
    if (m1.footAmbiguous != null) S.footAmbiguous = xlBool(m1.footAmbiguous);
    if (m1.footLen != null && m1.footLen !== '') S.footLen = String(m1.footLen);
    if (m1.footWid != null && m1.footWid !== '') S.footWid = String(m1.footWid);
    if (m1.footHgt != null && m1.footHgt !== '') S.footHgt = String(m1.footHgt);
    // Persistence fix (H4): restore the free-text morphology notes (per arch).
    if (m1.wingNotes != null) S.wingNotes = m1.wingNotes;
    if (m1.empNotes  != null) S.empNotes  = m1.empNotes;
    if (m1.fusNotes  != null) S.fusNotes  = m1.fusNotes;
    if (m1.gearNotes != null) S.gearNotes = m1.gearNotes;
    // TW empennage lock: must be Fixed
    if (S.topType === 'TW' && S.empType && S.empType !== 'Tailless' && S.empType !== 'Fins') {
      S.empKin = 'Fixed';
    }
    // RC empennage kin: only Fixed or Stabilator allowed
    if (S.topType === 'RC' && S.empKin === 'Tilt') {
      S.empKin = 'Fixed';
    }
  }
  // Wings (per-wing detail, if provided)
  if (Array.isArray(data.wings)) {
    data.wings.forEach(function(w, idx) {
      var i = w.id || (idx + 1);
      if (w.tilt) S['wTilt' + i] = w.tilt;
      if (w.posV) S['wPosV' + i] = w.posV;
      if (w.posL) S['wPosL' + i] = w.posL;
      if (w.plan) {
        if (['Str','Swp','Del','Oth'].indexOf(w.plan) > -1) {
          S['wPlan' + i] = w.plan;
        } else {
          S['wPlan' + i] = 'Oth'; S['wPlanOth' + i] = w.plan;
        }
      }
      if (i > 1 && w.role) S['wRole' + i] = w.role;
    });
  }
  // Re-apply TP/TW tilt locks AFTER wing data (AI might have sent wrong tilt values)
  if (S.topType === 'TP') { for (var i = 1; i <= 4; i++) { S['wTilt' + i] = 'Fixed'; } }
  if (S.topType === 'TW') { S.wTilt1 = 'Tilt'; }
  // T2 per-figure
  if (data.T2 && typeof data.T2 === 'object') {
    Object.keys(data.T2).forEach(function(figNum) {
      var fig = data.T2[figNum];
      if (!fig || typeof fig !== 'object') return;
      // Only write fields that are non-null and valid strings. qualityFlag/comment/
      // arch/status are persistence-fix fields restored from a reviewed file (the
      // ML pre-label never carries them, so a fresh load is unchanged).
      ['per','acSty','acCol','bgSty','bgCol','dupOfPatent','dupOfFig','sourceUrl',
       'qualityFlag','comment','arch','status','acState','stateNote'].forEach(function(key) {
        if (fig[key] != null) figSet(figNum, key, fig[key]);
      });
      if (fig.hasLegends != null) figSet(figNum, 'hasLegends', xlBool(fig.hasLegends));
      if (Array.isArray(fig.tiltedInView) && fig.tiltedInView.length > 0) figSet(figNum, 'tiltedInView', fig.tiltedInView);
      // Restore the saved single/multi mode BEFORE handling parts so the collapse
      // below respects a figure the human deliberately set to multi.
      if (fig.partsMulti != null) figSet(figNum, 'partsMulti', xlBool(fig.partsMulti));
      if (Array.isArray(fig.parts) && fig.parts.length > 0) {
        var _parts = fig.parts;
        // Single-select default: SigLIP over-tags parts, so collapse a multi-tag guess
        // to ONE on load — only the human may assign >1, via the "Allow multiple"
        // button (now persisted as partsMulti). Prefer "Whole Vehicle Layout" (the
        // common case: the figure shows the whole architecture), else the first tag.
        if (!figGet(figNum, 'partsMulti', false) && _parts.length > 1) {
          _parts = _parts.indexOf('Whole Vehicle Layout') > -1 ? ['Whole Vehicle Layout'] : [_parts[0]];
        }
        figSet(figNum, 'parts', _parts);
      }
      // Restore human edge-case tags (array) and the actual chosen rotation from a
      // reloaded reviewed file. rotation_deg goes straight into t2_rotation (the
      // human's real value), distinct from the ML rotation_deg_suggested below.
      if (Array.isArray(fig.edgeTags) && fig.edgeTags.length > 0) {
        figSet(figNum, 'edgeTags', fig.edgeTags);
      }
      if (fig.rotation_deg != null) {
        figSet(figNum, 't2_rotation', parseInt(fig.rotation_deg, 10) || 0);
      }
      // Pipeline-suggested rotation (Stage 01) — only the suggestion is
      // stored here; pageT2() applies it to t2_rotation on first view only,
      // so it never clobbers a rotation the human has already set.
      if (fig.rotation_deg_suggested != null) {
        figSet(figNum, 'rotation_deg_suggested', parseInt(fig.rotation_deg_suggested, 10) || 0);
      }
      // Figure approve/disapprove status is restored above ONLY when the file
      // carries it (reviewed exports do; ML pre-labels never do — so a fresh ML
      // load still leaves the human to confirm each figure).
    });
    // Pipeline-detected duplicates: when a figure is flagged dupOfFig pointing at
    // another figure in THIS patent, copy that original's T2 labels in (same
    // image ⇒ same image-level labels), editable. Cross-patent originals are
    // handled when the reviewer (re)flags them or once that patent is in the
    // session registry.
    Object.keys(S.figData).forEach(function(figNum){
      var dop = figGet(figNum,'dupOfPatent',''), dof = figGet(figNum,'dupOfFig','');
      var samePatent = !dop || String(dop).trim() === String(T1_META.recordNumber).trim();
      if (dof && samePatent && S.figData[dof]) applyDuplicateFigureLabels(figNum, dop, dof);
    });
  }
  // M3 propulsion cards
  if (Array.isArray(data.propulsionCards)) {
    data.propulsionCards.forEach(function(card) {
      var key = card.component;
      if (!key) return;
      ['count','chord','orient','bmech','rmech','propKin','zone','zoneChord','zoneSpan','notes'].forEach(function(f) {
        if (card[f] != null) { S['m3_' + key + '_' + f] = card[f]; }
      });
      // Symmetric-pairs flag is a boolean — coerce so "true"/"false" strings
      // from a round-tripped xlsx don't read as truthy non-empty strings.
      if (card.sym != null) { S['m3_' + key + '_sym'] = xlBool(card.sym); }
      // SLC/SRW: strip Mixed (tilting/vectoring) if a stored/AI value sneaks in —
      // independent fixed lift+cruise / stopped-rotor never vectors.
      if (['SLC','SRW'].indexOf(S.topType) > -1) {
        if (S['m3_' + key + '_orient'] === 'Mixed') { S['m3_' + key + '_orient'] = null; }
      }
      // propKin lock per the physics matrix — force the architecture's fixed value
      // over any stored/AI value (TP→Tilt, TW/DS/SLC/SRW/MR→Fixed, RC→Cyclic). TW
      // wing orient is intentionally NOT forced anymore so a saved Mixed survives.
      var _pk = propKinLock(S.topType);
      if (_pk) { S['m3_' + key + '_propKin'] = _pk; }
    });
  }
  // Confidence summary in status bar
  var confs = [];
  if (data.T1 && data.T1.confidence != null) confs.push(data.T1.confidence);
  if (data.G1 && data.G1.confidence != null) confs.push(data.G1.confidence);
  if (data.M1 && data.M1.confidence != null) confs.push(data.M1.confidence);
  if (data.overall_confidence != null) confs.push(data.overall_confidence);
  var avgConf = confs.length ? (confs.reduce(function(a,b){return a+b;},0)/confs.length) : null;
  var confPct = avgConf != null ? Math.round(avgConf * 100) + '%' : '';
  var confColor = avgConf >= 0.85 ? 'var(--ok)' : avgConf >= 0.60 ? 'var(--warn)' : 'var(--danger)';
  // The single-patent "AI Pre-Label" status bar was removed from the header, so
  // this is now a no-op when that element is absent (ingestAI still runs for every
  // batch patent via ingestPatentRows — must not throw on the missing node).
  var _aiStatus = document.getElementById('ai-load-status');
  if (_aiStatus) _aiStatus.innerHTML =
    ' Pre-labels loaded &nbsp;&nbsp; AI confidence: <b style="color:' + confColor + '">' + confPct + '</b>' +
    (data.G1 && data.G1.reasoning ? ' &nbsp;&nbsp; <i style="color:var(--text3);">' + data.G1.reasoning + '</i>' : '');
  render();
}

// --- BATCH LOADER (ml_predict_labels_<batch>.xlsx — one row per leaf field, all patents
// stacked in a single "Review" sheet; see src/excel_schema.py COLUMNS) ──────
// Lets a reviewer load one consolidated file for the whole batch instead of
// one ai_prelabel.json per patent, with Prev/Next stepping through patients
// and patTot auto-detected from the distinct Patent_ID count.
var BATCH = null;  // { ids: [...], byId: {pid: rows[]}, idx: 0, label: "Batch_01" }

// Per-patent filename/image-path lookup keyed by fNum — rebuilt by
// rowsToAIData() on every loadBatchPatent() call. recordToRows() needs this
// to reconstruct the "Image: <filename>" Sub_Dimension that build_patent_rows()
// (src/excel_schema.py) uses, since S.figData itself is only keyed by fNum.
var FIG_FILENAMES  = {};
var FIG_IMAGE_PATH = {};

// FIG_IMAGE_PATH values are absolute local filesystem paths written by
// src/excel_schema.py (e.g. "/mnt/storage_11tb/.../matched/Batch_02/<pid>/<crop>.png"),
// not URLs — convert to a file:// URL so <img src> can load them directly from
// disk when this HTML is opened via file:// in Chrome (no upload step needed).
function pathToFileURL(p) {
  if (!p || p.trim() === '') return null;
  if (/^(https?|file):\/\//i.test(p)) return p;
  var cleanPath = p.replace(/\\/g, '/');
  if (/^[a-zA-Z]:/.test(cleanPath)) {
    return 'file:///' + cleanPath;
  }
  return 'file://' + (cleanPath.startsWith('/') ? '' : '/') + cleanPath;
}
// Two reusable side-by-side viewer windows, one per "slot":
//   'epo' → the Espacenet record opened automatically by Prev/Next
//   'pdf' → the PatSeer source PDF opened by the header "Open PDF" button
// Keeping them separate lets you park the EPO record and the source PDF side by
// side on display 2 instead of one replacing the other.
var patentWindows = { epo: null, pdf: null };
var PATENT_WINDOW_NAMES = { epo: 'evtolPatentEpoViewer', pdf: 'evtolPatentPdfViewer' };

// Where the viewer windows should appear, captured via the header "Set viewer
// area" button and remembered across patents AND across F5 (it lives in
// localStorage). Returns null when never calibrated, so we fall back to a spot
// beside the wizard.
var VIEWER_GEO_KEY = 'evtolViewerGeo_v1';
function getViewerGeo() {
  try {
    var g = JSON.parse(localStorage.getItem(VIEWER_GEO_KEY));
    if (g && g.width > 120 && g.height > 120) return g;
  } catch (e) {}
  return null;
}

function openOrUpdatePatentWindow(url, slot) {
  if (!url) return;
  slot = (slot === 'pdf') ? 'pdf' : 'epo';
  var win = patentWindows[slot];
  // ── Reuse-in-place first ──────────────────────────────────────────────────
  // Navigating an existing cross-origin window IS allowed (you can assign its
  // location even though you can't READ it), so when the previous popup is still
  // reachable we just point it at the new URL — same window, same size, same
  // spot, no flicker. We deliberately do NOT moveTo/resizeTo on reuse so we never
  // fight a layout you positioned by hand on display 2.
  if (win && !win.closed) {
    try {
      win.location.href = url;              // navigate in place (cross-origin OK)
      try { win.focus(); } catch (e) {}
      return;
    } catch (e) {
      // Reference severed (a target sending Cross-Origin-Opener-Policy:
      // same-origin moves the popup into a new browsing-context group and nulls
      // our handle). Fall through and reopen.
      try { win.close(); } catch (e2) {}
    }
  }
  // ── First open (or after a severed reference) ─────────────────────────────
  // Prefer the calibrated viewer area; otherwise sit beside the wizard, using
  // THIS window's actual location/size (not window.screen, which on multi-
  // monitor Linux often reports the whole virtual desktop).
  var geo = getViewerGeo(), left, top, w, h;
  if (geo) {
    left = geo.left; top = geo.top; w = geo.width; h = geo.height;
  } else {
    left = (window.screenX || window.screenLeft || 0) + (window.outerWidth || 800);
    top  = window.screenY || window.screenTop || 0;
    w = window.outerWidth || 800;
    h = window.outerHeight || window.screen.availHeight;
  }
  // Offset the PDF window so it isn't dropped exactly on top of the EPO one.
  if (slot === 'pdf') { left += 48; top += 48; }
  win = window.open(url, PATENT_WINDOW_NAMES[slot],
    'left=' + left + ',top=' + top + ',width=' + w + ',height=' + h);
  // Some Linux WMs ignore the features string but honor an explicit
  // moveTo/resizeTo once the window exists — only on first open, never on reuse.
  if (win) {
    try { win.moveTo(left, top); win.resizeTo(w, h); } catch (e) {}
  }
  patentWindows[slot] = win;
}

// Header "Set viewer area" → open a SAME-ORIGIN placeholder window we can read
// the geometry of (cross-origin patent windows hide theirs). You drag/size it to
// the exact spot on display 2 where you want the EPO record and the PDF, press
// the button inside, and that geometry is remembered for every viewer window
// from then on — re-runnable on ANY patent, not just the first.
function calibrateViewerArea() {
  var sx = (window.screenX || window.screenLeft || 0) + (window.outerWidth || 800);
  var sy = window.screenY || window.screenTop || 0;
  var ph = window.open('', 'evtolViewerCalibrator',
    'left=' + sx + ',top=' + sy + ',width=760,height=820');
  if (!ph) { alert('Allow pop-ups for this page, then click "Set viewer area" again.'); return; }
  ph.document.write(
    '<!doctype html><html><head><meta charset="utf-8"><title>Set patent-viewer area</title></head>' +
    '<body style="margin:0;height:100vh;display:flex;flex-direction:column;align-items:center;' +
    'justify-content:center;gap:18px;padding:28px;box-sizing:border-box;text-align:center;' +
    'font-family:system-ui,sans-serif;background:#10243e;color:#fff;">' +
    '<h2 style="margin:0;font-size:19px;">Drag &amp; resize THIS window</h2>' +
    '<p style="max-width:440px;line-height:1.5;opacity:.85;margin:0;">Move it to exactly where you want ' +
    'the EPO record and the source PDF to open on display 2, at the size you want — then press the button.</p>' +
    '<button id="useit" style="font-size:15px;padding:11px 24px;border:0;border-radius:9px;' +
    'background:#2f80ed;color:#fff;cursor:pointer;font-weight:600;">Use this spot</button>' +
    '<p id="msg" style="opacity:.6;font-size:13px;margin:0;"></p></body></html>');
  ph.document.close();
  var btn = ph.document.getElementById('useit');
  if (btn) btn.addEventListener('click', function() {
    var geo = { left: ph.screenX, top: ph.screenY, width: ph.outerWidth, height: ph.outerHeight };
    try { localStorage.setItem(VIEWER_GEO_KEY, JSON.stringify(geo)); } catch (e) {}
    try { ph.document.getElementById('msg').textContent = 'Saved ✓ you can close this.'; } catch (e) {}
    setTimeout(function(){ try { ph.close(); } catch (e) {} }, 400);
  });
}

function realFigImage(fNum) {
  return pathToFileURL(FIG_IMAGE_PATH[fNum]);
}

// Reviewed rows accumulated across the whole batch, in the same flat
// Patent_ID/Section/Sub_Dimension/Field/.../Image_Path schema as
// src/excel_schema.py's COLUMNS — written out as one xlsx per batch via
// exportReviewedBatch() instead of one JSON download per patent.
var REVIEWED_ROWS = [];
var EXCEL_COLUMNS = ["Patent_ID","Section","Sub_Dimension","Field","Definition","Options","Value","Confidence","Source","Image_Path"];

function reviewRow(pid, section, subDim, field, value, confidence, source, imagePath) {
  return {
    Patent_ID: pid, Section: section, Sub_Dimension: subDim, Field: field,
    Definition: "", Options: "", Value: value != null ? value : null,
    Confidence: confidence != null ? confidence : null,
    Source: source != null ? source : null,
    Image_Path: imagePath != null ? imagePath : null,
  };
}

// Inverse of build_patent_rows() (src/excel_schema.py) — flattens one
// buildExport() record (the human-reviewed wizard state) back into rows of
// that same schema, so the per-batch reviewed xlsx can be reloaded into this
// wizard's batch loader just like ml_predict_labels_<batch>.xlsx can.
function recordToRows(record, pid) {
  var rows = [];

  // ── T1 ── title/abstract/description_of_drawings come from T1_META since
  // buildExport() doesn't carry them (they're not editable in the wizard).
  rows.push(reviewRow(pid, "T1", "Patent Title", "title", T1_META.title));
  rows.push(reviewRow(pid, "T1", "Aircraft / Prototype Name", "aircraftName", record.aircraftName));
  rows.push(reviewRow(pid, "T1", "Abstract", "abstract", T1_META.abstract));
  rows.push(reviewRow(pid, "T1", "Assignee", "assignee", record.assignee));
  rows.push(reviewRow(pid, "T1", "Publication Year", "pub_year", record.pubYear));
  rows.push(reviewRow(pid, "T1", "Application Year", "app_year", record.appYear));
  rows.push(reviewRow(pid, "T1", "Description of Drawings", "description_of_drawings", T1_META.descriptionOfDrawings));
  rows.push(reviewRow(pid, "T1", "scope", "scope", record.scope));
  rows.push(reviewRow(pid, "T1", "t1Field", "t1Field", record.techField));
  rows.push(reviewRow(pid, "T1", "t1Target", "t1Target", record.innovTarget));
  rows.push(reviewRow(pid, "T1", "T1 — Approval Status", "isApproved", record.isApproved));
  rows.push(reviewRow(pid, "T1", "T1 — Disapproval Reason", "t1DisapproveReason", record.disapproveReason));
  rows.push(reviewRow(pid, "T1", "T1 — Distinct Architectures", "archCount", record.archCount));
  rows.push(reviewRow(pid, "T1", "T1 — Duplicate Flag", "isDuplicate", record.isDuplicate));
  rows.push(reviewRow(pid, "T1", "T1 — Duplicate Of (Patent ID)", "duplicateId", record.duplicateOf));
  // Extra fields buildExport() carries with no build_patent_rows() slot —
  // harmless additions, ignored by rowsToAIData() on reload.
  rows.push(reviewRow(pid, "META", "Review Metadata", "familyId", record.familyId));
  rows.push(reviewRow(pid, "META", "Review Metadata", "duplicateType", record.duplicateType));
  rows.push(reviewRow(pid, "META", "Review Metadata", "disapproveOther", record.disapproveOther));
  rows.push(reviewRow(pid, "META", "Review Metadata", "mainFigure", record.mainFigure));
  rows.push(reviewRow(pid, "META", "Review Metadata", "comments", record.comments));
  rows.push(reviewRow(pid, "META", "Review Metadata", "labelToken", record.labelToken));
  rows.push(reviewRow(pid, "META", "Review Metadata", "timestamp", record.timestamp));

  // ── T2 — per-figure rows, keyed back to filenames via FIG_FILENAMES ──────
  var fNums = Object.keys(record.figures || {});
  if (!fNums.length) {
    rows.push(reviewRow(pid, "T2", "Image: (none available)", "match_status", null));
  }
  fNums.forEach(function(fNum) {
    var fd      = record.figures[fNum] || {};
    var fname   = FIG_FILENAMES[fNum] || "";
    var imgPath = FIG_IMAGE_PATH[fNum] || null;
    var subDim  = fname ? ("Image: " + fname) : ("Image: (fig " + fNum + ")");
    ["per","acSty","acCol","bgSty","bgCol"].forEach(function(f) {
      rows.push(reviewRow(pid, "T2", subDim, f, fd[f] != null ? fd[f] : null, null, "human", imgPath));
    });
    rows.push(reviewRow(pid, "T2", subDim, "parts", Array.isArray(fd.parts) ? fd.parts.join("|") : (fd.parts || null), null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "status", fd.status != null ? fd.status : null, null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "rotation_deg", fd.rotation_deg != null ? fd.rotation_deg : null, null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "dupOfPatent", fd.dupOfPatent || null, null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "dupOfFig", fd.dupOfFig || null, null, "human", imgPath));
    // Persistence fix (C1-C5): these per-figure human labels used to be captured
    // in buildExport() but never serialised here, so they were silently lost on
    // save. edgeTags is an array → joined with "|" like parts (split back on load).
    rows.push(reviewRow(pid, "T2", subDim, "qualityFlag", fd.qualityFlag != null ? fd.qualityFlag : null, null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "hasLegends", fd.hasLegends != null ? fd.hasLegends : null, null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "comment", fd.comment != null ? fd.comment : null, null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "edgeTags", Array.isArray(fd.edgeTags) ? fd.edgeTags.join("|") : (fd.edgeTags || null), null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "arch", fd.arch != null ? fd.arch : null, null, "human", imgPath));
    // partsMulti: persists whether the reviewer opted this figure into multi-select
    // so the single-select collapse-on-load (ingestAI) doesn't undo a deliberate >1 pick.
    rows.push(reviewRow(pid, "T2", subDim, "partsMulti", fd.partsMulti != null ? fd.partsMulti : null, null, "human", imgPath));
    // Per-figure aircraft state in this view (config + what's tilted + free note).
    rows.push(reviewRow(pid, "T2", subDim, "acState", fd.acState != null ? fd.acState : null, null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "tiltedInView", Array.isArray(fd.tiltedInView) ? fd.tiltedInView.join("|") : (fd.tiltedInView || null), null, "human", imgPath));
    rows.push(reviewRow(pid, "T2", subDim, "stateNote", fd.stateNote != null ? fd.stateNote : null, null, "human", imgPath));
  });

  // ── G1/M1/M2/M3 — emitted once PER ARCHITECTURE ─────────────────────────
  // Multi-architecture patents carry several morphologies. Each is keyed with a
  // "_arch{N}" suffix on the Patent_ID so (Patent_ID, Field) stays unique; a
  // single-architecture patent keeps the BARE Patent_ID (no suffix), exactly as
  // before — so existing exports/downstream tools are unchanged for that case.
  var archs = record.architectures && record.architectures.length ? record.architectures : [record];
  archs.forEach(function(m, ai) {
    var apid = archs.length > 1 ? (pid + "_arch" + (ai + 1)) : pid;

    // ── G1 ──
    rows.push(reviewRow(apid, "G1", "Topology Type", "topType", m.topologyClass));

    // ── M1 ──
    rows.push(reviewRow(apid, "M1", "fusShape", "fusShape", m.fusShape));
    rows.push(reviewRow(apid, "M1", "fusKin", "fusKin", m.fusKin));
    rows.push(reviewRow(apid, "M1", "gearArch", "gearArch", m.gearArch));
    rows.push(reviewRow(apid, "M1", "latSym", "latSym", m.latSym));
    rows.push(reviewRow(apid, "M1", "M1 — Footprint Length (m)", "footLen", m.footLen));
    rows.push(reviewRow(apid, "M1", "M1 — Footprint Width (m)", "footWid", m.footWid));
    rows.push(reviewRow(apid, "M1", "M1 — Footprint Height (m)", "footHgt", m.footHgt));
    rows.push(reviewRow(apid, "M1", "M1 — Footprint Ambiguous", "footAmbiguous", m.footAmbiguous));
    rows.push(reviewRow(apid, "M1", "M1 — Longitudinal Symmetry", "longSym", m.longSym));
    rows.push(reviewRow(apid, "M1", "wingNotes", "wingNotes", m.wingNotes));
    rows.push(reviewRow(apid, "M1", "empNotes", "empNotes", m.empNotes));
    rows.push(reviewRow(apid, "M1", "fusNotes", "fusNotes", m.fusNotes));
    rows.push(reviewRow(apid, "M1", "gearNotes", "gearNotes", m.gearNotes));

    // ── M2 — wingConf/wCount/empType/empKin + per-wing rows ──
    rows.push(reviewRow(apid, "M2", "wingConf", "wingConf", m.wingConf));
    rows.push(reviewRow(apid, "M2", "wCount", "wCount", m.wCount));
    rows.push(reviewRow(apid, "M2", "empType", "empType", m.empType));
    rows.push(reviewRow(apid, "M2", "empKin", "empKin", m.empKin));
    (m.wings || []).forEach(function(w, i) {
      var wi = i + 1;
      [["tilt","Tilt"],["posV","Vertical Position"],["posL","Longitudinal Position"],
       ["plan","Planform"],["role","Role"]].forEach(function(pair) {
        var field = pair[0], label = pair[1];
        rows.push(reviewRow(apid, "M2", "Wing " + wi + " — " + label, "wing" + wi + "_" + field, w[field] != null ? w[field] : null));
      });
    });

    // ── M3 — one set of rows per propulsion-card component ──
    (m.propulsionCards || []).forEach(function(card) {
      var subDim = "Propulsion: " + card.component;
      // Persistence fix (C6/C7): propKin + sym were captured by buildMorphologyObj()
      // but omitted from this emit list, so they were lost on save (propKin only
      // re-derivable for TP via the physics lock; sym not at all). The reader
      // (rowsToAIData byComponent + ingestAI) already handles both once emitted.
      ["chord","orient","bmech","rmech","count","propKin","sym","zone","zoneChord","zoneSpan","notes"].forEach(function(field) {
        if (card[field] === undefined) return;
        rows.push(reviewRow(apid, "M3", subDim, card.component + "_" + field, card[field] != null ? card[field] : null));
      });
    });
  });

  return rows;
}

// Builds one xlsx (SheetJS, client-side) from REVIEWED_ROWS accumulated so
// far and downloads it — named after the batch label so it never collides
// with another batch's output, mirroring ml_predict_labels_<batch>.xlsx.
function exportReviewedBatch() {
  if (!REVIEWED_ROWS.length) {
    document.getElementById('batch-load-status').textContent = ' Nothing reviewed yet — nothing to export.';
    return;
  }
  var label = (BATCH && BATCH.label) || "batch";
  var ws = XLSX.utils.json_to_sheet(REVIEWED_ROWS, { header: EXCEL_COLUMNS });
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Review");
  XLSX.writeFile(wb, "reviewed_patents_" + label + ".xlsx");
}

// Mirrors src/ai_labeler.py's fig_number extraction so figure keys here match
// what AI Pre-Label JSON files already use: "_Fu(\d+).png" -> "Fu{n}",
// "_F(\w+).png" -> the captured label (this also matches plain "_Fu.png"
// with no digit, captured as "u" — an existing quirk in ai_labeler.py, kept
// here for consistency rather than "fixed" independently in two places).
function figNumFromFilename(fname) {
  fname = fname || '';
  var fu = /_Fu(\d+)\.png$/.exec(fname);
  if (fu) return 'Fu' + fu[1];
  // Bare "_Fu.png" (no digit suffix) marks a genuinely unmapped crop — the
  // pipeline couldn't read a FIG. number off the page, so every unmapped
  // crop in a patent can share this exact suffix. Without a unique key
  // they'd all collapse onto the same fNum "u" and silently overwrite each
  // other in T2[fNum]/FIG_FILENAMES[fNum]/FIG_IMAGE_PATH[fNum] (only the
  // last one survived — this is why patents with 2+ unmapped crops only
  // ever showed one image). The D-number earlier in the filename (the
  // drawing/page index, e.g. "D00002") is unique per crop, so use that.
  if (/_Fu\.png$/.test(fname)) {
    var dnum = /_D(\d+)_/.exec(fname);
    return dnum ? ('Fu_D' + dnum[1]) : fname.replace(/\.png$/i, '');
  }
  var f = /_F(\w+)\.png$/.exec(fname);
  if (f) return f[1];
  return fname.replace(/\.png$/i, '');
}

// Excel/SheetJS hands booleans back as JS booleans, but the reviewed-export
// round-trip and hand-edited files can store them as the strings "true"/"false"
// (or 1/0). Coerce all of those to a real boolean so isApproved/isDuplicate/
// latSym/m3 sym map consistently regardless of how the cell was written.
function xlBool(v) {
  if (typeof v === 'boolean') return v;
  if (v == null) return null;
  var s = String(v).trim().toLowerCase();
  if (s === 'true'  || s === '1' || s === 'yes') return true;
  if (s === 'false' || s === '0' || s === 'no' || s === '') return false;
  return null;
}

// Converts one patent's flat rows (Patent_ID/Section/Sub_Dimension/Field/
// Value/...) into the same nested {T1,G1,M1,T2,wings,propulsionCards} shape
// ingestAI() already knows how to apply — so the batch loader and the
// per-patent AI Pre-Label JSON share one ingestion path.
function rowsToAIData(rows) {
  var byField = {};
  rows.forEach(function(r) { byField[r.Field] = r; });
  function val(field) {
    var r = byField[field];
    return (r && r.Value !== undefined && r.Value !== '') ? r.Value : null;
  }

  var T1 = {}, G1 = {}, M1 = {};
  if (val('scope')    != null) T1.scope    = val('scope');
  if (val('t1Field')  != null) T1.t1Field  = val('t1Field');
  if (val('t1Target') != null) T1.t1Target = val('t1Target');

  // T1 triage state — Excel stores these as the manual rows isApproved /
  // t1DisapproveReason / archCount / isDuplicate / duplicateId (excel_schema.py
  // _T1_MANUAL) plus the META row duplicateType. They were being dropped on
  // load, so the wizard never echoed back the approval/duplicate choices that
  // were already recorded in the file.
  if (val('isApproved')         != null) T1.approved          = xlBool(val('isApproved'));
  if (val('t1DisapproveReason') != null) T1.disapprove_reason = val('t1DisapproveReason');
  if (val('disapproveOther')    != null) T1.disapprove_other  = val('disapproveOther');
  if (val('archCount')          != null) T1.arch_count        = val('archCount');
  if (val('isDuplicate')        != null) T1.isDuplicate       = xlBool(val('isDuplicate'));
  if (val('duplicateId')        != null) T1.duplicateId       = val('duplicateId');
  if (val('duplicateType')      != null) T1.duplicateType     = val('duplicateType');

  if (val('topType') != null) G1.topType = val('topType');

  // wingConf/wCount/empType/empKin live under Section "M2" in the row schema,
  // fusShape/fusKin/gearArch/latSym under "M1" — ingestAI() expects all of
  // them merged into one data.M1 object, so just look each field up by name.
  ['wingConf', 'wCount', 'empType', 'empKin', 'fusShape', 'fusKin', 'gearArch', 'latSym',
   'footLen', 'footWid', 'footHgt', 'footAmbiguous', 'longSym',
   'wingNotes', 'empNotes', 'fusNotes', 'gearNotes']   // persistence fix (H4): notes round-trip
    .forEach(function(f) { var v = val(f); if (v != null) M1[f] = v; });

  // T2 — rows grouped by Sub_Dimension "Image: <filename>"
  var byImage = {};
  rows.forEach(function(r) {
    if (r.Section !== 'T2') return;
    var sub = String(r.Sub_Dimension || '');
    if (sub.indexOf('Image: ') !== 0) return;
    var fname = sub.slice('Image: '.length);
    if (!byImage[fname]) byImage[fname] = {};
    if (r.Value !== undefined && r.Value !== '' && r.Value != null) {
      byImage[fname][r.Field] = r.Value;
    }
    // Robust read: every row in this image's group carries the same
    // Image_Path value, but only some rows had it populated in the source
    // file — grab it from whichever row has it, regardless of that row's
    // Field, and never let a blank/null row blow away a path already
    // captured from an earlier row for this same figure.
    if (r.Image_Path && String(r.Image_Path).trim() !== '' && r.Image_Path !== 'null') {
      byImage[fname].__imagePath = String(r.Image_Path).trim();
    }
  });
  var T2 = {};
  // Reset per-patent — recordToRows() needs fNum -> filename/path for
  // whichever patent is currently loaded, not a previous one.
  FIG_FILENAMES = {};
  FIG_IMAGE_PATH = {};
  Object.keys(byImage).forEach(function(fname) {
    var rec = byImage[fname], entry = {};
    // Persistence fix: qualityFlag/hasLegends/comment/arch/status/rotation_deg are
    // now read back so the reviewed-file round-trip restores them. ML pre-label
    // files never carry these fields, so loading them is unaffected.
    ['per', 'acSty', 'acCol', 'bgSty', 'bgCol', 'dupOfPatent', 'dupOfFig',
     'qualityFlag', 'hasLegends', 'comment', 'arch', 'status', 'rotation_deg', 'partsMulti',
     'acState', 'stateNote'].forEach(function(k) {
      if (rec[k] != null) entry[k] = rec[k];
    });
    if (rec.parts != null) entry.parts = String(rec.parts).split('|').filter(Boolean);
    if (rec.edgeTags != null) entry.edgeTags = String(rec.edgeTags).split('|').filter(Boolean);
    if (rec.tiltedInView != null) entry.tiltedInView = String(rec.tiltedInView).split('|').filter(Boolean);
    var fNum = figNumFromFilename(fname);
    T2[fNum] = entry;
    FIG_FILENAMES[fNum] = fname;
    if (rec.__imagePath) FIG_IMAGE_PATH[fNum] = rec.__imagePath;
  });

  // M3 — rows grouped by Sub_Dimension "Propulsion: <component>", Field
  // "<component>_<field>" (see src/excel_schema.py build_patent_rows()).
  var byComponent = {};
  rows.forEach(function(r) {
    if (r.Section !== 'M3') return;
    var sub = String(r.Sub_Dimension || '');
    if (sub.indexOf('Propulsion: ') !== 0) return;
    var component = sub.slice('Propulsion: '.length);
    var prefix = component + '_';
    var field  = String(r.Field || '');
    var suffix = field.indexOf(prefix) === 0 ? field.slice(prefix.length) : field;
    if (!byComponent[component]) byComponent[component] = { component: component };
    if (r.Value !== undefined && r.Value !== '' && r.Value != null) {
      byComponent[component][suffix] = r.Value;
    }
  });
  var propulsionCards = Object.keys(byComponent).map(function(k) { return byComponent[k]; });

  // M2 per-wing detail — rows with Field "wing<i>_<wTilt|wPosV|wPosL|wPlan|wRole>"
  // (excel_schema.py _WING_MANUAL). These were never reconstructed, so the wing
  // tilt/position/planform/role labels stayed at their defaults on load even
  // when the Excel had them. Map the wizard's wField names back to the
  // ingestAI() wing shape ({id, tilt, posV, posL, plan, role}).
  var WING_FIELD_MAP = { wTilt:'tilt', wPosV:'posV', wPosL:'posL', wPlan:'plan', wRole:'role' };
  var byWing = {};
  rows.forEach(function(r) {
    if (r.Section !== 'M2') return;
    var m = /^wing(\d+)_(wTilt|wPosV|wPosL|wPlan|wRole)$/.exec(String(r.Field || ''));
    if (!m) return;
    var idx = parseInt(m[1], 10), key = WING_FIELD_MAP[m[2]];
    if (r.Value === undefined || r.Value === '' || r.Value == null) return;
    if (!byWing[idx]) byWing[idx] = { id: idx };
    byWing[idx][key] = r.Value;
  });
  var wings = Object.keys(byWing)
    .map(function(k){ return parseInt(k, 10); })
    .sort(function(a, b){ return a - b; })
    .map(function(i){ return byWing[i]; });

  return { T1: T1, G1: G1, M1: M1, T2: T2, wings: wings, propulsionCards: propulsionCards };
}

// "Same Aircraft" duplicates (DUP_TYPES id '1') share the exact same
// morphology — re-labeling M1/M2/M3/G1 by hand for every continuation of
// the same physical aircraft is pure repeated work. Pulls those sections
// from a patent already reviewed & exported earlier in this batch session
// (REVIEWED_ROWS) into the current S, leaving T1 triage and T2 image data
// (this patent's own figures/files) untouched.
function copyMorphologyFromOriginal(originalPid) {
  var origRows = REVIEWED_ROWS.filter(function(r) { return r.Patent_ID === originalPid; });
  if (!origRows.length) {
    alert('Patent "' + originalPid + '" hasn\'t been reviewed & exported yet in this session — nothing to copy from.');
    return;
  }
  // rowsToAIData() rebuilds the global FIG_FILENAMES/FIG_IMAGE_PATH lookup
  // as a side effect, keyed to whatever rows it's given — save/restore this
  // patent's own image lookup around the call so pulling the original's
  // G1/M1/M2/M3 doesn't also overwrite which images belong to THIS patent.
  var savedFilenames = FIG_FILENAMES, savedImagePaths = FIG_IMAGE_PATH;
  var origData = rowsToAIData(origRows);
  FIG_FILENAMES = savedFilenames;
  FIG_IMAGE_PATH = savedImagePaths;
  ingestAI({ G1: origData.G1, M1: origData.M1, wings: origData.wings, propulsionCards: origData.propulsionCards });
}

// ── Save-state indicator ─────────────────────────────────────────────────
// "Saved" means this patent's reviewed rows are captured in REVIEWED_ROWS (the
// buffer that exportReviewedBatch() writes to the .xlsx). updateSaveIndicator()
// reflects, for the patent on screen, whether it is Unsaved / Saved / Modified,
// and shows how many of the batch's patents have been saved so far.
function updateSaveIndicator() {
  var badge = document.getElementById('batch-save-status');
  var count = document.getElementById('batch-saved-count');
  if (!badge) return;
  if (!BATCH) { badge.style.display = 'none'; if (count) count.textContent = ''; return; }
  badge.style.display = '';
  var pid = BATCH.ids[BATCH.idx];
  var isSaved = !!BATCH.saved[pid];
  var state, bg, bdr, fg;
  if (isSaved && !BATCH.dirty)      { state = '✓ Saved';    bg = 'var(--ok-bg)';   bdr = 'var(--ok-bdr)';   fg = 'var(--ok)'; }
  else if (isSaved && BATCH.dirty)  { state = '✎ Modified'; bg = 'var(--warn-bg)'; bdr = 'var(--warn-bdr)'; fg = 'var(--warn)'; }
  else                              { state = '• Unsaved';  bg = 'var(--bg2)';     bdr = 'var(--border2)';  fg = 'var(--text2)'; }
  badge.textContent = state;
  badge.style.background = bg; badge.style.borderColor = bdr; badge.style.color = fg;
  badge.title = isSaved
    ? (BATCH.dirty ? 'Saved earlier, but edited since — re-save to update the .xlsx' : 'Captured in the reviewed .xlsx buffer')
    : 'Not yet written to the reviewed .xlsx buffer';
  if (count) {
    var n = Object.keys(BATCH.saved).length;
    count.textContent = '(' + n + '/' + BATCH.ids.length + ')';
  }
}

// Marks the on-screen patent as having unsaved edits. Wired to the data-entry
// events below so the indicator flips to "Modified"/"Unsaved" the moment a
// reviewer changes anything.
function markBatchDirty() {
  if (!BATCH || BATCH.dirty) return;
  BATCH.dirty = true;
  updateSaveIndicator();
}

// Commit one patent's reviewed rows into REVIEWED_ROWS, replacing any rows from
// a previous save of the same patent so revisiting + re-saving never duplicates
// it in the exported .xlsx. Then flag it saved and clear the dirty state.
function commitReviewedRows(pid, record) {
  // Drop every prior row for this patent — INCLUDING its "_arch{N}" morphology
  // rows (match on the base id) — so re-saving a multi-architecture patent never
  // leaves stale architecture rows behind.
  REVIEWED_ROWS = REVIEWED_ROWS.filter(function(r){ return basePatentId(r.Patent_ID) !== pid; });
  REVIEWED_ROWS = REVIEWED_ROWS.concat(recordToRows(record, pid));
  if (BATCH) { BATCH.saved[pid] = true; BATCH.dirty = false; }
  updateSaveIndicator();
}

// Mirrors extractor.py's _normalize_for_google(): PatSeer stores US A-series
// publications with a 6-digit sequence number, but Google Patents requires
// 7 digits (zero-padded) — without this, /patent/<pid>/en 404s for every US
// patent whose Patent_ID came from PatSeer instead of GP itself.
var _US_PUBNUM_RE = /^(US)(\d{4})(\d{6})(A\d)$/;
function normalizePatentIdForGoogle(pid) {
  var m = _US_PUBNUM_RE.exec(pid);
  return m ? (m[1] + m[2] + '0' + m[3] + m[4]) : pid;
}

// Multi-architecture exports suffix the Patent_ID with "_arch{N}" on the G1/M
// rows (see recordToRows). These two helpers recover the base patent id and the
// architecture number so the batch loader can regroup a reloaded reviewed file.
function basePatentId(pid) { return String(pid == null ? '' : pid).replace(/_arch\d+$/, ''); }
function archSuffixNum(pid) { var m = /_arch(\d+)$/.exec(String(pid == null ? '' : pid)); return m ? parseInt(m[1], 10) : null; }

// Rows that belong to architecture `n`: the shared rows (T1/T2/META — no
// suffix) plus only the morphology rows tagged with that architecture number.
function rowsForArch(allRows, n) {
  return allRows.filter(function(r){
    var suf = archSuffixNum(r.Patent_ID);
    return suf == null || suf === n;
  });
}

// Ingest one patent's rows, rebuilding S.archProfiles for multi-architecture
// patents. Single-architecture files (bare Patent_IDs, incl. all ML exports)
// behave exactly as the old `ingestAI(rowsToAIData(rows))` line did, just with
// archProfiles[0] populated as a side effect.
function ingestPatentRows(rows) {
  var idxSet = {};
  rows.forEach(function(r){ var s = archSuffixNum(r.Patent_ID); if (s != null) idxSet[s] = true; });
  var archIdxs = Object.keys(idxSet).map(Number).sort(function(a,b){ return a-b; });
  if (!archIdxs.length) archIdxs = [1];   // no suffixed rows ⇒ single architecture

  S.archProfiles = [];
  archIdxs.forEach(function(n, i){
    // Blank the morphology slate between architectures so arch n never inherits
    // arch (n-1)'s leftover wing/propulsion fields; figData/T1 are shared and
    // re-applied identically each pass.
    var blank = fresh();
    Object.keys(S).forEach(function(k){ if (k.indexOf('m3_') === 0) delete S[k]; });
    aircraftSnapshotKeys().forEach(function(k){ S[k] = blank[k]; });
    ingestAI(rowsToAIData(rowsForArch(rows, n)));
    S.curArch = i;
    S.archProfiles[i] = captureAircraftSnapshot();
  });
  // Show architecture 1 as the active one.
  S.curArch = 0;
  applyAircraftSnapshot(S.archProfiles[0]);
  S.archCount = archIdxs.length;
}

function loadBatchPatent(idx) {
  if (!BATCH || idx < 0 || idx >= BATCH.ids.length) return;
  BATCH.idx = idx;
  var pid  = BATCH.ids[idx];
  // If this patent was already reviewed in this session, its approve/
  // duplicate/etc. choices live in REVIEWED_ROWS (written by
  // commitReviewedRows on Export & Next), not in the original BATCH.byId
  // rows from the uploaded xlsx — read those back first so navigating away
  // and back (batch-prev/-next) doesn't show the triage as unselected.
  var reviewedRows = REVIEWED_ROWS.filter(function(r) { return basePatentId(r.Patent_ID) === pid; });
  var rows = reviewedRows.length ? reviewedRows : BATCH.byId[pid];

  S = fresh();

  // T1_META was a hardcoded placeholder before the batch loader existed —
  // populate it from this patent's T1 rows so the metadata pane and the
  // FIG.-highlighting in pageT2() reflect the real patent instead.
  function metaVal(field) {
    var r = rows.find(function(x) { return x.Field === field; });
    return (r && r.Value !== undefined && r.Value !== '') ? r.Value : '';
  }
  T1_META.recordNumber        = pid;
  // Two separate links per patent:
  //  • pdfLink (the side-by-side window opened on Next/prev) → EPO Espacenet
  //    record, built straight from the publication number: always resolves,
  //    needs no login, never expires, AND — unlike the PatSeer PDF — renders
  //    Espacenet's machine-translated view for non-English patents (AT, DE,
  //    CN, ...), where the raw PatSeer PDF stays in the native language.
  //  • pdfSourceLink (the "Open PDF" button) → the actual PatSeer source PDF,
  //    injected per patent as a 'pdf_link' row by scripts/inject_pdf_links.py.
  //    Note this is a PatSeer API URL, so it generally only opens when you're
  //    logged into PatSeer in this browser; use the EPO window if it's blocked.
  T1_META.pdfLink              = 'https://worldwide.espacenet.com/patent/search?q=pn%3D' + encodeURIComponent(pid);
  // Fall back to the EPO link when a patent has no PatSeer PDF link, so the
  // button is never blank.
  T1_META.pdfSourceLink        = metaVal('pdf_link') || T1_META.pdfLink;
  // Always reset the name per patent (no fallback to the previous patent's name,
  // which would wrongly carry a name onto a blank-name patent).
  T1_META.aircraftName          = metaVal('aircraftName') || '';
  T1_META.title                = metaVal('title')        || T1_META.title;
  T1_META.abstract             = metaVal('abstract')      || T1_META.abstract;
  T1_META.assignee             = metaVal('assignee')      || T1_META.assignee;
  T1_META.pubYear              = metaVal('pub_year')      || T1_META.pubYear;
  T1_META.appYear              = metaVal('app_year')      || T1_META.appYear;
  T1_META.descriptionOfDrawings = metaVal('description_of_drawings') || T1_META.descriptionOfDrawings;
  // Download-audit flag (scripts/flag_missing_downloads.py): true when this
  // patent has NO raw download folder, so its images are placeholders and the
  // source document must be retrieved manually before the final merge. Drives
  // the red banner at the top of T1.
  T1_META.missingFromDownload  = String(metaVal('missing_from_download')).toLowerCase() === 'true';

  ingestPatentRows(rows);

  // Persistence fix (H3/H5): mainFigure + patent-level comments are written to META
  // rows on save but were never read back; restore them from this patent's rows.
  // No-op for ML pre-label files (which carry neither) and for the placeholder
  // fresh() defaults when a patent hasn't been reviewed yet.
  var _mainFig = metaVal('mainFigure'); if (_mainFig) S.mainFigure = _mainFig;
  var _patComments = metaVal('comments'); if (_patComments) S.comments = _patComments;

  var nImages = Object.keys(S.figData).length;
  THROUGHPUT.patCur = String(idx + 1);
  THROUGHPUT.patTot = String(BATCH.ids.length);
  if (nImages) THROUGHPUT.figTot = String(nImages);
  THROUGHPUT.figCur = '1';

  document.getElementById('batch-nav-label').textContent =
    'Patent ' + (idx + 1) + ' / ' + BATCH.ids.length + ' — ' + pid;
  document.getElementById('batch-prev').disabled = (idx === 0);
  document.getElementById('batch-next').disabled = (idx === BATCH.ids.length - 1);

  // Freshly landed on this patent — nothing edited yet. The badge then reflects
  // whether it was already saved on a previous visit.
  BATCH.dirty = false;
  updateSaveIndicator();

  render();
}

document.getElementById('batch-xlsx-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
      var sheetName = wb.SheetNames.indexOf('Review') > -1 ? 'Review' : wb.SheetNames[0];
      var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: null });

      var ids = [], byId = {};
      rows.forEach(function(r) {
        if (r.Patent_ID == null) return;
        // Collapse "_arch{N}"-suffixed morphology rows from a reloaded reviewed
        // file back under their BASE patent id, so a multi-architecture patent is
        // one entry in the batch (not one per architecture). Single-arch / ML
        // exports have no suffix, so basePatentId is a no-op for them.
        var pid = basePatentId(r.Patent_ID);
        if (!byId[pid]) { byId[pid] = []; ids.push(pid); }
        byId[pid].push(r);
      });
      if (!ids.length) throw new Error('No Patent_ID rows found in sheet "' + sheetName + '"');

      // Derive a batch label from the filename (e.g. "ml_predict_labels_Batch_01.xlsx"
      // -> "Batch_01") so the reviewed-output xlsx is named after the same batch,
      // matching the data/matched/<batch>/ml_predict_labels_<batch>.xlsx convention.
      var m = /_?((?:Batch_?\d+|Batch_[A-Za-z0-9_]+))\.xlsx$/i.exec(file.name);
      var label = m ? m[1] : file.name.replace(/\.xlsx$/i, '');

      // saved: set of Patent_IDs whose reviewed rows are in REVIEWED_ROWS.
      // dirty: the patent currently on screen has unsaved edits.
      BATCH = { ids: ids, byId: byId, idx: 0, label: label, saved: {}, dirty: false };
      REVIEWED_ROWS = [];  // new batch loaded — don't carry over a previous batch's rows
      AIRCRAFT_REGISTRY = {}; PART_TOKENS = []; EDGE_TOKENS = []; FIGURE_LABEL_REGISTRY = {};  // reset session memory for the new batch
      ingestRegistryFromRows(byId);              // seed aircraft names from the loaded Excel
      buildAssigneeGroups(byId);                 // applicant -> patent-count map for T1
      document.getElementById('batch-load-status').textContent =
        ' Loaded ' + ids.length + ' patent(s) from ' + sheetName + ' (batch: ' + label + ').';
      document.getElementById('batch-nav').style.display = 'flex';
      loadBatchPatent(0);
    } catch (err) {
      document.getElementById('batch-load-status').textContent = ' Failed to load batch: ' + err.message;
    }
  };
  reader.readAsArrayBuffer(file);
});
document.getElementById('batch-prev').addEventListener('click', function() {
  if (BATCH) {
    loadBatchPatent(BATCH.idx - 1);
    openOrUpdatePatentWindow(T1_META.pdfLink, 'epo');
  }
});
document.getElementById('batch-export').addEventListener('click', exportReviewedBatch);
document.getElementById('batch-next').addEventListener('click', function() {
  if (BATCH) {
    loadBatchPatent(BATCH.idx + 1);
    openOrUpdatePatentWindow(T1_META.pdfLink, 'epo');
  }
});

// --- KEYBOARD NAVIGATION (Audit R-01) ---
document.addEventListener('keydown', function(e) {
  var tag = document.activeElement ? document.activeElement.tagName : '';
  var isTyping = (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT');
  var sid = curSID();
  
  if (!isTyping) {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      // Click the real Next button so the per-architecture loop logic in the
      // click handler runs (don't manipulate S.step directly here, which would
      // bypass the G1↔M3 arch loop).
      var btn = document.getElementById('btn-next');
      if (btn && !btn.disabled) btn.click();
    }
    if (e.key === 'Backspace') {
      e.preventDefault();
      var bb = document.getElementById('btn-back');
      if (bb) bb.click();             // route through the loop-aware Back handler
    }
  }

  if (sid === 't2' && !isTyping) {
    var fNum = (S.t2figNum||'1').trim();
    if (e.key === 'ArrowRight' || e.key === ']') {
      e.preventDefault(); S.t2figNum = String(parseInt(fNum||0) + 1); render();
    }
    if (e.key === 'ArrowLeft' || e.key === '[') {
      e.preventDefault(); S.t2figNum = String(Math.max(1, parseInt(fNum||2) - 1)); render();
    }
    if (e.key === 'a' || e.key === 'A') {
      if (fNum) { figSet(fNum, 'status', 'approved'); markBatchDirty(); render(); }
    }
    if (e.key === 'x' || e.key === 'X') {
      if (fNum) {
        figSet(fNum, 'status', 'disapproved');
        if (S.mainFigure === fNum) S.mainFigure = null;
        markBatchDirty(); render();
      }
    }
    if (e.key === 'm' || e.key === 'M') {
      if (fNum) { S.mainFigure = fNum; figSet(fNum, 'status', 'approved'); markBatchDirty(); render(); }
    }
    if (e.key === 'Escape') {
      if (fNum) { delete S.figData[fNum]; if(S.mainFigure === fNum) S.mainFigure = null; markBatchDirty(); render(); }
    }
  }

  if (sid === 't1' && !isTyping) {
    if (e.shiftKey && e.key === 'A') { S.isApproved = true; markBatchDirty(); render(); }
    if (e.shiftKey && e.key === 'D') { S.isApproved = false; markBatchDirty(); render(); }
    if (e.shiftKey && e.key === 'F') { S.isDuplicate = !S.isDuplicate; markBatchDirty(); render(); }
  }
});

document.querySelector('.wiz').addEventListener('input', function(e){

        // While a batch is loaded patCur/patTot are derived from BATCH and the

// Typing a patent number in the (batch-locked) tracker jumps to that patent on
